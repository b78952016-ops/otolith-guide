<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>照片類型審核</title>
<style>
body { background:#111; color:#eee; font-family:monospace; padding:1rem; }
h2 { color:#c9a84c; border-bottom:1px solid #333; padding-bottom:.3rem; margin-top:2rem; }
.group { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:1rem; }
.item { text-align:center; }
.item img { width:220px; height:165px; object-fit:cover; border:2px solid #333; display:block; }
.item img:hover { border-color:#c9a84c; }
.label { font-size:11px; margin-top:4px; padding:2px 6px; border-radius:3px; }
.otolith { background:#1a3a5c; color:#7ab8e8; }
.fish    { background:#1a4a1a; color:#7ae87a; }
.cooking { background:#4a2a00; color:#e8a87a; }
</style>
</head>
<body>
<h1 style="color:#c9a84c">照片類型審核 — 黑底+硬幣=耳石 / 素背景=生魚 / 複雜=料理</h1>

  "106_otolith","106_fish","106_fish2","106_cooking","106_cooking2"
];

// Group by ID
const groups = {};
files.forEach(f => {
  const id = f.match(/^(\d+)/)[1];
  if (!groups[id]) groups[id] = [];
  groups[id].push(f);
});

const typeClass = n => n.includes('otolith') ? 'otolith' : n.includes('fish') ? 'fish' : 'cooking';

const ids = Object.keys(groups).sort((a,b) => +a - +b);
ids.forEach(id => {
  const sec = document.createElement('div');
  sec.innerHTML = `<h2>ID ${id}</h2><div class="group" id="g${id}"></div>`;
  document.body.appendChild(sec);
  const g = document.getElementById('g'+id);
  groups[id].forEach(f => {
    const div = document.createElement('div');
    div.className = 'item';
    const tc = typeClass(f);
    div.innerHTML = `<img src="images/${f}.jpg" title="${f}" loading="lazy">
      <div class="label ${tc}">${f}</div>`;
    g.appendChild(div);
  });
});
</script>
</body>
</html>
