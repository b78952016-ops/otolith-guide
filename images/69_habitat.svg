<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea69" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1060a0"/>
      <stop offset="35%" stop-color="#084880"/>
      <stop offset="65%" stop-color="#042858"/>
      <stop offset="100%" stop-color="#020e28"/>
    </linearGradient>
    <linearGradient id="rock69" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#506070"/>
      <stop offset="100%" stop-color="#283038"/>
    </linearGradient>
  </defs>

  <!-- Deep rocky reef water -->
  <rect width="500" height="195" fill="url(#sea69)" rx="6"/>

  <!-- Subtle surface shimmer -->
  <path d="M0,6 Q120,4 250,6 Q380,8 500,6" fill="none" stroke="#4080a8" stroke-width="0.9" opacity="0.35"/>

  <!-- Light shafts (deep water, filtered) -->
  <line x1="180" y1="6" x2="148" y2="155" stroke="#80b8e0" stroke-width="12" opacity="0.035"/>
  <line x1="380" y1="6" x2="352" y2="158" stroke="#80b8e0" stroke-width="8"  opacity="0.025"/>

  <!-- Rocky reef bottom -->
  <path d="M0,158 Q40,148 90,155 Q130,162 180,152 Q230,142 280,150 Q340,158 390,148 Q440,138 490,148 L500,150 L500,195 L0,195 Z"
        fill="url(#rock69)"/>
  <!-- Rock texture and coral knobs -->
  <ellipse cx="60"  cy="158" rx="22" ry="8"  fill="#384858" opacity="0.70"/>
  <ellipse cx="165" cy="154" rx="18" ry="7"  fill="#384858" opacity="0.65"/>
  <ellipse cx="310" cy="153" rx="20" ry="7"  fill="#384858" opacity="0.65"/>
  <ellipse cx="440" cy="152" rx="15" ry="6"  fill="#384858" opacity="0.60"/>
  <!-- Coral/encrusting organisms -->
  <ellipse cx="90"  cy="154" rx="6"  ry="3"  fill="#5a7068" opacity="0.55"/>
  <ellipse cx="230" cy="150" rx="5"  ry="2.5" fill="#5a7068" opacity="0.50"/>
  <ellipse cx="380" cy="149" rx="5"  ry="2.5" fill="#5a7068" opacity="0.48"/>

  <!-- Bioluminescent particles (deep water) -->
  <circle cx="55"  cy="42"  r="0.8" fill="#60d0ff" opacity="0.16"/>
  <circle cx="180" cy="58"  r="0.7" fill="#80e8c8" opacity="0.14"/>
  <circle cx="310" cy="38"  r="0.8" fill="#60d0ff" opacity="0.15"/>
  <circle cx="430" cy="65"  r="0.7" fill="#80e8c8" opacity="0.13"/>
  <circle cx="120" cy="95"  r="0.7" fill="#60d0ff" opacity="0.12"/>
  <circle cx="280" cy="88"  r="0.6" fill="#80e8c8" opacity="0.11"/>

  <!-- Fish: 梭氏擬烏尾鮗 Paracaesio sordida (Dusky fusilier / 暗色若烏尾鮗) -->
  <!-- Elongated fusiform body; purplish-blue/dusky violet-blue back, paler sides;
       forked tail; schooling in mid-water above deep rocky reef (40-300m);
       relatively small head, moderate eye, slightly oblique mouth;
       continuous lateral line -->

  <!-- School of fish in mid-water — various sizes/positions -->

  <!-- Main fish 1 (foreground, largest) -->
  <g transform="translate(240,100) rotate(-8)" opacity="0.92">
    <!-- Body: elongated fusiform -->
    <ellipse cx="0" cy="0" rx="38" ry="10" fill="#6858a0"/>
    <!-- Darker purplish-blue back -->
    <ellipse cx="-3" cy="-6" rx="32" ry="4.5" fill="#3a3068" opacity="0.62"/>
    <!-- Paler silvery lower flank -->
    <ellipse cx="3" cy="5" rx="28" ry="4" fill="#b0a8c8" opacity="0.40"/>
    <!-- Head: small, slightly pointed -->
    <ellipse cx="35" cy="0" rx="10" ry="9" fill="#604890"/>
    <!-- Slightly oblique mouth -->
    <path d="M44,-2 Q47,0 44,2" fill="none" stroke="#402858" stroke-width="1.1" stroke-linecap="round"/>
    <!-- Eye: moderate -->
    <circle cx="38" cy="-3" r="3.8" fill="#181818"/>
    <circle cx="39" cy="-4" r="1.2" fill="#8070a0" opacity="0.38"/>
    <!-- Lateral line (faint, slightly arched) -->
    <path d="M38,-5 Q15,-8 -8,-5 Q-25,-3 -36,-1" fill="none" stroke="#5050a0" stroke-width="0.6" opacity="0.30"/>
    <!-- Dorsal fin: continuous, moderately tall -->
    <path d="M15,-10 Q8,-18 0,-20 Q-8,-18 -16,-14 Q-24,-10 -30,-8"
          fill="none" stroke="#402858" stroke-width="1.3"/>
    <!-- Anal fin (shorter, behind mid-body) -->
    <path d="M-10,10 Q-18,16 -26,14 Q-32,12 -34,8"
          fill="none" stroke="#402858" stroke-width="1.1"/>
    <!-- Pectoral fin (moderately long) -->
    <path d="M25,5 Q34,14 36,6" fill="none" stroke="#402858" stroke-width="1.2" opacity="0.72"/>
    <!-- Deeply forked caudal fin -->
    <path d="M-38,0 L-52,-14" stroke="#402858" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M-38,0 L-52, 14" stroke="#402858" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M-52,-14 Q-56,0 -52,14" fill="none" stroke="#402858" stroke-width="2.0" stroke-linecap="round"/>
  </g>

  <!-- Fish 2 (mid, slightly different angle) -->
  <g transform="translate(130,82) rotate(-6)" opacity="0.82">
    <ellipse cx="0" cy="0" rx="32" ry="8.5" fill="#6858a0"/>
    <ellipse cx="-2" cy="-5" rx="27" ry="4" fill="#3a3068" opacity="0.58"/>
    <ellipse cx="28" cy="0" rx="8.5" ry="7.5" fill="#604890"/>
    <path d="M36,-1 Q38,1 36,3" fill="none" stroke="#402858" stroke-width="1.0" stroke-linecap="round"/>
    <circle cx="31" cy="-2" r="3.2" fill="#181818"/>
    <!-- Dorsal fin -->
    <path d="M12,-8 Q5,-15 -2,-17 Q-10,-15 -18,-12 Q-24,-8 -28,-6" fill="none" stroke="#402858" stroke-width="1.2"/>
    <!-- Caudal -->
    <path d="M-32,0 L-44,-12" stroke="#402858" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-32,0 L-44, 12" stroke="#402858" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-44,-12 Q-48,0 -44,12" fill="none" stroke="#402858" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Fish 3 (upper, smaller) -->
  <g transform="translate(350,70) rotate(-5)" opacity="0.78">
    <ellipse cx="0" cy="0" rx="28" ry="7.5" fill="#6858a0"/>
    <ellipse cx="-2" cy="-5" rx="23" ry="3.5" fill="#3a3068" opacity="0.55"/>
    <ellipse cx="24" cy="0" rx="7.5" ry="6.5" fill="#604890"/>
    <circle cx="27" cy="-2" r="2.8" fill="#181818"/>
    <path d="M10,-7 Q3,-13 -4,-14 Q-12,-13 -18,-10" fill="none" stroke="#402858" stroke-width="1.1"/>
    <path d="M-28,0 L-39,-10" stroke="#402858" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M-28,0 L-39, 10" stroke="#402858" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M-39,-10 Q-43,0 -39,10" fill="none" stroke="#402858" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- Fish 4 (background cluster, 2 small fish) -->
  <g transform="translate(380,108) rotate(-7)" opacity="0.58">
    <ellipse cx="0" cy="0" rx="22" ry="6" fill="#6858a0"/>
    <ellipse cx="18" cy="0" rx="6"  ry="5.5" fill="#604890"/>
    <circle cx="21" cy="-2" r="2.2" fill="#181818"/>
    <path d="M-22,0 L-30,-8" stroke="#402858" stroke-width="2.0" stroke-linecap="round" fill="none"/>
    <path d="M-22,0 L-30, 8" stroke="#402858" stroke-width="2.0" stroke-linecap="round" fill="none"/>
  </g>
  <g transform="translate(420,92) rotate(-4)" opacity="0.52">
    <ellipse cx="0" cy="0" rx="20" ry="5.5" fill="#6858a0"/>
    <ellipse cx="16" cy="0" rx="5.5" ry="5"  fill="#604890"/>
    <circle cx="19" cy="-2" r="2.0" fill="#181818"/>
    <path d="M-20,0 L-28,-7" stroke="#402858" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M-20,0 L-28, 7" stroke="#402858" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Depth ruler (40–300 m) -->
  <line x1="478" y1="8" x2="478" y2="158" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="8"   x2="478" y2="8"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="11"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">40</text>
  <line x1="474" y1="58"  x2="478" y2="58"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="61"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">120</text>
  <line x1="474" y1="108" x2="478" y2="108" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="111" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">200</text>
  <line x1="474" y1="158" x2="478" y2="158" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="161" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">300</text>
  <text x="481" y="25" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">深水岩礁・大陸坡上層</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">40–300 m；紫藍色群游型（烏尾鮗型）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食浮游甲殼類・小魚；晝間礁區上水層巡游</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度－西太平洋（台灣周邊礁區）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
