<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea26" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a4878"/>
      <stop offset="35%" stop-color="#0e2e58"/>
      <stop offset="100%" stop-color="#080e28"/>
    </linearGradient>
    <linearGradient id="sand26" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#988858"/>
      <stop offset="100%" stop-color="#685838"/>
    </linearGradient>
  </defs>

  <!-- Coastal water 30-60m -->
  <rect width="500" height="195" fill="url(#sea26)" rx="6"/>

  <!-- Surface shimmer at top -->
  <path d="M0,8 Q80,5 160,8 Q240,11 320,8 Q400,5 500,8"
        fill="none" stroke="#3abcd8" stroke-width="1.4" opacity="0.52"/>
  <path d="M0,18 Q90,13 185,18 Q275,23 365,18 Q435,13 500,18"
        fill="none" stroke="#2aa8c8" stroke-width="1.0" opacity="0.38"/>

  <!-- Marine snow -->
  <circle cx="90"  cy="50"  r="0.9" fill="#ffffff" opacity="0.16"/>
  <circle cx="200" cy="35"  r="1.0" fill="#ffffff" opacity="0.18"/>
  <circle cx="340" cy="60"  r="0.8" fill="#ffffff" opacity="0.15"/>
  <circle cx="430" cy="42"  r="0.9" fill="#ffffff" opacity="0.16"/>

  <!-- Jellyfish (juvenile 刺鯧 hide in tentacles) -->
  <!-- Jellyfish 1: large moon jellyfish -->
  <path d="M155,38 Q135,28 140,48 Q145,60 165,62 Q185,60 190,48 Q195,28 175,38 Z"
        fill="#90c8e0" opacity="0.28"/>
  <path d="M155,38 Q135,28 140,48 Q145,60 165,62 Q185,60 190,48 Q195,28 175,38 Z"
        fill="none" stroke="#68a8c8" stroke-width="0.8" opacity="0.55"/>
  <!-- Jellyfish bell cross ribs -->
  <path d="M165,42 Q165,56 165,62" fill="none" stroke="#68a8c8" stroke-width="0.6" opacity="0.35"/>
  <path d="M148,48 Q165,48 182,48" fill="none" stroke="#68a8c8" stroke-width="0.6" opacity="0.35"/>
  <!-- Tentacles hanging down -->
  <path d="M148,60 Q146,75 144,90 Q142,100 145,110" fill="none" stroke="#90c8e0" stroke-width="0.6" opacity="0.45"/>
  <path d="M155,62 Q154,78 152,95 Q151,107 153,118" fill="none" stroke="#90c8e0" stroke-width="0.6" opacity="0.40"/>
  <path d="M165,62 Q165,80 165,98 Q165,110 163,122" fill="none" stroke="#90c8e0" stroke-width="0.6" opacity="0.45"/>
  <path d="M175,62 Q176,79 178,96 Q179,108 177,120" fill="none" stroke="#90c8e0" stroke-width="0.6" opacity="0.40"/>
  <path d="M183,60 Q185,76 187,93 Q188,105 186,116" fill="none" stroke="#90c8e0" stroke-width="0.6" opacity="0.45"/>

  <!-- Juvenile 刺鯧 sheltering in jellyfish tentacles -->
  <g transform="translate(165,85) rotate(-4)" opacity="0.80">
    <ellipse cx="0" cy="0" rx="10" ry="6" fill="#708898"/>
    <ellipse cx="0" cy="-3" rx="8" ry="2.5" fill="#506878" opacity="0.60"/>
    <path d="M-4,-6 Q0,-11 5,-6" fill="none" stroke="#506878" stroke-width="1.1"/>
    <path d="M-10,0 L-14,-5" stroke="#506878" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M-10,0 L-14, 5" stroke="#506878" stroke-width="2" stroke-linecap="round" fill="none"/>
    <circle cx="8" cy="-0.5" r="1.8" fill="#181818"/>
  </g>

  <!-- Jellyfish 2 (background, smaller) -->
  <path d="M340,28 Q325,20 328,36 Q332,48 348,50 Q364,48 368,36 Q371,20 356,28 Z"
        fill="#90c8e0" opacity="0.22"/>
  <path d="M340,28 Q325,20 328,36 Q332,48 348,50 Q364,48 368,36 Q371,20 356,28 Z"
        fill="none" stroke="#68a8c8" stroke-width="0.7" opacity="0.45"/>
  <path d="M332,48 Q331,60 330,72" fill="none" stroke="#90c8e0" stroke-width="0.5" opacity="0.38"/>
  <path d="M348,50 Q348,63 347,75" fill="none" stroke="#90c8e0" stroke-width="0.5" opacity="0.38"/>
  <path d="M364,48 Q365,60 366,72" fill="none" stroke="#90c8e0" stroke-width="0.5" opacity="0.38"/>

  <!-- Sandy-mud bottom (adult habitat) -->
  <path d="M0,170 Q80,164 160,170 Q240,176 320,168 Q400,160 480,168 Q490,169 500,169 L500,195 L0,195 Z"
        fill="url(#sand26)"/>
  <!-- Sand texture -->
  <path d="M20,178 Q80,176 140,178" fill="none" stroke="#b0a070" stroke-width="0.7" opacity="0.50"/>
  <path d="M180,181 Q240,179 300,181" fill="none" stroke="#b0a070" stroke-width="0.7" opacity="0.50"/>
  <path d="M340,178 Q400,176 460,178" fill="none" stroke="#b0a070" stroke-width="0.7" opacity="0.50"/>

  <!-- Adult 刺鯧 on bottom (round/oval body, dark) -->
  <g transform="translate(285,135) rotate(-4)" opacity="0.91">
    <!-- Body: roundish oval (characteristic 刺鯧 shape) -->
    <ellipse cx="0" cy="0" rx="22" ry="16" fill="#505870"/>
    <!-- Lighter flanks -->
    <ellipse cx="2" cy="2" rx="16" ry="11" fill="#7080a0" opacity="0.40"/>
    <!-- Dorsal fin (starts from nape, continuous) -->
    <path d="M-14,-16 Q-6,-24 6,-16" fill="none" stroke="#3a4860" stroke-width="1.4"/>
    <path d="M6,-16 Q14,-20 18,-16" fill="none" stroke="#3a4860" stroke-width="1.3"/>
    <!-- Tail fin (slightly forked, rounded) -->
    <path d="M-22,0 L-32,-10" stroke="#3a4860" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M-22,0 L-32, 10" stroke="#3a4860" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <!-- Pectoral fin -->
    <path d="M10,11 Q18,18 22,13" fill="none" stroke="#3a4860" stroke-width="1.3" opacity="0.8"/>
    <!-- Anal fin -->
    <path d="M-6,16 Q2,22 10,16" fill="none" stroke="#3a4860" stroke-width="1.3"/>
    <!-- Eye -->
    <circle cx="19" cy="-2" r="3.5" fill="#181818"/>
    <circle cx="20" cy="-3" r="1.1" fill="#9098b0" opacity="0.5"/>
  </g>

  <!-- Adult fish 2 (smaller, background) -->
  <g transform="translate(420,143) rotate(-3)" opacity="0.78">
    <ellipse cx="0" cy="0" rx="17" ry="12" fill="#505870"/>
    <ellipse cx="1" cy="1" rx="12" ry="8" fill="#7080a0" opacity="0.35"/>
    <path d="M-10,-12 Q-4,-19 5,-12" fill="none" stroke="#3a4860" stroke-width="1.2"/>
    <path d="M-17,0 L-24,-8" stroke="#3a4860" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-17,0 L-24, 8" stroke="#3a4860" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <circle cx="14" cy="-1.5" r="2.8" fill="#181818"/>
  </g>

  <!-- Depth ruler (right side) — 0-70m -->
  <line x1="478" y1="8" x2="478" y2="170" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="8"   x2="478" y2="8"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="11"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="55"  x2="478" y2="55"  stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="58"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">20</text>
  <line x1="474" y1="101" x2="478" y2="101" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="104" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">40</text>
  <line x1="474" y1="148" x2="478" y2="148" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="151" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">60</text>
  <line x1="474" y1="170" x2="478" y2="170" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="173" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">70</text>
  <text x="481" y="25" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">砂泥底 ／ 近海沿岸</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">30–60 m（幼魚近表層）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">幼魚藏於水母觸鬚；成魚棲底層夜間上浮</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">日本・東海（台灣西南部）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
