<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1868a0"/>
      <stop offset="55%" stop-color="#0e4870"/>
      <stop offset="100%" stop-color="#0a2840"/>
    </linearGradient>
    <linearGradient id="reef10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#584838"/>
      <stop offset="100%" stop-color="#382818"/>
    </linearGradient>
    <linearGradient id="sand10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a89060"/>
      <stop offset="100%" stop-color="#786840"/>
    </linearGradient>
  </defs>

  <!-- Water body -->
  <rect width="500" height="195" fill="url(#sea10)" rx="6"/>

  <!-- Surface shimmer at top -->
  <path d="M0,7 Q80,4 165,7 Q250,10 335,7 Q415,4 500,7"
        fill="none" stroke="#4ad0f0" stroke-width="1.5" opacity="0.55"/>
  <path d="M0,17 Q90,13 185,17 Q280,21 370,17 Q440,13 500,17"
        fill="none" stroke="#3abcd8" stroke-width="1.0" opacity="0.40"/>

  <!-- Light shafts -->
  <line x1="100" y1="0" x2="60"  y2="140" stroke="#b0e0f8" stroke-width="10" opacity="0.04"/>
  <line x1="200" y1="0" x2="160" y2="145" stroke="#b0e0f8" stroke-width="7"  opacity="0.03"/>

  <!-- Reef structure (left half, steep wall) -->
  <path d="M0,80 Q20,70 50,68 Q80,65 100,72 Q120,80 140,75 Q160,70 175,80 L175,195 L0,195 Z"
        fill="url(#reef10)"/>
  <!-- Reef lit face -->
  <path d="M20,75 Q55,66 90,70 Q120,74 145,68 Q162,64 175,72"
        fill="none" stroke="#807060" stroke-width="1.5" opacity="0.5"/>
  <!-- Reef cracks / ledges -->
  <line x1="45"  y1="70" x2="50"  y2="90" stroke="#201008" stroke-width="0.8" opacity="0.6"/>
  <line x1="95"  y1="72" x2="100" y2="95" stroke="#201008" stroke-width="0.8" opacity="0.6"/>
  <line x1="140" y1="75" x2="145" y2="98" stroke="#201008" stroke-width="0.7" opacity="0.55"/>
  <!-- Reef overhang / ledge at mid-depth -->
  <path d="M30,115 Q60,108 90,112 Q110,115 125,110"
        fill="none" stroke="#705840" stroke-width="6" opacity="0.40"/>

  <!-- Sandy bottom (right half + center) -->
  <path d="M175,175 Q280,170 390,175 Q440,178 500,174 L500,195 L175,195 Z"
        fill="url(#sand10)"/>
  <!-- Reef-sand transition -->
  <path d="M155,185 Q165,180 175,182 Q185,184 200,182" fill="none" stroke="#908060" stroke-width="2" opacity="0.45"/>
  <!-- Sand ripple marks -->
  <path d="M210,181 Q260,179 310,181" fill="none" stroke="#c0a870" stroke-width="0.8" opacity="0.5"/>
  <path d="M330,183 Q375,181 420,183" fill="none" stroke="#c0a870" stroke-width="0.8" opacity="0.5"/>
  <path d="M240,187 Q290,185 340,187" fill="none" stroke="#c0a870" stroke-width="0.7" opacity="0.45"/>
  <!-- Small shell/rubble at reef base -->
  <ellipse cx="185" cy="182" rx="7"  ry="3" fill="#887060" opacity="0.60"/>
  <ellipse cx="210" cy="184" rx="5"  ry="2" fill="#907868" opacity="0.55"/>
  <ellipse cx="165" cy="186" rx="9"  ry="3.5" fill="#887060" opacity="0.60"/>

  <!-- Branching coral on reef -->
  <g stroke="#c06020" fill="none" stroke-width="1.1" opacity="0.80">
    <line x1="70" y1="110" x2="70" y2="88"/>
    <line x1="70" y1="98"  x2="60" y2="85"/>
    <line x1="70" y1="94"  x2="80" y2="82"/>
    <line x1="60" y1="85"  x2="55" y2="75"/>
    <line x1="80" y1="82"  x2="87" y2="72"/>
    <circle cx="55" cy="75" r="1.6" fill="#e08040"/>
    <circle cx="87" cy="72" r="1.6" fill="#e08040"/>
    <circle cx="60" cy="85" r="1.4" fill="#e08040"/>
    <circle cx="80" cy="82" r="1.4" fill="#e08040"/>
  </g>
  <!-- Encrusting sponge on reef wall -->
  <ellipse cx="120" cy="92"  rx="14" ry="7" fill="#5a3060" opacity="0.50"/>
  <ellipse cx="40"  cy="100" rx="10" ry="5" fill="#3a5020" opacity="0.45"/>

  <!-- Fish 1: 單帶眶棘鱸 — golden body, single lateral stripe, near reef-sand boundary -->
  <g transform="translate(240,135) rotate(-3)" opacity="0.91">
    <!-- Body: oval, golden-yellow -->
    <ellipse cx="0" cy="0" rx="22" ry="9" fill="#c0a040"/>
    <!-- Single dark lateral stripe (diagnostic feature) -->
    <line x1="-20" y1="0" x2="19" y2="0" stroke="#404020" stroke-width="2.5" opacity="0.55"/>
    <!-- Dorsal fin -->
    <path d="M-5,-9 Q2,-17 12,-9" fill="none" stroke="#a08030" stroke-width="1.5"/>
    <!-- Tail fin -->
    <path d="M-22,0 L-32,-10" stroke="#a08030" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M-22,0 L-32, 10" stroke="#a08030" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Pectoral fin -->
    <path d="M9,6 Q16,12 21,8" fill="none" stroke="#a08030" stroke-width="1.2" opacity="0.8"/>
    <!-- Anal fin -->
    <path d="M-8,9 Q0,15 8,9" fill="none" stroke="#a08030" stroke-width="1.1"/>
    <!-- Eye (orbital spine notable in genus) -->
    <circle cx="19" cy="-1" r="3.5" fill="#181808"/>
    <circle cx="20" cy="-1.5" r="1.1" fill="#c0b060" opacity="0.5"/>
  </g>

  <!-- Fish 2: second individual, slightly deeper, stopped posture -->
  <g transform="translate(370,148) rotate(-2)" opacity="0.80">
    <ellipse cx="0" cy="0" rx="17" ry="7" fill="#c0a040"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#404020" stroke-width="2" opacity="0.50"/>
    <path d="M-3,-7 Q2,-13 9,-7" fill="none" stroke="#a08030" stroke-width="1.3"/>
    <path d="M-17,0 L-25,-8" stroke="#a08030" stroke-width="2.6" stroke-linecap="round" fill="none"/>
    <path d="M-17,0 L-25, 8" stroke="#a08030" stroke-width="2.6" stroke-linecap="round" fill="none"/>
    <circle cx="14" cy="-0.5" r="3" fill="#181808"/>
  </g>

  <!-- Depth ruler (right side) — 0-50m -->
  <line x1="478" y1="7" x2="478" y2="172" stroke="#3a5070" stroke-width="1"/>
  <!-- 0 m -->
  <line x1="474" y1="7" x2="478" y2="7" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="10" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <!-- 10 m -->
  <line x1="474" y1="40" x2="478" y2="40" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="43" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">10</text>
  <!-- 20 m -->
  <line x1="474" y1="73" x2="478" y2="73" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="76" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">20</text>
  <!-- 30 m -->
  <line x1="474" y1="106" x2="478" y2="106" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="109" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">30</text>
  <!-- 40 m -->
  <line x1="474" y1="139" x2="478" y2="139" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="142" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">40</text>
  <!-- 50 m -->
  <line x1="474" y1="172" x2="478" y2="172" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="175" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">50</text>
  <text x="481" y="25" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">礁岩外緣 ／ 礁緣砂地</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">2–50 m</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">一游一停，善用礁砂交界覓食</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">台灣・安達曼海至琉球群島</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
