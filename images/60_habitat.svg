<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <!-- Horizontal gradient: river (left, green) → estuary (center, teal) → sea (right, blue) -->
    <linearGradient id="water60" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#286838"/>
      <stop offset="22%"  stop-color="#187858"/>
      <stop offset="48%"  stop-color="#177888"/>
      <stop offset="75%"  stop-color="#0f5ea8"/>
      <stop offset="100%" stop-color="#093878"/>
    </linearGradient>
    <!-- River rocky bottom -->
    <linearGradient id="rbed60" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#605040"/>
      <stop offset="100%" stop-color="#302018"/>
    </linearGradient>
    <!-- Sea sandy bottom -->
    <linearGradient id="sand60" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0a060"/>
      <stop offset="100%" stop-color="#786840"/>
    </linearGradient>
  </defs>

  <!-- SIDE-VIEW: river (left) → estuary (center) → sea (right) -->
  <rect width="500" height="195" fill="url(#water60)" rx="6"/>

  <!-- Water surface shimmer -->
  <path d="M0,6 Q125,4 250,6 Q375,8 500,6"
        fill="none" stroke="#70d8d8" stroke-width="1.2" opacity="0.38"/>

  <!-- River zone: rocky bottom (left, x=0–240) -->
  <path d="M0,160 Q30,152 65,157 Q100,162 135,152 Q168,142 205,150 Q225,154 240,157 L240,195 L0,195 Z"
        fill="url(#rbed60)"/>
  <!-- River rocks -->
  <ellipse cx="38"  cy="158" rx="22" ry="8"  fill="#4a3828" opacity="0.78"/>
  <ellipse cx="108" cy="153" rx="19" ry="7"  fill="#4a3828" opacity="0.72"/>
  <ellipse cx="178" cy="148" rx="16" ry="6"  fill="#4a3828" opacity="0.65"/>
  <ellipse cx="72"  cy="162" rx="11" ry="4"  fill="#3a2818" opacity="0.58"/>
  <ellipse cx="148" cy="157" rx="10" ry="4"  fill="#3a2818" opacity="0.52"/>
  <!-- Algae/moss on river rocks -->
  <ellipse cx="38"  cy="152" rx="11" ry="3.5" fill="#2a5820" opacity="0.58"/>
  <ellipse cx="108" cy="148" rx="9"  ry="3"   fill="#2a5820" opacity="0.52"/>

  <!-- Sea zone: sandy bottom (right, x=260–500) -->
  <path d="M260,156 Q295,150 345,155 Q395,160 445,153 Q475,148 500,152 L500,195 L260,195 Z"
        fill="url(#sand60)"/>
  <!-- Sand ripples -->
  <path d="M285,163 Q335,161 385,163" fill="none" stroke="#c8b870" stroke-width="0.7" opacity="0.45"/>
  <path d="M310,170 Q360,168 410,170" fill="none" stroke="#c8b870" stroke-width="0.7" opacity="0.40"/>

  <!-- Estuary zone dashed divider hint -->
  <line x1="248" y1="6" x2="248" y2="156" stroke="#60a8b0" stroke-width="0.8" stroke-dasharray="5,4" opacity="0.22"/>

  <!-- EELS: 太平洋雙色鰻鱺 Anguilla bicolor pacifica -->
  <!-- Side-view: very elongated sinuous body;
       DARK BROWN/OLIVE back (雙色 = bicolor);
       PALE YELLOWISH belly;
       continuous dorsal–caudal–anal fin (key eel feature);
       small pectoral fin; blunt head; small eye -->

  <!-- EEL 1 (main, migrating river→sea, long body crossing full width) -->
  <!-- Main body (dark olive-brown) -->
  <path d="M18,108 Q58,96 102,108 Q146,120 190,107 Q234,94 278,106 Q322,118 366,106 Q405,97 444,104"
        fill="none" stroke="#281808" stroke-width="12" stroke-linecap="round" opacity="0.92"/>
  <!-- Belly stripe (bicolor — pale yellowish) -->
  <path d="M18,112 Q58,101 102,113 Q146,125 190,112 Q234,100 278,111"
        fill="none" stroke="#c8a858" stroke-width="4.5" stroke-linecap="round" opacity="0.28"/>
  <!-- Dorsal fin (continuous along top, from behind head to tail) -->
  <path d="M52,101 Q102,89 152,101 Q202,89 252,100 Q302,89 352,100 Q396,93 438,100"
        fill="none" stroke="#180e04" stroke-width="2.8" stroke-linecap="round" opacity="0.58"/>
  <!-- Anal fin (ventral side, runs from belly) -->
  <path d="M82,114 Q132,126 182,114 Q232,102 282,114 Q322,124 362,114"
        fill="none" stroke="#180e04" stroke-width="2.2" stroke-linecap="round" opacity="0.48"/>
  <!-- Pectoral fin (small, behind head) -->
  <path d="M50,108 Q56,117 63,112" fill="none" stroke="#281808" stroke-width="2.8" stroke-linecap="round" opacity="0.72"/>
  <!-- HEAD: blunt, rounded snout, facing right -->
  <ellipse cx="16" cy="108" rx="13" ry="8.5" fill="#281808" opacity="0.93"/>
  <!-- Slightly open jaw hint -->
  <path d="M24,107 Q29,110 24,113" fill="none" stroke="#100808" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Eye (small) -->
  <circle cx="20" cy="104" r="3.0" fill="#101010"/>
  <circle cx="21" cy="103" r="1.0" fill="#5a3010" opacity="0.40"/>
  <!-- Caudal fin (rounded, fused with dorsal+anal — eel tail) -->
  <ellipse cx="447" cy="104" rx="9" ry="6" fill="#281808" opacity="0.76"/>

  <!-- EEL 2 (secondary, in river zone only) -->
  <!-- Main body -->
  <path d="M6,132 Q40,122 80,132 Q120,142 158,130 Q194,118 226,124"
        fill="none" stroke="#281808" stroke-width="9" stroke-linecap="round" opacity="0.68"/>
  <!-- Belly stripe -->
  <path d="M6,136 Q40,127 80,137 Q120,147 158,135"
        fill="none" stroke="#c8a858" stroke-width="3" stroke-linecap="round" opacity="0.20"/>
  <!-- Dorsal fin -->
  <path d="M36,126 Q76,117 116,127 Q152,137 188,125"
        fill="none" stroke="#180e04" stroke-width="2.0" stroke-linecap="round" opacity="0.42"/>
  <!-- Anal fin -->
  <path d="M58,137 Q98,148 138,136 Q170,126 200,130"
        fill="none" stroke="#180e04" stroke-width="1.6" stroke-linecap="round" opacity="0.35"/>
  <!-- Head -->
  <ellipse cx="5" cy="132" rx="10" ry="7" fill="#281808" opacity="0.66"/>
  <!-- Eye -->
  <circle cx="10" cy="128" r="2.4" fill="#101010"/>

  <!-- Zone labels (upper) -->
  <text x="58"  y="22" fill="#b8f0c0" font-size="8.5" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">河川・溪流</text>
  <text x="248" y="22" fill="#90e0e0" font-size="8.5" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">河口</text>
  <text x="398" y="22" fill="#80c0e8" font-size="8.5" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">海洋</text>

  <!-- Migration arrow (→ 降海繁殖) -->
  <path d="M148,144 L338,144" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.78"/>
  <path d="M328,140 L341,144 L328,148" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.78"/>
  <text x="240" y="141" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">降海繁殖</text>

  <!-- Labels -->
  <text x="12" y="40" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">降河性洄游；棲溪底石下・深水塘</text>
  <text x="12" y="54" fill="#8ab8d0" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">深褐背・淡黃腹（雙色診斷）；幼鰻隨洋流回溯</text>

  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度－西太平洋（台灣北部・東部・東部離島）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
