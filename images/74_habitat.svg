<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sky74" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ab8d8"/>
      <stop offset="100%" stop-color="#a8d0e0"/>
    </linearGradient>
    <linearGradient id="sea74" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#789090"/>
      <stop offset="40%" stop-color="#506070"/>
      <stop offset="80%" stop-color="#303840"/>
      <stop offset="100%" stop-color="#181e20"/>
    </linearGradient>
    <linearGradient id="mud74" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a8870"/>
      <stop offset="100%" stop-color="#604838"/>
    </linearGradient>
  </defs>

  <!-- Sky above waterline -->
  <rect width="500" height="195" fill="url(#sea74)" rx="6"/>
  <rect width="500" height="30" fill="url(#sky74)" rx="6"/>

  <!-- Shore / bank hints on sides -->
  <path d="M0,0 Q0,20 0,30 Q15,28 30,30" fill="#8a9a70" opacity="0.70"/>
  <path d="M500,0 Q500,20 500,30 Q485,28 470,30" fill="#8a9a70" opacity="0.70"/>

  <!-- Water surface (turbid estuarine water) -->
  <path d="M0,30 Q80,27 165,30 Q250,33 335,30 Q415,27 500,30"
        fill="#789090" stroke="#5a8090" stroke-width="1.2" opacity="0.88"/>
  <!-- Surface ripples (calm estuary) -->
  <path d="M40,33 Q80,31 120,33" fill="none" stroke="#8aacb8" stroke-width="0.8" opacity="0.45"/>
  <path d="M180,32 Q225,30 270,32" fill="none" stroke="#8aacb8" stroke-width="0.8" opacity="0.40"/>
  <path d="M330,32 Q375,30 420,32" fill="none" stroke="#8aacb8" stroke-width="0.8" opacity="0.38"/>

  <!-- Murky light shafts (turbid water) -->
  <line x1="160" y1="30" x2="140" y2="155" stroke="#a0b8c0" stroke-width="12" opacity="0.05"/>
  <line x1="360" y1="30" x2="344" y2="155" stroke="#a0b8c0" stroke-width="8"  opacity="0.035"/>

  <!-- Mangrove prop roots (left side) -->
  <line x1="18" y1="30" x2="12" y2="80"  stroke="#604828" stroke-width="3.5" opacity="0.65"/>
  <line x1="24" y1="30" x2="32" y2="78"  stroke="#604828" stroke-width="3.0" opacity="0.60"/>
  <line x1="14" y1="60" x2="8"  y2="90"  stroke="#604828" stroke-width="2.0" opacity="0.50"/>
  <line x1="28" y1="58" x2="38" y2="88"  stroke="#604828" stroke-width="2.0" opacity="0.48"/>
  <!-- Mangrove roots right -->
  <line x1="482" y1="30" x2="488" y2="80" stroke="#604828" stroke-width="3.5" opacity="0.62"/>
  <line x1="476" y1="30" x2="468" y2="76" stroke="#604828" stroke-width="3.0" opacity="0.58"/>
  <line x1="484" y1="58" x2="492" y2="86" stroke="#604828" stroke-width="2.0" opacity="0.48"/>

  <!-- Sandy-mud bottom -->
  <path d="M0,158 Q60,152 130,158 Q210,164 298,155 Q385,146 465,156 L500,157 L500,195 L0,195 Z"
        fill="url(#mud74)"/>
  <!-- Bottom ripples (sandy mud) -->
  <path d="M25,166 Q70,163 115,166"  fill="none" stroke="#7a6858" stroke-width="0.7" opacity="0.42"/>
  <path d="M165,168 Q210,165 255,168" fill="none" stroke="#7a6858" stroke-width="0.7" opacity="0.38"/>

  <!-- Fish: 多鱗四指馬鮁 Eleutheronema rhadinum (Four-fingered threadfin) -->
  <!-- Polynemidae: elongated, somewhat compressed;
       FOUR LONG FREE PECTORAL RAYS below pectoral fin (diagnostic! 四指 = four fingers);
       blunt slightly inferior snout; large forked caudal fin;
       yellowish-silver body; two separate dorsal fins;
       estuarine / river-sea boundary habitat -->

  <!-- Main fish (foreground) -->
  <g transform="translate(242,112) rotate(-5)" opacity="0.93">
    <!-- Body: elongated, slightly compressed -->
    <ellipse cx="0" cy="0" rx="32" ry="13" fill="#c8b878"/>
    <!-- Yellowish-silver sides -->
    <ellipse cx="3" cy="2" rx="26" ry="9" fill="#e0d090" opacity="0.42"/>
    <!-- Slightly darker back -->
    <ellipse cx="-2" cy="-7" rx="27" ry="5" fill="#8a7840" opacity="0.55"/>
    <!-- Caudal peduncle -->
    <ellipse cx="-29" cy="0" rx="5" ry="10" fill="#b0a060" opacity="0.80"/>
    <!-- Head: blunt, slightly inferior snout -->
    <ellipse cx="28" cy="0" rx="11" ry="12" fill="#a89050"/>
    <!-- Slightly inferior mouth (pointing downward) -->
    <path d="M38,3 Q41,7 37,10" fill="none" stroke="#806030" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Eye -->
    <circle cx="30" cy="-3" r="4.2" fill="#181818"/>
    <circle cx="31" cy="-4" r="1.4" fill="#c0a040" opacity="0.38"/>
    <!-- First dorsal fin (spiny) -->
    <path d="M8,-13 Q4,-20 0,-22 Q-4,-20 -6,-16" fill="none" stroke="#a08840" stroke-width="1.3"/>
    <!-- Second dorsal fin (soft, set back) -->
    <path d="M-14,-13 Q-18,-19 -22,-18 Q-26,-16 -26,-11" fill="none" stroke="#a08840" stroke-width="1.2"/>
    <!-- Anal fin -->
    <path d="M-8,13 Q-14,19 -20,17 Q-24,15 -24,11" fill="none" stroke="#a08840" stroke-width="1.1"/>
    <!-- Pectoral fin (fanned) -->
    <path d="M20,7 Q28,14 32,8" fill="none" stroke="#a08840" stroke-width="1.3" opacity="0.72"/>
    <!-- FOUR FREE PECTORAL RAYS (long thread-like, diagnostic! 四指) -->
    <path d="M22,9 L18,22" stroke="#e0c860" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M19,10 L14,24" stroke="#e0c860" stroke-width="1.6" stroke-linecap="round" fill="none"/>
    <path d="M16,11 L10,25" stroke="#e0c860" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.88"/>
    <path d="M13,11 L7,24"  stroke="#e0c860" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.80"/>
    <!-- Large forked caudal fin -->
    <path d="M-33,0 L-46,-15" stroke="#a08840" stroke-width="4.0" stroke-linecap="round" fill="none"/>
    <path d="M-33,0 L-46, 15" stroke="#a08840" stroke-width="4.0" stroke-linecap="round" fill="none"/>
    <path d="M-46,-15 Q-52,0 -46,15" fill="none" stroke="#a08840" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Fish 2 (background, head-down feeding) -->
  <g transform="translate(118,138) rotate(12)" opacity="0.82">
    <ellipse cx="0" cy="0" rx="26" ry="10" fill="#c8b878"/>
    <ellipse cx="23" cy="0" rx="9" ry="10" fill="#a89050"/>
    <!-- Free pectoral rays (4) -->
    <path d="M18,7 L14,18" stroke="#e0c860" stroke-width="1.6" stroke-linecap="round" fill="none"/>
    <path d="M15,8 L10,19" stroke="#e0c860" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.85"/>
    <path d="M12,8 L7,18" stroke="#e0c860" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.78"/>
    <path d="M9,8 L4,17" stroke="#e0c860" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.70"/>
    <circle cx="24" cy="-3" r="3.5" fill="#181818"/>
    <path d="M6,-10 Q2,-16 -2,-17 Q-6,-15 -8,-12" fill="none" stroke="#a08840" stroke-width="1.2"/>
    <path d="M-28,0 L-38,-12" stroke="#a08840" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M-28,0 L-38, 12" stroke="#a08840" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Fish 3 (right, background) -->
  <g transform="translate(402,118) rotate(-4)" opacity="0.62">
    <ellipse cx="0" cy="0" rx="22" ry="9" fill="#c8b878"/>
    <ellipse cx="19" cy="0" rx="7.5" ry="9.5" fill="#a89050"/>
    <!-- Free rays (2 visible) -->
    <path d="M15,6 L11,15" stroke="#e0c860" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M12,7 L7,15" stroke="#e0c860" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.80"/>
    <circle cx="20" cy="-2.5" r="3.0" fill="#181818"/>
    <path d="M-22,0 L-31,-11" stroke="#a08840" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-22,0 L-31, 11" stroke="#a08840" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Depth ruler (0–30 m) -->
  <line x1="478" y1="30" x2="478" y2="158" stroke="#3a5060" stroke-width="1"/>
  <line x1="474" y1="30"  x2="478" y2="30"  stroke="#4a6070" stroke-width="1"/>
  <text x="480" y="33"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="73"  x2="478" y2="73"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="76"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">10</text>
  <line x1="474" y1="116" x2="478" y2="116" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="119" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">20</text>
  <line x1="474" y1="158" x2="478" y2="158" stroke="#4a6070" stroke-width="1"/>
  <text x="480" y="161" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">30</text>
  <text x="481" y="46" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">河海交界・河口砂泥底・紅樹林</text>
  <text x="12" y="44" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">0–30 m；四條游離胸鰭絲（診斷）</text>
  <text x="12" y="57" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食蝦蟹魚蠕蟲；季節洄游成群</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">西北太平洋（台灣各沿岸・河口）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
