<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sky30" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3858"/>
      <stop offset="100%" stop-color="#2a6888"/>
    </linearGradient>
    <linearGradient id="water30" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6880"/>
      <stop offset="55%" stop-color="#0e4060"/>
      <stop offset="100%" stop-color="#0a2840"/>
    </linearGradient>
    <linearGradient id="mud30" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#706048"/>
      <stop offset="100%" stop-color="#403828"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="500" height="195" fill="url(#sky30)" rx="6"/>

  <!-- Mangrove prop roots (left side) -->
  <!-- Trunk base and aerial roots left -->
  <line x1="38" y1="0" x2="38" y2="68" stroke="#3a2808" stroke-width="8"/>
  <line x1="38" y1="0" x2="18" y2="68" stroke="#3a2808" stroke-width="6"/>
  <line x1="38" y1="0" x2="58" y2="68" stroke="#3a2808" stroke-width="6"/>
  <!-- Prop roots arching into water -->
  <path d="M18,68 Q12,80 15,95" fill="none" stroke="#5a3810" stroke-width="4" stroke-linecap="round"/>
  <path d="M26,68 Q22,82 25,98" fill="none" stroke="#5a3810" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M38,68 Q36,84 40,100" fill="none" stroke="#5a3810" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M50,68 Q54,82 51,98" fill="none" stroke="#5a3810" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M58,68 Q64,80 61,95" fill="none" stroke="#5a3810" stroke-width="4" stroke-linecap="round"/>
  <!-- Mangrove canopy (left) -->
  <ellipse cx="38" cy="10" rx="38" ry="16" fill="#2a6018" opacity="0.85"/>
  <ellipse cx="20" cy="18" rx="22" ry="12" fill="#2a6020" opacity="0.80"/>
  <ellipse cx="58" cy="15" rx="24" ry="12" fill="#306018" opacity="0.80"/>

  <!-- Mangrove prop roots (right side) -->
  <line x1="462" y1="0" x2="462" y2="68" stroke="#3a2808" stroke-width="8"/>
  <line x1="462" y1="0" x2="442" y2="68" stroke="#3a2808" stroke-width="6"/>
  <line x1="462" y1="0" x2="482" y2="68" stroke="#3a2808" stroke-width="6"/>
  <path d="M442,68 Q436,80 439,95" fill="none" stroke="#5a3810" stroke-width="4" stroke-linecap="round"/>
  <path d="M450,68 Q446,82 449,98" fill="none" stroke="#5a3810" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M462,68 Q460,84 464,100" fill="none" stroke="#5a3810" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M474,68 Q478,82 475,98" fill="none" stroke="#5a3810" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M482,68 Q488,80 485,95" fill="none" stroke="#5a3810" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="462" cy="10" rx="38" ry="16" fill="#2a6018" opacity="0.85"/>
  <ellipse cx="480" cy="18" rx="22" ry="12" fill="#306018" opacity="0.80"/>
  <ellipse cx="444" cy="15" rx="24" ry="12" fill="#2a6020" opacity="0.80"/>

  <!-- Estuarine water body -->
  <rect x="0" y="68" width="500" height="127" fill="url(#water30)"/>

  <!-- Tidal water surface ripples -->
  <path d="M0,74 Q80,70 160,74 Q240,78 320,74 Q400,70 500,74"
        fill="none" stroke="#50c8e0" stroke-width="1.3" opacity="0.50"/>
  <path d="M0,85 Q90,80 185,85 Q280,90 375,85 Q440,80 500,85"
        fill="none" stroke="#40b0c8" stroke-width="1.0" opacity="0.38"/>

  <!-- Light filtering through mangroves -->
  <line x1="100" y1="68" x2="80"  y2="140" stroke="#b0e8f0" stroke-width="5" opacity="0.04"/>
  <line x1="250" y1="68" x2="230" y2="150" stroke="#b0e8f0" stroke-width="4" opacity="0.04"/>
  <line x1="390" y1="68" x2="370" y2="142" stroke="#b0e8f0" stroke-width="4" opacity="0.04"/>

  <!-- Muddy estuarine bottom -->
  <path d="M0,168 Q80,162 160,168 Q240,174 320,166 Q400,158 480,166 Q490,167 500,167 L500,195 L0,195 Z"
        fill="url(#mud30)"/>
  <!-- Mud texture -->
  <path d="M15,175 Q65,173 115,175" fill="none" stroke="#887060" stroke-width="0.8" opacity="0.48"/>
  <path d="M145,178 Q195,176 245,178" fill="none" stroke="#887060" stroke-width="0.8" opacity="0.48"/>
  <path d="M275,175 Q330,173 385,175" fill="none" stroke="#887060" stroke-width="0.8" opacity="0.48"/>
  <path d="M415,178 Q455,176 490,178" fill="none" stroke="#887060" stroke-width="0.8" opacity="0.48"/>

  <!-- Fish 1: 四指馬鮁 (Fourfinger threadfin, Eleutheronema tetradactylum) — distinctive thread-like pec fin rays -->
  <g transform="translate(260,115) rotate(-4)" opacity="0.91">
    <!-- Body: elongated, slightly blunt head -->
    <ellipse cx="0" cy="0" rx="30" ry="9" fill="#9898a0"/>
    <!-- Silver sheen -->
    <ellipse cx="3" cy="3" rx="24" ry="5" fill="#d8e0e8" opacity="0.45"/>
    <!-- Darker back -->
    <ellipse cx="0" cy="-5.5" rx="25" ry="3.5" fill="#707880" opacity="0.65"/>
    <!-- Dorsal fin (two separate) -->
    <path d="M-4,-9 L-2,-17 L3,-18 L7,-17 L9,-9" fill="none" stroke="#707880" stroke-width="1.4"/>
    <!-- Second dorsal (soft, longer) -->
    <path d="M9,-9 Q16,-14 22,-9" fill="none" stroke="#707880" stroke-width="1.3"/>
    <!-- Forked tail -->
    <path d="M-30,0 L-42,-14" stroke="#707880" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-30,0 L-42, 14" stroke="#707880" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Normal pectoral fin base -->
    <path d="M14,6 Q18,10 22,8" fill="none" stroke="#707880" stroke-width="1.2" opacity="0.7"/>
    <!-- Four trailing free pectoral-fin rays (DIAGNOSTIC! like fingers) -->
    <path d="M18,8 Q25,18 30,28" fill="none" stroke="#b0a890" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M20,8 Q28,20 35,32" fill="none" stroke="#b0a890" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M22,8 Q31,22 38,36" fill="none" stroke="#b0a890" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M24,7 Q34,24 42,38" fill="none" stroke="#b0a890" stroke-width="1.0" stroke-linecap="round"/>
    <!-- Anal fin -->
    <path d="M-8,9 Q0,15 8,9" fill="none" stroke="#707880" stroke-width="1.2"/>
    <!-- Eye -->
    <circle cx="26" cy="-1" r="3.5" fill="#181818"/>
    <circle cx="27" cy="-2" r="1.1" fill="#9898a8" opacity="0.5"/>
  </g>

  <!-- Fish 2: smaller, background -->
  <g transform="translate(140,130) rotate(-3)" opacity="0.80">
    <ellipse cx="0" cy="0" rx="22" ry="7" fill="#9898a0"/>
    <ellipse cx="2" cy="2.5" rx="18" ry="4" fill="#d8e0e8" opacity="0.40"/>
    <path d="M-3,-7 L0,-13 L4,-14 L7,-7" fill="none" stroke="#707880" stroke-width="1.2"/>
    <path d="M-22,0 L-31,-11" stroke="#707880" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M-22,0 L-31, 11" stroke="#707880" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Thread-like pec rays (3 visible) -->
    <path d="M14,6 Q19,14 23,21" fill="none" stroke="#b0a890" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M16,6 Q22,16 27,25" fill="none" stroke="#b0a890" stroke-width="1.0" stroke-linecap="round"/>
    <path d="M18,5 Q25,18 30,28" fill="none" stroke="#b0a890" stroke-width="0.9" stroke-linecap="round"/>
    <circle cx="19" cy="-0.5" r="2.8" fill="#181818"/>
  </g>

  <!-- Depth ruler (right side) — 0-32m, put it in water zone below y=68 -->
  <line x1="478" y1="68" x2="478" y2="168" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="68"  x2="478" y2="68"  stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="71"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="102" x2="478" y2="102" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="105" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">10</text>
  <line x1="474" y1="135" x2="478" y2="135" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="138" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">20</text>
  <line x1="474" y1="168" x2="478" y2="168" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="171" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">32</text>
  <text x="481" y="84" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="70" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">紅樹林河口 ／ 砂泥底沿岸</text>
  <text x="70" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">0–32 m；可入淡水</text>
  <text x="70" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">以蝦蟹・魚類・蠕蟲為食；高經濟價值</text>
  <text x="250" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度—西太平洋（台灣西南部養殖）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
