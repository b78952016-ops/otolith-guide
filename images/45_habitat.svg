<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea45" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5880"/>
      <stop offset="45%" stop-color="#0e3858"/>
      <stop offset="100%" stop-color="#081828"/>
    </linearGradient>
    <linearGradient id="sand45" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#988870"/>
      <stop offset="100%" stop-color="#605848"/>
    </linearGradient>
  </defs>

  <!-- Northeast Atlantic / Mediterranean — cooler, more muted blue-green -->
  <rect width="500" height="195" fill="url(#sea45)" rx="6"/>

  <!-- Choppy Atlantic surface waves -->
  <path d="M0,9 Q60,5 130,9 Q200,13 270,9 Q340,5 415,9 Q460,12 500,9"
        fill="none" stroke="#60c0d8" stroke-width="1.5" opacity="0.58"/>
  <path d="M0,20 Q70,15 148,20 Q226,25 305,20 Q384,15 500,20"
        fill="none" stroke="#48a8c8" stroke-width="1.0" opacity="0.45"/>
  <!-- Whitecap wave crests -->
  <path d="M60,9  Q72,6  84,9"  fill="none" stroke="#d0eef8" stroke-width="0.9" opacity="0.60"/>
  <path d="M250,9 Q262,6 274,9" fill="none" stroke="#d0eef8" stroke-width="0.9" opacity="0.55"/>
  <path d="M420,9 Q432,6 444,9" fill="none" stroke="#d0eef8" stroke-width="0.9" opacity="0.55"/>

  <!-- Night position marker (~10-35m, fish rise at night) -->
  <!-- Day position marker (~25-55m main school) — fish are shown at day depth -->

  <!-- Sandy bottom -->
  <path d="M0,168 Q80,162 160,168 Q240,174 320,166 Q400,158 480,166 Q490,167 500,167 L500,195 L0,195 Z"
        fill="url(#sand45)"/>
  <path d="M15,175 Q65,173 115,175" fill="none" stroke="#b8a878" stroke-width="0.7" opacity="0.45"/>
  <path d="M175,178 Q225,176 275,178" fill="none" stroke="#b8a878" stroke-width="0.7" opacity="0.45"/>
  <path d="M330,175 Q380,173 430,175" fill="none" stroke="#b8a878" stroke-width="0.7" opacity="0.45"/>

  <!-- Dense school of 沙丁魚 (Sardina pilchardus) — European sardine/pilchard -->
  <!-- School swims in tight formation at day depth (~30-40m zone, y≈100-130) -->
  <!-- Fish: small herring-like, silvery with blue-green back, dark opercular spot -->

  <!-- Row 1 of school -->
  <g transform="translate(180,110) rotate(-4)" opacity="0.90">
    <ellipse cx="0" cy="0" rx="16" ry="4" fill="#b0c8c0"/>
    <ellipse cx="0" cy="-2" rx="13" ry="1.8" fill="#3a6878" opacity="0.72"/>
    <ellipse cx="1" cy="2" rx="12" ry="1.5" fill="#d8e8e0" opacity="0.55"/>
    <!-- Dark spot near operculum (diagnostic for pilchard) -->
    <circle cx="13" cy="-1" r="1.4" fill="#283838" opacity="0.65"/>
    <path d="M-16,0 L-22,-6" stroke="#4a7888" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M-16,0 L-22, 6" stroke="#4a7888" stroke-width="2" stroke-linecap="round" fill="none"/>
    <circle cx="14" cy="-0.5" r="1.6" fill="#181818"/>
  </g>
  <g transform="translate(220,118) rotate(-4)" opacity="0.88">
    <ellipse cx="0" cy="0" rx="16" ry="4" fill="#b0c8c0"/>
    <ellipse cx="0" cy="-2" rx="13" ry="1.8" fill="#3a6878" opacity="0.70"/>
    <circle cx="13" cy="-1" r="1.4" fill="#283838" opacity="0.62"/>
    <path d="M-16,0 L-22,-6" stroke="#4a7888" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M-16,0 L-22, 6" stroke="#4a7888" stroke-width="2" stroke-linecap="round" fill="none"/>
    <circle cx="14" cy="-0.5" r="1.6" fill="#181818"/>
  </g>
  <g transform="translate(258,112) rotate(-3)" opacity="0.87">
    <ellipse cx="0" cy="0" rx="16" ry="4" fill="#b0c8c0"/>
    <ellipse cx="0" cy="-2" rx="13" ry="1.8" fill="#3a6878" opacity="0.70"/>
    <circle cx="13" cy="-1" r="1.4" fill="#283838" opacity="0.62"/>
    <path d="M-16,0 L-22,-6" stroke="#4a7888" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M-16,0 L-22, 6" stroke="#4a7888" stroke-width="2" stroke-linecap="round" fill="none"/>
    <circle cx="14" cy="-0.5" r="1.6" fill="#181818"/>
  </g>
  <g transform="translate(295,119) rotate(-3)" opacity="0.85">
    <ellipse cx="0" cy="0" rx="14" ry="3.5" fill="#b0c8c0"/>
    <ellipse cx="0" cy="-2" rx="11" ry="1.6" fill="#3a6878" opacity="0.68"/>
    <path d="M-14,0 L-19,-5" stroke="#4a7888" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M-14,0 L-19, 5" stroke="#4a7888" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <circle cx="12" cy="0" r="1.4" fill="#181818"/>
  </g>

  <!-- Row 2 of school (below) -->
  <g transform="translate(195,132) rotate(-5)" opacity="0.82">
    <ellipse cx="0" cy="0" rx="15" ry="3.8" fill="#b0c8c0"/>
    <ellipse cx="0" cy="-2" rx="12" ry="1.7" fill="#3a6878" opacity="0.65"/>
    <circle cx="12" cy="-1" r="1.3" fill="#283838" opacity="0.58"/>
    <path d="M-15,0 L-21,-6" stroke="#4a7888" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M-15,0 L-21, 6" stroke="#4a7888" stroke-width="2" stroke-linecap="round" fill="none"/>
    <circle cx="13" cy="0" r="1.5" fill="#181818"/>
  </g>
  <g transform="translate(240,140) rotate(-5)" opacity="0.80">
    <ellipse cx="0" cy="0" rx="15" ry="3.8" fill="#b0c8c0"/>
    <ellipse cx="0" cy="-2" rx="12" ry="1.7" fill="#3a6878" opacity="0.62"/>
    <path d="M-15,0 L-21,-6" stroke="#4a7888" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M-15,0 L-21, 6" stroke="#4a7888" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <circle cx="13" cy="0" r="1.5" fill="#181818"/>
  </g>
  <g transform="translate(278,135) rotate(-4)" opacity="0.78">
    <ellipse cx="0" cy="0" rx="14" ry="3.5" fill="#b0c8c0"/>
    <path d="M-14,0 L-19,-5" stroke="#4a7888" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M-14,0 L-19, 5" stroke="#4a7888" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <circle cx="12" cy="0" r="1.4" fill="#181818"/>
  </g>

  <!-- Night vs day position arrows -->
  <text x="12" y="98" fill="#4a80a8" font-size="7.5" font-family="Microsoft JhengHei,sans-serif" opacity="0.70">夜間↑10–35m</text>
  <text x="12" y="120" fill="#c9a84c" font-size="7.5" font-family="Microsoft JhengHei,sans-serif" opacity="0.80">日間↓25–55m</text>

  <!-- Depth ruler -->
  <line x1="478" y1="9" x2="478" y2="168" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="9"   x2="478" y2="9"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="12"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="62"  x2="478" y2="62"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="65"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">25</text>
  <line x1="474" y1="115" x2="478" y2="115" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="118" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">50</text>
  <line x1="474" y1="168" x2="478" y2="168" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="171" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">75</text>
  <text x="481" y="26" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">東北大西洋・地中海中上層</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">0–75 m（日25–55m；夜10–35m）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">大型密集魚群；以浮游甲殼類為食</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">東北大西洋及地中海（台灣無分布，進口魚種）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
