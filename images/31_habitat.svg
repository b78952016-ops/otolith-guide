<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea31" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1060a0"/>
      <stop offset="40%" stop-color="#083870"/>
      <stop offset="80%" stop-color="#041828"/>
      <stop offset="100%" stop-color="#020c18"/>
    </linearGradient>
    <linearGradient id="sand31" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a09880"/>
      <stop offset="100%" stop-color="#687058"/>
    </linearGradient>
  </defs>

  <!-- Coastal sandy-mud sea, 15–40 m -->
  <rect width="500" height="195" fill="url(#sea31)" rx="6"/>

  <!-- Surface shimmer -->
  <path d="M0,8 Q80,5 165,8 Q250,11 335,8 Q415,5 500,8"
        fill="none" stroke="#50b8d0" stroke-width="1.2" opacity="0.44"/>

  <!-- Light shafts -->
  <line x1="155" y1="8" x2="126" y2="158" stroke="#b8d8ff" stroke-width="10" opacity="0.05"/>

  <!-- Sandy-mud bottom -->
  <path d="M0,162 Q70,156 150,162 Q240,168 320,160 Q410,154 490,160 L500,160 L500,195 L0,195 Z"
        fill="url(#sand31)"/>
  <path d="M20,168 Q70,166 120,168" fill="none" stroke="#808060" stroke-width="0.7" opacity="0.38"/>
  <path d="M170,170 Q220,168 270,170" fill="none" stroke="#808060" stroke-width="0.7" opacity="0.36"/>
  <path d="M310,168 Q360,166 420,168" fill="none" stroke="#808060" stroke-width="0.7" opacity="0.36"/>

  <!-- Fish: 烏鯧 Parastromateus niger (Black pomfret) -->
  <!-- Carangidae: very deep oval-compressed; VERY DARK brownish-black;
       NO pelvic fins (diagnostic!); long falcate dorsal + anal fins;
       deeply forked caudal; sandy-mud 15–40 m -->

  <!-- Main fish (foreground) -->
  <g transform="translate(242,108) rotate(-6)" opacity="0.93">
    <!-- Body: very deep oval, VERY DARK -->
    <ellipse cx="0" cy="0" rx="26" ry="22" fill="#1a1e14"/>
    <!-- Faint darker mottling on back -->
    <ellipse cx="0" cy="-13" rx="20" ry="8" fill="#0e1008" opacity="0.55"/>
    <!-- Caudal peduncle (narrow relative to deep body) -->
    <ellipse cx="-23" cy="0" rx="5" ry="15" fill="#12160e" opacity="0.85"/>
    <!-- Head (small relative to very deep body) -->
    <ellipse cx="23" cy="0" rx="7.5" ry="13" fill="#12160e"/>
    <!-- Small terminal mouth -->
    <path d="M30,-1 Q33,2 30,5" fill="none" stroke="#0c1008" stroke-width="1.1" stroke-linecap="round"/>
    <!-- Eye: moderate -->
    <circle cx="25" cy="-4" r="3.5" fill="#101010"/>
    <circle cx="26" cy="-5" r="1.2" fill="#505858" opacity="0.35"/>
    <!-- Long falcate dorsal fin -->
    <path d="M-22,-22 Q-10,-38 0,-40 Q10,-38 18,-28 Q22,-22 23,-16"
          fill="none" stroke="#0e1208" stroke-width="1.5"/>
    <!-- Long falcate anal fin (mirrors dorsal) -->
    <path d="M-18,22 Q-6,38 3,40 Q12,37 18,28 Q22,21 23,16"
          fill="none" stroke="#0e1208" stroke-width="1.4"/>
    <!-- NO pelvic fins (Parastromateus diagnostic!) -->
    <!-- Small pectoral fin -->
    <path d="M18,8 Q25,16 25,7" fill="none" stroke="#0e1208" stroke-width="1.1" opacity="0.68"/>
    <!-- DEEPLY forked caudal with long lobes -->
    <path d="M-28,0 L-46,-24" stroke="#0e1208" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-28,0 L-46, 24" stroke="#0e1208" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-46,-24 Q-36,0 -46,24" fill="none" stroke="#0e1208" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- Fish 2 -->
  <g transform="translate(135,128) rotate(-5)" opacity="0.80">
    <ellipse cx="0" cy="0" rx="21" ry="18" fill="#1a1e14"/>
    <ellipse cx="-19" cy="0" rx="4" ry="12" fill="#12160e" opacity="0.85"/>
    <ellipse cx="19" cy="0" rx="6" ry="11" fill="#12160e"/>
    <circle cx="20" cy="-3" r="2.8" fill="#101010"/>
    <path d="M-18,-18 Q-8,-32 0,-34 Q8,-31 14,-23 Q18,-18 19,-13" fill="none" stroke="#0e1208" stroke-width="1.3"/>
    <path d="M-14,18 Q-4,31 3,33 Q10,30 15,23 Q18,17 19,13" fill="none" stroke="#0e1208" stroke-width="1.2"/>
    <path d="M-23,0 L-38,-20" stroke="#0e1208" stroke-width="3.0" stroke-linecap="round" fill="none"/>
    <path d="M-23,0 L-38, 20" stroke="#0e1208" stroke-width="3.0" stroke-linecap="round" fill="none"/>
    <path d="M-38,-20 Q-30,0 -38,20" fill="none" stroke="#0e1208" stroke-width="1.9" stroke-linecap="round"/>
  </g>

  <!-- Fish 3 -->
  <g transform="translate(385,123) rotate(-4)" opacity="0.65">
    <ellipse cx="0" cy="0" rx="17" ry="14" fill="#1a1e14"/>
    <ellipse cx="-15" cy="0" rx="3.5" ry="9" fill="#12160e" opacity="0.85"/>
    <ellipse cx="15" cy="0" rx="5" ry="9" fill="#12160e"/>
    <circle cx="16" cy="-2" r="2.3" fill="#101010"/>
    <path d="M-15,-14 Q-7,-24 0,-26 Q7,-23 11,-17 Q13,-13 15,-10" fill="none" stroke="#0e1208" stroke-width="1.1"/>
    <path d="M-12,14 Q-4,23 2,24 Q8,22 12,15" fill="none" stroke="#0e1208" stroke-width="1.1"/>
    <path d="M-18,0 L-30,-15" stroke="#0e1208" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M-18,0 L-30, 15" stroke="#0e1208" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Depth ruler (0–40 m) -->
  <line x1="478" y1="8" x2="478" y2="160" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="8"   x2="478" y2="8"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="11"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="84"  x2="478" y2="84"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="87"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">20</text>
  <line x1="474" y1="160" x2="478" y2="160" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="163" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">40</text>
  <text x="481" y="24" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">沿岸砂泥底・中底層</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">15–40 m；深橢圓烏黑體・無腹鰭（診斷）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食浮游動物；白天底層・夜間上浮</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度－西太平洋（台灣西南沿岸）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
