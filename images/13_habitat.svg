<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea13" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="30%" stop-color="#0e2038"/>
      <stop offset="100%" stop-color="#06101e"/>
    </linearGradient>
    <linearGradient id="sand13" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a8860"/>
      <stop offset="100%" stop-color="#6a5838"/>
    </linearGradient>
  </defs>

  <!-- Water body -->
  <rect width="500" height="195" fill="url(#sea13)" rx="6"/>

  <!-- Surface shimmer at very top -->
  <path d="M0,8 Q80,5 160,8 Q240,11 320,8 Q400,5 500,8"
        fill="none" stroke="#3abcd8" stroke-width="1.4" opacity="0.55"/>
  <path d="M0,18 Q90,13 185,18 Q275,23 365,18 Q435,13 500,18"
        fill="none" stroke="#2aa8c8" stroke-width="1.0" opacity="0.38"/>

  <!-- Marine snow -->
  <circle cx="70"  cy="45"  r="0.9" fill="#ffffff" opacity="0.18"/>
  <circle cx="170" cy="70"  r="0.8" fill="#ffffff" opacity="0.15"/>
  <circle cx="260" cy="40"  r="1.0" fill="#ffffff" opacity="0.18"/>
  <circle cx="350" cy="65"  r="0.8" fill="#ffffff" opacity="0.15"/>
  <circle cx="430" cy="48"  r="0.9" fill="#ffffff" opacity="0.18"/>

  <!-- Sandy-mud bottom -->
  <path d="M0,170 Q80,164 160,170 Q240,176 320,168 Q400,160 480,168 Q490,169 500,169 L500,195 L0,195 Z"
        fill="url(#sand13)"/>
  <!-- Sand texture -->
  <path d="M10,178 Q70,176 130,178" fill="none" stroke="#b0a078" stroke-width="0.7" opacity="0.55"/>
  <path d="M160,181 Q220,179 280,181" fill="none" stroke="#b0a078" stroke-width="0.7" opacity="0.55"/>
  <path d="M310,178 Q370,176 430,178" fill="none" stroke="#b0a078" stroke-width="0.7" opacity="0.55"/>

  <!-- 馬頭魚 burrow in sandy bottom -->
  <!-- Burrow entrance (hole in sand, left side) -->
  <ellipse cx="140" cy="172" rx="16" ry="6" fill="#40301a" opacity="0.85"/>
  <ellipse cx="140" cy="174" rx="12" ry="4" fill="#281e10" opacity="0.90"/>
  <!-- Sand mound around burrow -->
  <path d="M118,170 Q130,165 152,170" fill="none" stroke="#c0a870" stroke-width="3" opacity="0.45"/>

  <!-- Burrow annotation arrow -->
  <defs>
    <marker id="arr13" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" fill="#c9a84c"/>
    </marker>
  </defs>
  <line x1="185" y1="155" x2="155" y2="169" stroke="#c9a84c" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr13)"/>
  <text x="187" y="153" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">砂中掘穴棲居</text>

  <!-- Fish 1: 日本馬頭魚 (Branchiostegus japonicus) — distinctive flat head, pinkish-red -->
  <!-- Hovering near burrow entrance -->
  <g transform="translate(265,118) rotate(-3)" opacity="0.91">
    <!-- Body: oval, pinkish-red back, yellowish below -->
    <ellipse cx="0" cy="0" rx="28" ry="10" fill="#c06050"/>
    <!-- Yellow/cream belly zone -->
    <ellipse cx="4" cy="5" rx="20" ry="5" fill="#e8c878" opacity="0.55"/>
    <!-- Dorsal fin (first spiny part, prominent) -->
    <path d="M-10,-10 Q-4,-20 6,-10" fill="none" stroke="#a04030" stroke-width="1.5"/>
    <!-- Soft dorsal (longer, trailing) -->
    <path d="M6,-10 Q16,-16 24,-10" fill="none" stroke="#a04030" stroke-width="1.3"/>
    <!-- Caudal fin (rounded to truncate) -->
    <path d="M-28,0 L-40,-10" stroke="#a04030" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M-28,0 L-40, 10" stroke="#a04030" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <!-- Pectoral fin -->
    <path d="M10,8 Q18,16 24,11" fill="none" stroke="#a04030" stroke-width="1.3" opacity="0.8"/>
    <!-- Pelvic fin (long, characteristic) -->
    <path d="M6,10 L12,22" stroke="#a04030" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- Anal fin -->
    <path d="M-8,10 Q0,16 8,10" fill="none" stroke="#a04030" stroke-width="1.2"/>
    <!-- Eye -->
    <circle cx="24" cy="-1" r="3.8" fill="#181010"/>
    <circle cx="25" cy="-2" r="1.2" fill="#c0a080" opacity="0.5"/>
  </g>

  <!-- Fish 2: smaller, background -->
  <g transform="translate(385,133) rotate(-2)" opacity="0.78">
    <ellipse cx="0" cy="0" rx="21" ry="8" fill="#c06050"/>
    <ellipse cx="3" cy="4" rx="15" ry="4" fill="#e8c878" opacity="0.50"/>
    <path d="M-7,-8 Q-2,-16 5,-8" fill="none" stroke="#a04030" stroke-width="1.3"/>
    <path d="M5,-8 Q12,-13 18,-8" fill="none" stroke="#a04030" stroke-width="1.2"/>
    <path d="M-21,0 L-30,-8" stroke="#a04030" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-21,0 L-30, 8" stroke="#a04030" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <circle cx="18" cy="-0.5" r="3" fill="#181010"/>
  </g>

  <!-- Depth ruler (right side) — 0-200m -->
  <line x1="478" y1="7" x2="478" y2="180" stroke="#3a5070" stroke-width="1"/>
  <!-- 0 m -->
  <line x1="474" y1="7" x2="478" y2="7" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="10" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <!-- 50 m -->
  <line x1="474" y1="50" x2="478" y2="50" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="53" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">50</text>
  <!-- 100 m -->
  <line x1="474" y1="94" x2="478" y2="94" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="97" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">100</text>
  <!-- 150 m -->
  <line x1="474" y1="137" x2="478" y2="137" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="140" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">150</text>
  <!-- 200 m -->
  <line x1="474" y1="180" x2="478" y2="180" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="183" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">200</text>
  <text x="481" y="24" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">砂泥底質 ／ 沿海斜坡</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">30–200 m</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">掘洞藏居，以小魚蝦為食</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">日本至南海・爪哇海</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
