<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea29" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1870b8"/>
      <stop offset="35%" stop-color="#0e5090"/>
      <stop offset="75%" stop-color="#062038"/>
      <stop offset="100%" stop-color="#030e1c"/>
    </linearGradient>
  </defs>

  <!-- Near-shore pelagic, 15–200 m -->
  <rect width="500" height="195" fill="url(#sea29)" rx="6"/>

  <!-- Surface shimmer (two lines) -->
  <path d="M0,7 Q80,4 165,7 Q250,10 335,7 Q415,4 500,7"
        fill="none" stroke="#60d0e8" stroke-width="1.5" opacity="0.58"/>
  <path d="M0,17 Q90,13 185,17 Q280,21 370,17 Q445,13 500,17"
        fill="none" stroke="#40b0d0" stroke-width="1.0" opacity="0.40"/>

  <!-- Light shafts (clear open ocean) -->
  <line x1="155" y1="7" x2="120" y2="158" stroke="#c0e8ff" stroke-width="14" opacity="0.06"/>
  <line x1="380" y1="7" x2="350" y2="158" stroke="#c0e8ff" stroke-width="9"  opacity="0.04"/>

  <!-- Marine snow (open ocean) -->
  <circle cx="90"  cy="55"  r="0.9" fill="#ffffff" opacity="0.15"/>
  <circle cx="210" cy="38"  r="0.8" fill="#ffffff" opacity="0.13"/>
  <circle cx="340" cy="70"  r="0.8" fill="#ffffff" opacity="0.13"/>
  <circle cx="450" cy="45"  r="0.7" fill="#ffffff" opacity="0.11"/>

  <!-- Fish: 臺灣馬加鰆 Scomberomorus guttatus (Indo-Pacific Spanish mackerel) -->
  <!-- Scombridae: VERY ELONGATED torpedo; iridescent blue-green back;
       ROWS OF BROWNISH ROUND SPOTS on sides (3 irregular rows — diagnostic!);
       first dorsal tall+spiny (folds into groove); small finlets (8-9) after 2nd dorsal+anal;
       deeply forked lunate caudal; 15–200 m near-shore pelagic -->

  <!-- Main fish (foreground, slightly angled) -->
  <g transform="translate(245,98) rotate(-5)" opacity="0.93">
    <!-- Body: very elongated torpedo -->
    <ellipse cx="0" cy="0" rx="52" ry="10" fill="#b8c0b0"/>
    <!-- Iridescent blue-green back (top third) -->
    <ellipse cx="2" cy="-6" rx="46" ry="4.5" fill="#2a5848" opacity="0.78"/>
    <!-- Silver flanks -->
    <ellipse cx="4" cy="2" rx="42" ry="5" fill="#e0e8e0" opacity="0.40"/>
    <!-- BROWNISH SPOTS — row 1 (mid-lateral, larger) -->
    <circle cx="32" cy="-1" r="3.0" fill="#6a4820" opacity="0.70"/>
    <circle cx="18" cy="-1" r="2.8" fill="#6a4820" opacity="0.68"/>
    <circle cx="4"  cy="-2" r="2.8" fill="#6a4820" opacity="0.66"/>
    <circle cx="-10" cy="-2" r="2.6" fill="#6a4820" opacity="0.64"/>
    <circle cx="-22" cy="-2" r="2.4" fill="#6a4820" opacity="0.60"/>
    <!-- BROWNISH SPOTS — row 2 (upper row, smaller) -->
    <circle cx="38" cy="-5" r="2.0" fill="#6a4820" opacity="0.55"/>
    <circle cx="24" cy="-5" r="2.0" fill="#6a4820" opacity="0.54"/>
    <circle cx="10" cy="-5" r="1.8" fill="#6a4820" opacity="0.52"/>
    <circle cx="-4"  cy="-5" r="1.8" fill="#6a4820" opacity="0.50"/>
    <circle cx="-17" cy="-5" r="1.6" fill="#6a4820" opacity="0.48"/>
    <!-- BROWNISH SPOTS — row 3 (lower row, smaller) -->
    <circle cx="28" cy="3"  r="1.8" fill="#6a4820" opacity="0.50"/>
    <circle cx="14" cy="3"  r="1.8" fill="#6a4820" opacity="0.48"/>
    <circle cx="0"  cy="3"  r="1.6" fill="#6a4820" opacity="0.46"/>
    <circle cx="-13" cy="3" r="1.6" fill="#6a4820" opacity="0.44"/>
    <!-- Caudal peduncle (narrow, with keels) -->
    <ellipse cx="-47" cy="0" rx="6" ry="7" fill="#90a898" opacity="0.82"/>
    <!-- Lateral keels hint -->
    <line x1="-42" y1="-3" x2="-52" y2="-3" stroke="#607870" stroke-width="1.0" opacity="0.55"/>
    <line x1="-42" y1=" 3" x2="-52" y2=" 3" stroke="#607870" stroke-width="1.0" opacity="0.55"/>
    <!-- Head: pointed snout -->
    <ellipse cx="49" cy="0" rx="12" ry="10" fill="#90a898"/>
    <!-- Large oblique mouth -->
    <path d="M60,-2 Q64,1 60,5" fill="none" stroke="#4a6858" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Eye: small (streamlined fish) -->
    <circle cx="52" cy="-3" r="3.0" fill="#181818"/>
    <circle cx="53" cy="-4" r="1.0" fill="#70a888" opacity="0.38"/>
    <!-- First dorsal fin (high, spiny — 16-18 spines) -->
    <path d="M42,-10 Q34,-22 24,-24 Q16,-22 8,-16 Q2,-10 0,-8"
          fill="none" stroke="#2a4838" stroke-width="1.3"/>
    <!-- First dorsal detail spines -->
    <line x1="42" y1="-10" x2="40" y2="-20" stroke="#2a4838" stroke-width="0.7" opacity="0.50"/>
    <line x1="36" y1="-10" x2="33" y2="-22" stroke="#2a4838" stroke-width="0.7" opacity="0.50"/>
    <line x1="28" y1="-9" x2="24" y2="-22" stroke="#2a4838" stroke-width="0.7" opacity="0.50"/>
    <line x1="20" y1="-9" x2="16" y2="-20" stroke="#2a4838" stroke-width="0.7" opacity="0.45"/>
    <!-- Second dorsal fin (shorter soft rays) -->
    <path d="M-26,-8 Q-30,-13 -34,-11 Q-37,-8 -38,-6" fill="none" stroke="#2a4838" stroke-width="1.2"/>
    <!-- FINLETS after second dorsal (8 small finlets) -->
    <line x1="-40" y1="-6" x2="-41" y2="-10" stroke="#2a4838" stroke-width="1.0" opacity="0.68"/>
    <line x1="-43" y1="-5" x2="-44" y2="-9" stroke="#2a4838" stroke-width="0.9" opacity="0.62"/>
    <line x1="-46" y1="-4" x2="-47" y2="-8" stroke="#2a4838" stroke-width="0.9" opacity="0.58"/>
    <line x1="-49" y1="-3" x2="-50" y2="-7" stroke="#2a4838" stroke-width="0.8" opacity="0.52"/>
    <!-- Anal fin -->
    <path d="M-26,8 Q-30,13 -34,11 Q-37,8 -38,6" fill="none" stroke="#2a4838" stroke-width="1.2"/>
    <!-- FINLETS after anal fin -->
    <line x1="-40" y1="6" x2="-41" y2="10" stroke="#2a4838" stroke-width="1.0" opacity="0.68"/>
    <line x1="-43" y1="5" x2="-44" y2="9" stroke="#2a4838" stroke-width="0.9" opacity="0.62"/>
    <line x1="-46" y1="4" x2="-47" y2="8" stroke="#2a4838" stroke-width="0.9" opacity="0.58"/>
    <line x1="-49" y1="3" x2="-50" y2="7" stroke="#2a4838" stroke-width="0.8" opacity="0.52"/>
    <!-- Pectoral fin (small, fan) -->
    <path d="M44,5 Q54,12 56,5" fill="none" stroke="#3a5848" stroke-width="1.2" opacity="0.68"/>
    <!-- DEEPLY FORKED LUNATE tail (narrow lobes) -->
    <path d="M-53,0 L-65,-13" stroke="#2a4838" stroke-width="3.8" stroke-linecap="round" fill="none"/>
    <path d="M-53,0 L-65, 13" stroke="#2a4838" stroke-width="3.8" stroke-linecap="round" fill="none"/>
    <path d="M-65,-13 Q-69,0 -65,13" fill="none" stroke="#2a4838" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Fish 2 (background, smaller) -->
  <g transform="translate(140,128) rotate(-4)" opacity="0.78">
    <ellipse cx="0" cy="0" rx="40" ry="8" fill="#b8c0b0"/>
    <ellipse cx="2" cy="-5" rx="35" ry="3.5" fill="#2a5848" opacity="0.72"/>
    <!-- Spots row 1 -->
    <circle cx="22" cy="-1" r="2.2" fill="#6a4820" opacity="0.65"/>
    <circle cx="10" cy="-1" r="2.2" fill="#6a4820" opacity="0.62"/>
    <circle cx="-2"  cy="-1" r="2.0" fill="#6a4820" opacity="0.60"/>
    <circle cx="-14" cy="-1" r="1.8" fill="#6a4820" opacity="0.58"/>
    <!-- Spots row 2 -->
    <circle cx="28" cy="-4" r="1.5" fill="#6a4820" opacity="0.50"/>
    <circle cx="16" cy="-4" r="1.4" fill="#6a4820" opacity="0.48"/>
    <circle cx="4"  cy="-4" r="1.4" fill="#6a4820" opacity="0.46"/>
    <circle cx="-8" cy="-4" r="1.3" fill="#6a4820" opacity="0.44"/>
    <ellipse cx="-36" cy="0" rx="4.5" ry="5.5" fill="#90a898" opacity="0.80"/>
    <ellipse cx="37" cy="0" rx="9" ry="8" fill="#90a898"/>
    <circle cx="39" cy="-2" r="2.4" fill="#181818"/>
    <path d="M30,-8 Q22,-17 14,-18 Q8,-16 3,-12 Q0,-8 0,-6" fill="none" stroke="#2a4838" stroke-width="1.1"/>
    <path d="M-38,0 L-49,-10" stroke="#2a4838" stroke-width="3.0" stroke-linecap="round" fill="none"/>
    <path d="M-38,0 L-49, 10" stroke="#2a4838" stroke-width="3.0" stroke-linecap="round" fill="none"/>
    <path d="M-49,-10 Q-53,0 -49,10" fill="none" stroke="#2a4838" stroke-width="2.0" stroke-linecap="round"/>
  </g>

  <!-- Depth ruler (0–200 m) -->
  <line x1="478" y1="7" x2="478" y2="158" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="7"   x2="478" y2="7"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="10"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="59"  x2="478" y2="59"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="62"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">60</text>
  <line x1="474" y1="110" x2="478" y2="110" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="113" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">130</text>
  <line x1="474" y1="158" x2="478" y2="158" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="161" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">200</text>
  <text x="481" y="24" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">近岸大陸棚・中上層</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">15–200 m；魚側三列褐色圓斑（診斷）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食小魚・烏賊；高速獵食</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度－西太平洋（台灣各沿岸・波斯灣至日本）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
