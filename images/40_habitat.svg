<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea40" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a7068"/>
      <stop offset="40%" stop-color="#1a4848"/>
      <stop offset="100%" stop-color="#0e2830"/>
    </linearGradient>
    <linearGradient id="sand40" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a09870"/>
      <stop offset="100%" stop-color="#6a6040"/>
    </linearGradient>
  </defs>

  <!-- Coastal murky water -->
  <rect width="500" height="195" fill="url(#sea40)" rx="6"/>

  <!-- Surface shimmer -->
  <path d="M0,8 Q80,5 165,8 Q250,11 335,8 Q415,5 500,8"
        fill="none" stroke="#60c8b0" stroke-width="1.3" opacity="0.48"/>
  <path d="M0,18 Q90,13 185,18 Q280,23 370,18 Q440,13 500,18"
        fill="none" stroke="#48b0a0" stroke-width="1.0" opacity="0.36"/>

  <!-- Turbidity (coastal estuarine water) -->
  <ellipse cx="250" cy="100" rx="240" ry="55" fill="#2a7060" opacity="0.10"/>
  <!-- Suspended sediment particles -->
  <circle cx="75"  cy="60"  r="0.8" fill="#a0c898" opacity="0.20"/>
  <circle cx="190" cy="45"  r="0.9" fill="#a0c898" opacity="0.18"/>
  <circle cx="330" cy="70"  r="0.8" fill="#a0c898" opacity="0.20"/>
  <circle cx="430" cy="50"  r="0.7" fill="#a0c898" opacity="0.17"/>
  <circle cx="140" cy="110" r="0.8" fill="#a0c898" opacity="0.16"/>
  <circle cx="380" cy="105" r="0.9" fill="#a0c898" opacity="0.17"/>

  <!-- Sandy-mud bottom (prominent) -->
  <path d="M0,158 Q80,152 160,158 Q240,164 320,156 Q400,148 480,156 Q490,157 500,157 L500,195 L0,195 Z"
        fill="url(#sand40)"/>
  <!-- Mud texture -->
  <path d="M15,165 Q65,163 115,165" fill="none" stroke="#c0b080" stroke-width="0.9" opacity="0.48"/>
  <path d="M145,168 Q195,166 245,168" fill="none" stroke="#c0b080" stroke-width="0.9" opacity="0.48"/>
  <path d="M280,165 Q335,163 390,165" fill="none" stroke="#c0b080" stroke-width="0.9" opacity="0.48"/>
  <path d="M420,168 Q460,166 492,168" fill="none" stroke="#c0b080" stroke-width="0.8" opacity="0.45"/>

  <!-- Fish 1: 窄體舌鰨 (Cynoglossus gracilis) — elongated tongue sole, flat camouflaged flatfish -->
  <!-- Lying nearly flat on sandy bottom, both eyes on left (upper) side -->
  <g transform="translate(240,140) rotate(-3)" opacity="0.92">
    <!-- Body: very elongated, tongue-shaped (much longer than wide) -->
    <ellipse cx="0" cy="0" rx="52" ry="8" fill="#9a8860"/>
    <!-- Eyed side camouflage pattern (brown mottling) -->
    <ellipse cx="15"  cy="-2" rx="8"  ry="3.5" fill="#806040" opacity="0.35"/>
    <ellipse cx="-5"  cy="-3" rx="7"  ry="3"   fill="#806040" opacity="0.32"/>
    <ellipse cx="-22" cy="-1" rx="8"  ry="3"   fill="#806040" opacity="0.30"/>
    <ellipse cx="35"  cy="-3" rx="6"  ry="3"   fill="#806040" opacity="0.30"/>
    <!-- Darker back margin -->
    <path d="M-50,-4 Q0,-10 50,-4" fill="none" stroke="#604828" stroke-width="0.8" opacity="0.45"/>
    <!-- Continuous dorsal fin (runs nearly full body length) -->
    <path d="M-46,-8 Q-20,-14 0,-14 Q20,-14 46,-8" fill="none" stroke="#806040" stroke-width="1.1"/>
    <!-- Anal fin (lower, continuous) -->
    <path d="M-40,8 Q0,12 40,8" fill="none" stroke="#806040" stroke-width="1.1"/>
    <!-- Head pointed, blunt, no distinct tail fin (pointed end) -->
    <!-- Both eyes on same side (sinistral flatfish — left side) -->
    <circle cx="46" cy="-3" r="3.0" fill="#181818"/>
    <circle cx="40" cy="-5" r="2.5" fill="#181818"/>
    <circle cx="47" cy="-3.5" r="0.9" fill="#a09870" opacity="0.5"/>
    <circle cx="41" cy="-5.5" r="0.8" fill="#a09870" opacity="0.5"/>
    <!-- Sandy camouflage shadow below fish -->
    <ellipse cx="0" cy="6" rx="50" ry="4" fill="#806040" opacity="0.18"/>
  </g>

  <!-- Fish 2: smaller, near bottom, partial camouflage -->
  <g transform="translate(90,150) rotate(-5)" opacity="0.80">
    <ellipse cx="0" cy="0" rx="38" ry="6" fill="#9a8860"/>
    <ellipse cx="10"  cy="-2" rx="6" ry="2.5" fill="#806040" opacity="0.30"/>
    <ellipse cx="-10" cy="-2" rx="6" ry="2.5" fill="#806040" opacity="0.28"/>
    <path d="M-36,-6 Q0,-10 36,-6" fill="none" stroke="#806040" stroke-width="0.9"/>
    <path d="M-30,6 Q0,9 30,6"  fill="none" stroke="#806040" stroke-width="0.9"/>
    <circle cx="34" cy="-2" r="2.4" fill="#181818"/>
    <circle cx="29" cy="-4" r="2.0" fill="#181818"/>
  </g>

  <!-- Depth ruler -->
  <line x1="478" y1="8" x2="478" y2="158" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="8"   x2="478" y2="8"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="11"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="58"  x2="478" y2="58"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="61"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">20</text>
  <line x1="474" y1="108" x2="478" y2="108" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="111" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">40</text>
  <line x1="474" y1="158" x2="478" y2="158" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="161" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">60</text>
  <text x="481" y="25" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">砂泥底近海大陸棚</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">0–60 m；可進入河口域覓食</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">體色擬沙底；食底棲無脊椎動物</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">西北太平洋（南海・台灣・東海至韓國）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
