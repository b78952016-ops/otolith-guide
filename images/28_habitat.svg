<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea28" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1888c0"/>
      <stop offset="40%" stop-color="#0e6090"/>
      <stop offset="100%" stop-color="#0a3060"/>
    </linearGradient>
    <linearGradient id="sand28" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0a068"/>
      <stop offset="100%" stop-color="#786840"/>
    </linearGradient>
  </defs>

  <!-- Open tropical ocean (surface) -->
  <rect width="500" height="195" fill="url(#sea28)" rx="6"/>

  <!-- Active surface (common habitat is 5-10m, near surface) -->
  <path d="M0,8 Q80,5 165,8 Q250,11 335,8 Q415,5 500,8"
        fill="none" stroke="#70e8ff" stroke-width="1.8" opacity="0.68"/>
  <path d="M0,18 Q90,13 185,18 Q280,23 370,18 Q440,13 500,18"
        fill="none" stroke="#55d0f0" stroke-width="1.2" opacity="0.52"/>
  <path d="M0,30 Q100,25 200,30 Q300,35 400,30 Q450,27 500,30"
        fill="none" stroke="#40b8d8" stroke-width="1.0" opacity="0.38"/>

  <!-- Driftwood / floating log at surface -->
  <path d="M130,8 Q160,6 200,9 Q240,11 265,8 Q285,6 290,9 L288,16 Q280,18 250,15 Q220,13 190,16 Q165,18 148,15 L130,12 Z"
        fill="#7a5828" opacity="0.90"/>
  <!-- Wood grain texture -->
  <path d="M145,10 Q175,10 205,11 Q235,12 265,10" fill="none" stroke="#604018" stroke-width="0.8" opacity="0.55"/>
  <path d="M148,13 Q178,13 208,14 Q238,15 266,13" fill="none" stroke="#604018" stroke-width="0.6" opacity="0.45"/>
  <!-- Algae/barnacles on log -->
  <ellipse cx="160" cy="9"  rx="6"  ry="2.5" fill="#3a6018" opacity="0.55"/>
  <ellipse cx="195" cy="10" rx="5"  ry="2"   fill="#3a6018" opacity="0.50"/>
  <ellipse cx="235" cy="9"  rx="4"  ry="2"   fill="#3a6018" opacity="0.50"/>
  <ellipse cx="268" cy="9"  rx="4"  ry="2"   fill="#3a6018" opacity="0.50"/>

  <!-- Light shafts (clear blue water) -->
  <line x1="100" y1="10" x2="65"  y2="130" stroke="#d0f0ff" stroke-width="10" opacity="0.06"/>
  <line x1="380" y1="10" x2="345" y2="135" stroke="#d0f0ff" stroke-width="8"  opacity="0.05"/>

  <!-- Sandy/open ocean bottom (distant, at deeper extent) -->
  <path d="M0,172 Q80,167 160,172 Q240,177 320,170 Q400,163 480,170 Q490,171 500,171 L500,195 L0,195 Z"
        fill="url(#sand28)"/>
  <!-- Faint sand texture -->
  <path d="M20,179 Q80,177 140,179" fill="none" stroke="#c0a870" stroke-width="0.6" opacity="0.45"/>
  <path d="M200,182 Q260,180 320,182" fill="none" stroke="#c0a870" stroke-width="0.6" opacity="0.45"/>

  <!-- Fish 1: 鬼頭刀 (Mahi-mahi, Coryphaena hippurus) — distinctive steep blunt forehead, long dorsal -->
  <g transform="translate(270,70) rotate(-7)" opacity="0.91">
    <!-- Body: elongated, tapering sharply to tail -->
    <ellipse cx="0" cy="0" rx="40" ry="10" fill="#3888a0"/>
    <!-- Golden-yellow lower flank -->
    <ellipse cx="4" cy="5" rx="32" ry="5.5" fill="#d0c040" opacity="0.50"/>
    <!-- Brilliant blue-green upper body -->
    <ellipse cx="0" cy="-6" rx="34" ry="4" fill="#2868c0" opacity="0.60"/>
    <!-- LONG dorsal fin from head all the way to tail (diagnostic!) -->
    <path d="M36,-10 Q24,-18 8,-16 Q-5,-16 -20,-14 Q-32,-12 -40,-10"
          fill="none" stroke="#1858a8" stroke-width="1.5"/>
    <!-- Steep blunt forehead (male characteristic) -->
    <path d="M36,0 Q40,-5 40,-10 Q40,-14 38,-10" fill="#4898b8" stroke="#3878a0" stroke-width="0.7"/>
    <!-- Forked sickle-shaped tail -->
    <path d="M-40,0 L-56,-20" stroke="#1858a8" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-40,0 L-56, 20" stroke="#1858a8" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Pectoral fin (large) -->
    <path d="M24,7 Q33,16 38,10" fill="none" stroke="#1858a8" stroke-width="1.4" opacity="0.8"/>
    <!-- Anal fin -->
    <path d="M-10,10 Q0,16 10,10" fill="none" stroke="#1858a8" stroke-width="1.3"/>
    <!-- Eye -->
    <circle cx="36" cy="-2" r="3.5" fill="#181818"/>
    <circle cx="37" cy="-3" r="1.0" fill="#a0c0d8" opacity="0.5"/>
  </g>

  <!-- Fish 2: smaller, sheltering under log -->
  <g transform="translate(200,38) rotate(-5)" opacity="0.82">
    <ellipse cx="0" cy="0" rx="28" ry="7" fill="#3888a0"/>
    <ellipse cx="3" cy="3.5" rx="22" ry="3.5" fill="#d0c040" opacity="0.45"/>
    <!-- Long dorsal hint -->
    <path d="M24,-7 Q12,-12 0,-11 Q-12,-10 -22,-7" fill="none" stroke="#1858a8" stroke-width="1.2"/>
    <path d="M-28,0 L-38,-14" stroke="#1858a8" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-28,0 L-38, 14" stroke="#1858a8" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <circle cx="25" cy="-1" r="2.8" fill="#181818"/>
  </g>

  <!-- Fish 3: background, deeper -->
  <g transform="translate(400,105) rotate(-5)" opacity="0.70">
    <ellipse cx="0" cy="0" rx="30" ry="7.5" fill="#3888a0"/>
    <ellipse cx="3" cy="3.5" rx="24" ry="4" fill="#d0c040" opacity="0.38"/>
    <path d="M-30,0 L-41,-15" stroke="#1858a8" stroke-width="2.6" stroke-linecap="round" fill="none"/>
    <path d="M-30,0 L-41, 15" stroke="#1858a8" stroke-width="2.6" stroke-linecap="round" fill="none"/>
    <circle cx="26" cy="-1" r="2.5" fill="#181818"/>
  </g>

  <!-- Depth ruler (right side) — 0-100m -->
  <line x1="478" y1="8" x2="478" y2="172" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="8"   x2="478" y2="8"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="11"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="49"  x2="478" y2="49"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="52"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">25</text>
  <line x1="474" y1="90"  x2="478" y2="90"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="93"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">50</text>
  <line x1="474" y1="131" x2="478" y2="131" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="134" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">75</text>
  <line x1="474" y1="172" x2="478" y2="172" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="175" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">100</text>
  <text x="481" y="25" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">大洋性表層 ／ 流木・浮藻下方</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">0–85 m（常見 5–10 m）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">日行性；以飛魚・沙丁魚・烏賊為食</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">全球熱帶及亞熱帶海域</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
