<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sky39" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2860a0"/>
      <stop offset="100%" stop-color="#1848808"/>
    </linearGradient>
    <linearGradient id="water39" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#50b8d0"/>
      <stop offset="55%" stop-color="#2888a8"/>
      <stop offset="100%" stop-color="#104858"/>
    </linearGradient>
    <linearGradient id="rock39" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#808888"/>
      <stop offset="100%" stop-color="#484e50"/>
    </linearGradient>
    <linearGradient id="gravel39" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0a898"/>
      <stop offset="100%" stop-color="#686e60"/>
    </linearGradient>
  </defs>

  <!-- Sky (mountain backdrop) -->
  <rect width="500" height="195" fill="#2860a0" rx="6"/>

  <!-- Snow-capped mountains (background) -->
  <path d="M0,0 Q80,5 120,35 Q150,50 180,52 L0,52 Z" fill="#4a5868" opacity="0.70"/>
  <path d="M0,0 Q50,10 90,38 Q70,28 60,20 Q40,10 20,5 Z" fill="#e8f0f8" opacity="0.65"/>
  <path d="M320,0 Q380,8 430,36 Q460,48 500,52 L500,0 Z" fill="#4a5868" opacity="0.70"/>
  <path d="M380,0 Q420,12 450,38 Q435,22 415,10 Q395,2 380,0 Z" fill="#e8f0f8" opacity="0.62"/>
  <!-- Mid mountains with green -->
  <path d="M100,52 Q160,25 220,42 Q270,52 320,38 Q370,28 420,52 L100,52 Z" fill="#3a5030" opacity="0.80"/>
  <ellipse cx="170" cy="38" rx="50" ry="22" fill="#2a4028" opacity="0.65"/>
  <ellipse cx="370" cy="36" rx="45" ry="20" fill="#2a4028" opacity="0.65"/>

  <!-- Cold mountain lake / stream -->
  <rect x="0" y="52" width="500" height="143" fill="url(#water39)"/>

  <!-- Calm surface (cold mountain lake, less turbulent than 38) -->
  <path d="M0,58 Q120,54 250,58 Q380,62 500,58" fill="none" stroke="#90d8e8" stroke-width="1.3" opacity="0.50"/>
  <path d="M0,70 Q130,66 265,70 Q400,74 500,70" fill="none" stroke="#70c8d8" stroke-width="0.9" opacity="0.38"/>

  <!-- Light shafts (clear mountain water) -->
  <line x1="150" y1="52" x2="120" y2="155" stroke="#d0f0ff" stroke-width="10" opacity="0.05"/>
  <line x1="350" y1="52" x2="325" y2="160" stroke="#d0f0ff" stroke-width="8"  opacity="0.04"/>

  <!-- Gravel/rocky bottom with stones -->
  <path d="M0,174 Q80,168 160,174 Q240,180 320,172 Q400,164 480,172 Q490,173 500,173 L500,195 L0,195 Z"
        fill="url(#gravel39)"/>
  <!-- Various sized pebbles -->
  <circle cx="28"  cy="180" r="5.5" fill="#c0b8a8" opacity="0.60"/>
  <circle cx="68"  cy="183" r="4"   fill="#b8b0a0" opacity="0.56"/>
  <circle cx="115" cy="179" r="6.5" fill="#c0b8a8" opacity="0.58"/>
  <circle cx="162" cy="183" r="4"   fill="#b8b0a0" opacity="0.55"/>
  <circle cx="220" cy="180" r="5"   fill="#c0b8a8" opacity="0.58"/>
  <circle cx="270" cy="184" r="3.5" fill="#b8b0a0" opacity="0.54"/>
  <circle cx="330" cy="179" r="6"   fill="#c0b8a8" opacity="0.58"/>
  <circle cx="390" cy="183" r="4.5" fill="#b8b0a0" opacity="0.55"/>
  <circle cx="450" cy="180" r="5.5" fill="#c0b8a8" opacity="0.57"/>
  <!-- Submerged boulders -->
  <ellipse cx="95"  cy="163" rx="28" ry="12" fill="url(#rock39)" opacity="0.75"/>
  <ellipse cx="380" cy="160" rx="24" ry="11" fill="url(#rock39)" opacity="0.72"/>
  <ellipse cx="240" cy="170" rx="20" ry="9"  fill="url(#rock39)" opacity="0.70"/>

  <!-- Fish 1: 虹鱒 (Oncorhynchus mykiss) — rainbow trout with distinctive stripe -->
  <g transform="translate(255,110) rotate(-6)" opacity="0.92">
    <!-- Body: elongated, slightly compressed trout form -->
    <ellipse cx="0" cy="0" rx="34" ry="9" fill="#7a9878"/>
    <!-- Spotted olive-green back -->
    <ellipse cx="0" cy="-5" rx="29" ry="4" fill="#506040" opacity="0.68"/>
    <!-- Pink/magenta lateral stripe (DIAGNOSTIC for rainbow trout) -->
    <path d="M28,0 Q0,-2 -28,0" fill="none" stroke="#c05878" stroke-width="2.5" opacity="0.72"/>
    <!-- Silver belly -->
    <ellipse cx="4" cy="5" rx="26" ry="3.5" fill="#d8e0d0" opacity="0.50"/>
    <!-- Black spots on body (parr marks / spots, diagnostic) -->
    <circle cx="18"  cy="-3" r="1.2" fill="#202820" opacity="0.55"/>
    <circle cx="8"   cy="-4" r="1.1" fill="#202820" opacity="0.52"/>
    <circle cx="-5"  cy="-3" r="1.2" fill="#202820" opacity="0.55"/>
    <circle cx="-18" cy="-2" r="1.0" fill="#202820" opacity="0.50"/>
    <circle cx="14"  cy="1"  r="1.0" fill="#202820" opacity="0.48"/>
    <circle cx="0"   cy="2"  r="1.1" fill="#202820" opacity="0.50"/>
    <!-- Adipose fin (between dorsal and tail, diagnostic for salmonids) -->
    <ellipse cx="-24" cy="-7" rx="5" ry="3" fill="#90a888" opacity="0.70"/>
    <!-- Dorsal fin -->
    <path d="M-4,-9 L0,-18 L8,-19 L14,-17 L16,-9" fill="none" stroke="#5a7850" stroke-width="1.4"/>
    <!-- Spots on dorsal fin -->
    <circle cx="5"  cy="-15" r="1.0" fill="#202820" opacity="0.48"/>
    <circle cx="10" cy="-14" r="0.9" fill="#202820" opacity="0.45"/>
    <!-- Forked tail (moderately forked) -->
    <path d="M-34,0 L-46,-14" stroke="#5a7850" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M-34,0 L-46, 14" stroke="#5a7850" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <!-- Pectoral fin -->
    <path d="M22,6 Q29,12 34,7" fill="none" stroke="#5a7850" stroke-width="1.2" opacity="0.7"/>
    <!-- Eye -->
    <circle cx="30" cy="-1" r="3.2" fill="#181818"/>
    <circle cx="31" cy="-1.5" r="1.0" fill="#a0b090" opacity="0.5"/>
  </g>

  <!-- Fish 2: smaller trout -->
  <g transform="translate(140,130) rotate(-5)" opacity="0.80">
    <ellipse cx="0" cy="0" rx="26" ry="7" fill="#7a9878"/>
    <path d="M20,0 Q0,-1.5 -20,0" fill="none" stroke="#c05878" stroke-width="2.0" opacity="0.65"/>
    <ellipse cx="-18" cy="-5.5" rx="4" ry="2.5" fill="#90a888" opacity="0.68"/>
    <path d="M-3,-7 L0,-14 L6,-15 L10,-13 L12,-7" fill="none" stroke="#5a7850" stroke-width="1.2"/>
    <path d="M-26,0 L-35,-11" stroke="#5a7850" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-26,0 L-35, 11" stroke="#5a7850" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <circle cx="22" cy="-0.5" r="2.6" fill="#181818"/>
  </g>

  <!-- Labels (cleared left mountain area) -->
  <text x="195" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">淡水／冷清溪流・高山湖泊</text>
  <text x="195" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">適溫 9–18°C；不耐高溫低氧</text>
  <text x="195" y="45" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食水生昆蟲・甲殼類・小魚</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">北美原產；台灣高山養殖（外來種）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
