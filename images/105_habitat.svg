<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="w105" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#1c4c7a"/>
      <stop offset="45%" stop-color="#0e2c4a"/>
      <stop offset="100%" stop-color="#061626"/>
    </linearGradient>
    <linearGradient id="r105" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a30"/>
      <stop offset="100%" stop-color="#181812"/>
    </linearGradient>
  </defs>

  <rect width="500" height="195" fill="url(#w105)" rx="6"/>

  <!-- 水面波紋 -->
  <path d="M0,10 Q60,5 120,10 Q180,15 240,10 Q300,5 360,10 Q420,15 480,10 Q490,11 500,10"
        fill="none" stroke="#4a9abc" stroke-width="1.2" opacity="0.5"/>
  <path d="M0,26 Q65,21 130,27 Q195,33 260,25 Q320,19 385,27 Q445,33 500,26"
        fill="none" stroke="#4a9abc" stroke-width="1" opacity="0.35"/>

  <!-- 礁岩底（右下大礁塊 + 左下小礁） -->
  <polygon points="500,120 430,132 360,150 330,170 360,195 500,195" fill="url(#r105)"/>
  <polygon points="0,175 40,162 95,170 130,182 120,195 0,195" fill="url(#r105)" opacity="0.9"/>
  <!-- 礁岩受光亮面 -->
  <polygon points="500,120 430,132 360,150 400,150 470,132 500,124" fill="#4a4a3a" opacity="0.5"/>
  <!-- 礁岩裂縫 -->
  <line x1="410" y1="140" x2="404" y2="152" stroke="#141410" stroke-width="1.5" opacity="0.55"/>
  <line x1="368" y1="156" x2="362" y2="168" stroke="#141410" stroke-width="1.4" opacity="0.5"/>
  <line x1="60"  y1="170" x2="55"  y2="182" stroke="#141410" stroke-width="1.3" opacity="0.5"/>

  <!-- 主要棲息帶 18–360m -->
  <line x1="0" y1="20" x2="455" y2="20" stroke="#c9a84c" stroke-width="0.7" stroke-dasharray="5,3" opacity="0.35"/>
  <rect x="0" y="20" width="455" height="175" fill="#c9a84c" opacity="0.015"/>

  <!-- 浮游微粒 -->
  <circle cx="70"  cy="55" r="1"   fill="#fff" opacity="0.22"/>
  <circle cx="200" cy="42" r="0.9" fill="#fff" opacity="0.2"/>
  <circle cx="300" cy="60" r="0.9" fill="#fff" opacity="0.18"/>
  <circle cx="150" cy="75" r="0.8" fill="#fff" opacity="0.16"/>

  <!-- 紅甘魚群（3尾，中層成群） -->
  <g transform="translate(200,95) rotate(-4)" opacity="0.92">
    <ellipse cx="0" cy="0" rx="30" ry="8" fill="#6a8298"/>
    <path d="M-30,1 Q-15,6 30,1 Q10,3 -30,1Z" fill="#d8e4ec" opacity="0.30"/>
    <path d="M-22,0.5 Q0,2 24,-0.5" fill="none" stroke="#c9ad50" stroke-width="2.4" opacity="0.75"/>
    <path d="M-8,-8 Q4,-15 18,-7" fill="none" stroke="#4a6278" stroke-width="1.5"/>
    <path d="M22,-6 L27,7" stroke="#9a7838" stroke-width="1.6" opacity="0.6"/>
    <path d="M-30,0 L-43,-11" stroke="#4a6278" stroke-width="3.4" stroke-linecap="round" fill="none"/>
    <path d="M-30,0 L-43,11"  stroke="#4a6278" stroke-width="3.4" stroke-linecap="round" fill="none"/>
    <path d="M8,5 Q16,12 22,7" fill="none" stroke="#4a6278" stroke-width="1.2" opacity="0.8"/>
    <circle cx="25" cy="-1" r="3.3" fill="#12202c"/>
    <circle cx="26" cy="-1.6" r="1" fill="#6a90a8" opacity="0.5"/>
  </g>
  <g transform="translate(300,120) rotate(-3)" opacity="0.82">
    <ellipse cx="0" cy="0" rx="24" ry="6.4" fill="#607890"/>
    <path d="M-18,0.5 Q0,1.6 19,-0.5" fill="none" stroke="#c0a24c" stroke-width="2" opacity="0.7"/>
    <path d="M-6,-6.4 Q3,-12 14,-5.6" fill="none" stroke="#42586c" stroke-width="1.3"/>
    <path d="M18,-5 L22,6" stroke="#8a6c34" stroke-width="1.3" opacity="0.55"/>
    <path d="M-24,0 L-35,-9" stroke="#42586c" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-24,0 L-35,9"  stroke="#42586c" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <circle cx="20" cy="-1" r="2.7" fill="#12202c"/>
  </g>
  <g transform="translate(140,140) rotate(-2)" opacity="0.72">
    <ellipse cx="0" cy="0" rx="19" ry="5" fill="#587088"/>
    <path d="M-14,0.5 Q0,1.4 15,-0.5" fill="none" stroke="#b89a48" stroke-width="1.6" opacity="0.65"/>
    <path d="M-19,0 L-28,-7" stroke="#3e5468" stroke-width="2.3" stroke-linecap="round" fill="none"/>
    <path d="M-19,0 L-28,7"  stroke="#3e5468" stroke-width="2.3" stroke-linecap="round" fill="none"/>
    <circle cx="16" cy="-0.5" r="2.2" fill="#12202c"/>
  </g>

  <!-- 深度尺 0–360m -->
  <line x1="478" y1="10" x2="478" y2="188" stroke="#8a9bb0" stroke-width="1" opacity="0.55"/>
  <line x1="474" y1="10"  x2="478" y2="10"  stroke="#8a9bb0" stroke-width="1"/>
  <line x1="474" y1="20"  x2="478" y2="20"  stroke="#c9a84c" stroke-width="1.2"/>
  <line x1="474" y1="69"  x2="478" y2="69"  stroke="#8a9bb0" stroke-width="1"/>
  <line x1="474" y1="129" x2="478" y2="129" stroke="#8a9bb0" stroke-width="1"/>
  <line x1="474" y1="188" x2="478" y2="188" stroke="#8a9bb0" stroke-width="1"/>
  <text x="480" y="14"  fill="#8a9bb0" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">  0 m</text>
  <text x="480" y="26"  fill="#c9a84c" font-size="8"   font-family="Microsoft JhengHei,sans-serif"> 18 m</text>
  <text x="480" y="133" fill="#8a9bb0" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">240 m</text>
  <text x="480" y="185" fill="#8a9bb0" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">360 m</text>

  <!-- 標籤 -->
  <text x="12" y="18"  fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">較深礁石區 ／ 中層成群</text>
  <text x="12" y="92"  fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">主要棲息帶</text>
  <text x="12" y="103" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">18–360 m</text>
  <text x="250" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">熱帶及亞熱帶 ・ 台灣沿近海</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
