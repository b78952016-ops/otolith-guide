<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sky38" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4898c8"/>
      <stop offset="100%" stop-color="#2878a8"/>
    </linearGradient>
    <linearGradient id="water38" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#48c8b8"/>
      <stop offset="50%" stop-color="#2898a0"/>
      <stop offset="100%" stop-color="#105868"/>
    </linearGradient>
    <linearGradient id="rock38" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#888070"/>
      <stop offset="100%" stop-color="#504840"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="500" height="195" fill="url(#sky38)" rx="6"/>

  <!-- Mountain ridgeline left (steep, rocky upper stream) -->
  <path d="M0,0 Q20,15 45,30 Q65,42 88,52 L0,52 Z" fill="#3a4828" opacity="0.85"/>
  <ellipse cx="22"  cy="16" rx="28" ry="16" fill="#2a3818" opacity="0.78"/>
  <ellipse cx="55"  cy="34" rx="20" ry="12" fill="#304020" opacity="0.72"/>
  <!-- Mountain ridgeline right -->
  <path d="M500,0 Q480,15 455,30 Q435,42 412,52 L500,52 Z" fill="#3a4828" opacity="0.85"/>
  <ellipse cx="478" cy="16" rx="28" ry="16" fill="#2a3818" opacity="0.78"/>
  <ellipse cx="445" cy="34" rx="20" ry="12" fill="#304020" opacity="0.72"/>

  <!-- Clear cold stream -->
  <rect x="0" y="52" width="500" height="143" fill="url(#water38)"/>

  <!-- Fast current / rapids lines -->
  <path d="M0,64 Q100,58 210,64 Q320,70 500,64" fill="none" stroke="#90f0e0" stroke-width="1.4" opacity="0.45"/>
  <path d="M0,78 Q110,71 225,78 Q340,85 500,78" fill="none" stroke="#70e0d0" stroke-width="1.1" opacity="0.36"/>
  <path d="M0,96 Q105,88 220,96 Q345,104 500,96" fill="none" stroke="#58d0c0" stroke-width="0.9" opacity="0.28"/>
  <!-- Whitewater on boulders -->
  <path d="M72,62  Q84,58  96,62"  fill="none" stroke="#e0f8f4" stroke-width="1.1" opacity="0.60"/>
  <path d="M185,70 Q197,66 209,70" fill="none" stroke="#e0f8f4" stroke-width="1.0" opacity="0.55"/>
  <path d="M318,64 Q330,60 342,64" fill="none" stroke="#e0f8f4" stroke-width="1.0" opacity="0.55"/>
  <path d="M418,75 Q430,71 442,75" fill="none" stroke="#e0f8f4" stroke-width="0.9" opacity="0.48"/>

  <!-- Large boulders (typical upper-stream habitat) -->
  <ellipse cx="88"  cy="158" rx="35" ry="18" fill="url(#rock38)" opacity="0.90"/>
  <ellipse cx="86"  cy="153" rx="22" ry="10" fill="#b8b0a0" opacity="0.28"/>
  <ellipse cx="355" cy="162" rx="28" ry="14" fill="url(#rock38)" opacity="0.85"/>
  <ellipse cx="353" cy="158" rx="17" ry="8"  fill="#b8b0a0" opacity="0.26"/>
  <ellipse cx="215" cy="172" rx="22" ry="11" fill="url(#rock38)" opacity="0.82"/>
  <ellipse cx="460" cy="158" rx="20" ry="10" fill="url(#rock38)" opacity="0.80"/>

  <!-- Deep pool between boulders (苦花 lurks in deep pools) -->
  <ellipse cx="250" cy="145" rx="80" ry="20" fill="#0e5060" opacity="0.35"/>

  <!-- Rocky bottom with pebbles -->
  <path d="M0,178 Q80,173 160,178 Q240,183 320,176 Q400,169 480,176 Q490,177 500,177 L500,195 L0,195 Z"
        fill="#888070"/>
  <circle cx="30"  cy="184" r="5"   fill="#a09888" opacity="0.60"/>
  <circle cx="75"  cy="187" r="3.5" fill="#988878" opacity="0.56"/>
  <circle cx="130" cy="183" r="6"   fill="#a09888" opacity="0.58"/>
  <circle cx="178" cy="186" r="3.5" fill="#988878" opacity="0.55"/>
  <circle cx="262" cy="184" r="5"   fill="#a09888" opacity="0.58"/>
  <circle cx="305" cy="187" r="4"   fill="#988878" opacity="0.55"/>
  <circle cx="375" cy="183" r="6"   fill="#a09888" opacity="0.58"/>
  <circle cx="440" cy="186" r="4.5" fill="#988878" opacity="0.55"/>
  <!-- Epilithic algae on rocks (main food for 苦花) -->
  <path d="M78,150  Q88,143 98,148"   fill="none" stroke="#488030" stroke-width="1.5" opacity="0.72"/>
  <path d="M344,154 Q354,147 364,152" fill="none" stroke="#488030" stroke-width="1.4" opacity="0.68"/>
  <path d="M204,165 Q212,159 220,163" fill="none" stroke="#488030" stroke-width="1.3" opacity="0.65"/>

  <!-- Fish 1: 苦花 (Onychostoma barbatulum) — elongated, feeding on algae near rock -->
  <g transform="translate(240,130) rotate(-8)" opacity="0.92">
    <!-- Body: torpedo-shaped, slightly compressed -->
    <ellipse cx="0" cy="0" rx="24" ry="7" fill="#8a7858"/>
    <!-- Greenish-olive upper flank -->
    <ellipse cx="0" cy="-4" rx="20" ry="3" fill="#606838" opacity="0.65"/>
    <!-- Lighter silver-white belly -->
    <ellipse cx="2" cy="4" rx="18" ry="3" fill="#d0c8a8" opacity="0.45"/>
    <!-- Dorsal fin -->
    <path d="M-4,-7 Q0,-15 6,-16 L10,-14 L11,-7" fill="none" stroke="#605840" stroke-width="1.3"/>
    <!-- Forked tail -->
    <path d="M-24,0 L-34,-11" stroke="#605840" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-24,0 L-34, 11" stroke="#605840" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <!-- Pectoral fin -->
    <path d="M14,5 Q20,10 24,6" fill="none" stroke="#605840" stroke-width="1.1" opacity="0.7"/>
    <!-- Subterminal mouth (scraping algae from rocks) -->
    <path d="M22,2 Q24,4 23,6" fill="none" stroke="#504830" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Eye -->
    <circle cx="20" cy="-1" r="2.8" fill="#181818"/>
    <circle cx="21" cy="-1.5" r="0.9" fill="#a09878" opacity="0.50"/>
  </g>

  <!-- Fish 2: smaller, near surface current -->
  <g transform="translate(130,110) rotate(-10)" opacity="0.80">
    <ellipse cx="0" cy="0" rx="18" ry="5.5" fill="#8a7858"/>
    <ellipse cx="0" cy="-3" rx="15" ry="2.5" fill="#606838" opacity="0.60"/>
    <path d="M-3,-5.5 Q0,-12 5,-13 L8,-11 L9,-5.5" fill="none" stroke="#605840" stroke-width="1.1"/>
    <path d="M-18,0 L-26,-9" stroke="#605840" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <path d="M-18,0 L-26, 9" stroke="#605840" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <circle cx="15" cy="-0.5" r="2.2" fill="#181818"/>
  </g>

  <!-- Fish 3: lurking in deep pool shadow -->
  <g transform="translate(380,142) rotate(-5)" opacity="0.72">
    <ellipse cx="0" cy="0" rx="20" ry="6" fill="#6a6048"/>
    <path d="M-20,0 L-28,-9" stroke="#504830" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M-20,0 L-28, 9" stroke="#504830" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <circle cx="17" cy="-0.5" r="2.0" fill="#181818"/>
  </g>

  <!-- Labels (cleared left hillside) -->
  <text x="112" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">淡水／河川上游清澈冷水</text>
  <text x="112" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">落差急流；藏身深潭或石縫</text>
  <text x="112" y="45" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">主食石頭附著藻類；下口型刮食</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">台灣特有種（各大河川上游）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
