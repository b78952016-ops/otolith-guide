<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea61" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1878b8"/>
      <stop offset="40%" stop-color="#0e5888"/>
      <stop offset="80%" stop-color="#062838"/>
      <stop offset="100%" stop-color="#031420"/>
    </linearGradient>
    <linearGradient id="rock61" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#505858"/>
      <stop offset="100%" stop-color="#202428"/>
    </linearGradient>
  </defs>

  <!-- Reef/rocky-sandy mixed habitat, 5–100 m -->
  <rect width="500" height="195" fill="url(#sea61)" rx="6"/>

  <!-- Surface shimmer -->
  <path d="M0,8 Q80,5 165,8 Q250,11 335,8 Q415,5 500,8"
        fill="none" stroke="#58c8e8" stroke-width="1.3" opacity="0.52"/>

  <!-- Light shafts (tropical clear water) -->
  <line x1="148" y1="8" x2="118" y2="155" stroke="#c8eeff" stroke-width="13" opacity="0.06"/>
  <line x1="378" y1="8" x2="352" y2="155" stroke="#c8eeff" stroke-width="8"  opacity="0.04"/>

  <!-- Rocky-sandy reef bottom -->
  <path d="M0,150 Q42,134 95,144 Q148,154 200,132 Q255,110 318,132 Q372,155 425,134 Q462,118 500,126 L500,195 L0,195 Z"
        fill="url(#rock61)"/>
  <!-- Large boulders -->
  <ellipse cx="58"  cy="146" rx="30" ry="11" fill="#3c4048" opacity="0.76"/>
  <ellipse cx="195" cy="135" rx="27" ry="10" fill="#3c4048" opacity="0.72"/>
  <ellipse cx="332" cy="130" rx="25" ry="9"  fill="#3c4048" opacity="0.68"/>
  <ellipse cx="468" cy="128" rx="22" ry="8"  fill="#3c4048" opacity="0.64"/>
  <!-- Sandy patches between rocks -->
  <ellipse cx="128" cy="152" rx="22" ry="5" fill="#786a50" opacity="0.45"/>
  <ellipse cx="270" cy="146" rx="20" ry="5" fill="#786a50" opacity="0.40"/>
  <!-- Algae on rocks -->
  <ellipse cx="96"  cy="140" rx="18" ry="5" fill="#2a5828" opacity="0.55"/>
  <ellipse cx="240" cy="126" rx="16" ry="5" fill="#2a6030" opacity="0.50"/>
  <ellipse cx="380" cy="128" rx="15" ry="5" fill="#2a5828" opacity="0.48"/>

  <!-- Fish: 赤鰭笛鯛 Lutjanus erythropterus (Crimson snapper) -->
  <!-- Lutjanidae: elongated-oval body; CRIMSON/DEEP RED overall body;
       reddish fins (赤鰭 = red fins); pointed snout; large terminal mouth;
       continuous dorsal fin; forked tail; reef/sandy-bottom 5–100 m -->

  <!-- Main fish (foreground) -->
  <g transform="translate(242,106) rotate(-6)" opacity="0.93">
    <!-- Body: elongated oval, CRIMSON RED overall -->
    <ellipse cx="0" cy="0" rx="34" ry="16" fill="#c02828"/>
    <!-- Darker crimson/brownish back -->
    <ellipse cx="2" cy="-9" rx="28" ry="7" fill="#881010" opacity="0.60"/>
    <!-- Pinkish-red flanks -->
    <ellipse cx="3" cy="2" rx="26" ry="10" fill="#e04848" opacity="0.38"/>
    <!-- Pale pinkish belly hint -->
    <ellipse cx="2" cy="9" rx="20" ry="4" fill="#f0b0a0" opacity="0.30"/>
    <!-- Caudal peduncle -->
    <ellipse cx="-29" cy="0" rx="6" ry="12" fill="#a02020" opacity="0.82"/>
    <!-- Head: large, pointed snout (lutjanid) -->
    <ellipse cx="30" cy="0" rx="12" ry="15" fill="#a02020"/>
    <!-- Large terminal mouth -->
    <path d="M41,-3 Q45,1 41,7" fill="none" stroke="#701010" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Eye: moderate -->
    <circle cx="31" cy="-6" r="4.5" fill="#181818"/>
    <circle cx="32" cy="-7" r="1.6" fill="#c04040" opacity="0.40"/>
    <!-- Continuous dorsal fin (single — lutjanid) -->
    <path d="M20,-16 Q12,-26 5,-28 Q-2,-26 -8,-20 Q-14,-15 -17,-12 Q-20,-9 -22,-8 Q-24,-6 -26,-5"
          fill="none" stroke="#881010" stroke-width="1.5"/>
    <!-- Anal fin -->
    <path d="M-7,16 Q-14,22 -20,20 Q-24,16 -25,12"
          fill="none" stroke="#881010" stroke-width="1.3"/>
    <!-- Pectoral fin (reddish) -->
    <path d="M22,8 Q32,17 35,9" fill="none" stroke="#a02020" stroke-width="1.4" opacity="0.72"/>
    <!-- Pelvic fin -->
    <path d="M18,12 Q20,18 22,14" fill="none" stroke="#881010" stroke-width="1.1" opacity="0.65"/>
    <!-- FORKED caudal fin (reddish) -->
    <path d="M-35,0 L-46,-13" stroke="#881010" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M-35,0 L-46, 13" stroke="#881010" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M-46,-13 Q-50,0 -46,13" fill="none" stroke="#881010" stroke-width="2.0" stroke-linecap="round"/>
    <!-- Lateral line -->
    <path d="M33,-8 Q16,-12 0,-10 Q-16,-8 -28,-5" fill="none" stroke="#d06060" stroke-width="0.7" opacity="0.35"/>
  </g>

  <!-- Fish 2 (background, school) -->
  <g transform="translate(128,130) rotate(-5)" opacity="0.78">
    <ellipse cx="0" cy="0" rx="27" ry="12" fill="#c02828"/>
    <ellipse cx="2" cy="-7" rx="22" ry="5.5" fill="#881010" opacity="0.55"/>
    <ellipse cx="-23" cy="0" rx="5" ry="9" fill="#a02020" opacity="0.80"/>
    <ellipse cx="24" cy="0" rx="9.5" ry="12" fill="#a02020"/>
    <circle cx="25" cy="-4" r="3.6" fill="#181818"/>
    <path d="M16,-12 Q8,-21 1,-23 Q-4,-21 -9,-15 Q-13,-10 -14,-8" fill="none" stroke="#881010" stroke-width="1.3"/>
    <path d="M-28,0 L-37,-11" stroke="#881010" stroke-width="2.6" stroke-linecap="round" fill="none"/>
    <path d="M-28,0 L-37, 11" stroke="#881010" stroke-width="2.6" stroke-linecap="round" fill="none"/>
    <path d="M-37,-11 Q-41,0 -37,11" fill="none" stroke="#881010" stroke-width="1.7" stroke-linecap="round"/>
  </g>

  <!-- Fish 3 (background) -->
  <g transform="translate(388,118) rotate(-4)" opacity="0.68">
    <ellipse cx="0" cy="0" rx="21" ry="10" fill="#c02828"/>
    <ellipse cx="20" cy="0" rx="8" ry="10" fill="#a02020"/>
    <circle cx="21" cy="-3" r="3.0" fill="#181818"/>
    <path d="M12,-10 Q5,-18 0,-19 Q-4,-17 -7,-13" fill="none" stroke="#881010" stroke-width="1.1"/>
    <path d="M-22,0 L-30,-9" stroke="#881010" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <path d="M-22,0 L-30, 9" stroke="#881010" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Depth ruler (0–100 m) -->
  <line x1="478" y1="8" x2="478" y2="150" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="8"   x2="478" y2="8"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="11"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="79"  x2="478" y2="79"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="82"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">50</text>
  <line x1="474" y1="150" x2="478" y2="150" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="153" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">100</text>
  <text x="481" y="24" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">礁沙混合區・外海獨立礁</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">5–100 m；深紅體・赤紅鰭（診斷）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">夜行性；食魚類・甲殼類；成群</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度－西太平洋（台灣各沿岸・波斯灣至斐濟）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
