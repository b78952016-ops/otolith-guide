<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea103" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1878b8"/>
      <stop offset="40%" stop-color="#0e5890"/>
      <stop offset="80%" stop-color="#063848"/>
      <stop offset="100%" stop-color="#031c24"/>
    </linearGradient>
    <linearGradient id="rock103" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#484e58"/>
      <stop offset="100%" stop-color="#1e2228"/>
    </linearGradient>
  </defs>

  <!-- Coastal to open pelagic water, 0–275 m -->
  <rect width="500" height="195" fill="url(#sea103)" rx="6"/>

  <!-- Surface shimmer -->
  <path d="M0,7 Q80,4 165,7 Q250,10 335,7 Q415,4 500,7"
        fill="none" stroke="#68d0f0" stroke-width="1.3" opacity="0.52"/>

  <!-- Light shafts -->
  <line x1="160" y1="7" x2="132" y2="158" stroke="#c8eeff" stroke-width="12" opacity="0.055"/>
  <line x1="390" y1="7" x2="365" y2="158" stroke="#c8eeff" stroke-width="8"  opacity="0.038"/>

  <!-- Seafloor (deep, faint) -->
  <path d="M0,165 Q50,155 110,163 Q180,170 260,160 Q340,150 420,160 L500,163 L500,195 L0,195 Z"
        fill="url(#rock103)"/>
  <ellipse cx="80"  cy="165" rx="25" ry="8" fill="#3a4048" opacity="0.58"/>
  <ellipse cx="240" cy="160" rx="22" ry="7" fill="#3a4048" opacity="0.54"/>
  <ellipse cx="400" cy="162" rx="20" ry="7" fill="#3a4048" opacity="0.50"/>

  <!-- Fish: 日本竹莢魚 Trachurus japonicus (Japanese horse mackerel) -->
  <!-- Carangidae: slender fusiform; silvery sides; dark blue-green back;
       KEY: BLACK opercle spot; curved lateral line with enlarged SCUTES (稜鱗);
       NO finlets (unlike Decapterus); DARK non-red forked tail;
       schooling coastal-pelagic 0–275 m -->

  <!-- Main fish (foreground) -->
  <g transform="translate(240,100) rotate(-5)" opacity="0.93">
    <!-- Body: slender fusiform, silvery-grey -->
    <ellipse cx="0" cy="0" rx="35" ry="11" fill="#b0bcc8"/>
    <!-- Dark blue-green back -->
    <ellipse cx="-1" cy="-7" rx="30" ry="4.5" fill="#1c3a58" opacity="0.72"/>
    <!-- Silvery flanks -->
    <ellipse cx="4" cy="2" rx="28" ry="6.5" fill="#ccd8e8" opacity="0.42"/>
    <!-- Iridescent silver mid-stripe -->
    <path d="M30,-3 Q10,-5 -10,-3 Q-25,-2 -31,0" fill="none" stroke="#d8e8f8" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
    <!-- Caudal peduncle (slender, dark) -->
    <ellipse cx="-32" cy="0" rx="5" ry="8" fill="#384858" opacity="0.78"/>
    <!-- Head -->
    <ellipse cx="31" cy="0" rx="9" ry="10" fill="#1c3a58"/>
    <!-- BLACK OPERCLE SPOT (鰓蓋斑 — diagnostic!) -->
    <circle cx="23" cy="-2" r="3.2" fill="#060808"/>
    <!-- Eye -->
    <circle cx="32" cy="-3" r="3.5" fill="#181818"/>
    <circle cx="33" cy="-4" r="1.1" fill="#5898b8" opacity="0.38"/>
    <!-- Small terminal mouth -->
    <path d="M39,-1 Q42,1 39,3" fill="none" stroke="#182838" stroke-width="1.0" stroke-linecap="round"/>
    <!-- First dorsal fin (spiny) -->
    <path d="M14,-11 Q6,-19 0,-20 Q-4,-18 -7,-13" fill="none" stroke="#304868" stroke-width="1.3"/>
    <!-- Second dorsal fin (soft-rayed) -->
    <path d="M-8,-11 Q-12,-15 -16,-14 Q-19,-12 -19,-9" fill="none" stroke="#304868" stroke-width="1.2"/>
    <!-- Anal fin -->
    <path d="M-2,11 Q-7,16 -13,15 Q-17,13 -18,10" fill="none" stroke="#304868" stroke-width="1.1"/>
    <!-- Pectoral fin -->
    <path d="M22,5 Q30,12 33,6" fill="none" stroke="#384858" stroke-width="1.2" opacity="0.70"/>
    <!-- LATERAL LINE SCUTES 稜鱗 (diagnostic!) -->
    <!-- Anterior curved section (arches up from opercle area) -->
    <path d="M27,-5 Q18,-8 8,-8 Q0,-7 -5,-5" fill="none" stroke="#7888a0" stroke-width="2.2" opacity="0.65"/>
    <!-- Posterior straight section (enlarged scutes toward tail) -->
    <path d="M-5,-5 Q-12,-4 -20,-2.5 Q-27,-1.5 -33,0" fill="none" stroke="#7888a0" stroke-width="2.5" opacity="0.70"/>
    <!-- Individual scute tick marks -->
    <line x1="-8"  y1="-4.5" x2="-8"  y2="-1.5" stroke="#9098b0" stroke-width="1.0" opacity="0.60"/>
    <line x1="-13" y1="-4"   x2="-13" y2="-1"   stroke="#9098b0" stroke-width="1.0" opacity="0.58"/>
    <line x1="-18" y1="-3.2" x2="-18" y2="-0.2" stroke="#9098b0" stroke-width="1.0" opacity="0.56"/>
    <line x1="-23" y1="-2.5" x2="-23" y2="0.5"  stroke="#9098b0" stroke-width="1.0" opacity="0.54"/>
    <line x1="-29" y1="-1.5" x2="-29" y2="1.5"  stroke="#9098b0" stroke-width="1.0" opacity="0.52"/>
    <!-- CAUDAL FIN: DARK blue-grey (NOT red!) forked -->
    <path d="M-36,0 L-47,-20" stroke="#2a4060" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-36,0 L-47, 20" stroke="#2a4060" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-47,-20 Q-39,0 -47,20" fill="none" stroke="#2a4060" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- Fish 2 (school) -->
  <g transform="translate(118,124) rotate(-4)" opacity="0.78">
    <ellipse cx="0" cy="0" rx="27" ry="8.5" fill="#b0bcc8"/>
    <ellipse cx="-1" cy="-5.5" rx="22" ry="3.5" fill="#1c3a58" opacity="0.68"/>
    <ellipse cx="25" cy="0" rx="7" ry="8.5" fill="#1c3a58"/>
    <!-- Black opercle spot -->
    <circle cx="18" cy="-1.5" r="2.5" fill="#060808"/>
    <circle cx="26" cy="-2.5" r="2.8" fill="#181818"/>
    <!-- Lateral line scutes -->
    <path d="M22,-4 Q14,-6 6,-6 Q-2,-5 -5,-4" fill="none" stroke="#7888a0" stroke-width="1.8" opacity="0.60"/>
    <path d="M-5,-4 Q-11,-3 -18,-2 Q-23,-1 -26,0" fill="none" stroke="#7888a0" stroke-width="2.0" opacity="0.62"/>
    <!-- Scute ticks -->
    <line x1="-9"  y1="-3.5" x2="-9"  y2="-0.5" stroke="#9098b0" stroke-width="0.9" opacity="0.55"/>
    <line x1="-15" y1="-2.8" x2="-15" y2="0.2"   stroke="#9098b0" stroke-width="0.9" opacity="0.52"/>
    <line x1="-21" y1="-2"   x2="-21" y2="1"     stroke="#9098b0" stroke-width="0.9" opacity="0.50"/>
    <!-- Caudal peduncle dark -->
    <ellipse cx="-24" cy="0" rx="4" ry="6.5" fill="#384858" opacity="0.76"/>
    <!-- Dorsal fin -->
    <path d="M10,-8.5 Q4,-14 -1,-15 Q-4,-13 -6,-10" fill="none" stroke="#304868" stroke-width="1.1"/>
    <!-- Dark tail -->
    <path d="M-28,0 L-37,-16" stroke="#2a4060" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-28,0 L-37, 16" stroke="#2a4060" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-37,-16 Q-31,0 -37,16" fill="none" stroke="#2a4060" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Fish 3 (right, smaller) -->
  <g transform="translate(395,118) rotate(-6)" opacity="0.62">
    <ellipse cx="0" cy="0" rx="22" ry="7" fill="#b0bcc8"/>
    <ellipse cx="19" cy="0" rx="5.5" ry="7" fill="#1c3a58"/>
    <!-- Black opercle spot -->
    <circle cx="13" cy="-1" r="2.0" fill="#060808"/>
    <circle cx="20" cy="-2" r="2.4" fill="#181818"/>
    <!-- Lateral line scutes -->
    <path d="M-3,-3.5 Q-9,-3 -15,-2 Q-20,-1" fill="none" stroke="#7888a0" stroke-width="1.6" opacity="0.55"/>
    <ellipse cx="-20" cy="0" rx="3.5" ry="5.5" fill="#384858" opacity="0.74"/>
    <!-- Dark tail -->
    <path d="M-23,0 L-30,-13" stroke="#2a4060" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-23,0 L-30, 13" stroke="#2a4060" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-30,-13 Q-24,0 -30,13" fill="none" stroke="#2a4060" stroke-width="1.7" stroke-linecap="round"/>
  </g>

  <!-- Depth ruler (0–275 m) -->
  <line x1="478" y1="7" x2="478" y2="165" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="7"   x2="478" y2="7"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="10"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="57"  x2="478" y2="57"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="60"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">50</text>
  <line x1="474" y1="114" x2="478" y2="114" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="117" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">150</text>
  <line x1="474" y1="165" x2="478" y2="165" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="168" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">275</text>
  <text x="481" y="24" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">沿岸中水層・成群洄游</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">0–275 m；黑色鰓蓋斑・稜鱗隆脊（診斷）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食甲殼類・小型魚類；深夜垂直洄游</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">西北太平洋（台灣全島・日本・韓國・中國東海）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
