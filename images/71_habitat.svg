<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea71" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1878b8"/>
      <stop offset="35%" stop-color="#0e5888"/>
      <stop offset="70%" stop-color="#083848"/>
      <stop offset="100%" stop-color="#041820"/>
    </linearGradient>
    <linearGradient id="sand71" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0a878"/>
      <stop offset="100%" stop-color="#706840"/>
    </linearGradient>
  </defs>

  <!-- Turbid coastal water (murky, estuary/bay) -->
  <rect width="500" height="195" fill="url(#sea71)" rx="6"/>

  <!-- Murky surface shimmer -->
  <path d="M0,8 Q80,5 165,8 Q250,11 335,8 Q415,5 500,8"
        fill="none" stroke="#50a8c8" stroke-width="1.2" opacity="0.45"/>
  <path d="M0,18 Q90,14 185,18 Q280,22 370,18 Q440,14 500,18"
        fill="none" stroke="#3890b0" stroke-width="0.9" opacity="0.32"/>

  <!-- Suspended sediment particles (murky water) -->
  <circle cx="70"  cy="55"  r="1.0" fill="#a09060" opacity="0.18"/>
  <circle cx="180" cy="42"  r="0.9" fill="#a09060" opacity="0.15"/>
  <circle cx="290" cy="68"  r="1.0" fill="#a09060" opacity="0.16"/>
  <circle cx="420" cy="50"  r="0.9" fill="#a09060" opacity="0.14"/>
  <circle cx="120" cy="100" r="0.8" fill="#a09060" opacity="0.13"/>
  <circle cx="360" cy="88"  r="0.9" fill="#a09060" opacity="0.12"/>

  <!-- Sandy-mud flat bottom -->
  <path d="M0,162 Q70,157 155,162 Q240,167 320,160 Q400,155 480,160 L500,160 L500,195 L0,195 Z"
        fill="url(#sand71)"/>
  <!-- Bottom texture -->
  <path d="M20,168 Q70,166 120,168" fill="none" stroke="#908870" stroke-width="0.6" opacity="0.40"/>
  <path d="M165,170 Q215,168 265,170" fill="none" stroke="#908870" stroke-width="0.6" opacity="0.38"/>
  <path d="M310,168 Q360,166 410,168" fill="none" stroke="#908870" stroke-width="0.6" opacity="0.36"/>
  <!-- Some shell/debris on bottom -->
  <ellipse cx="95"  cy="165" rx="7"  ry="2.5" fill="#888060" opacity="0.45"/>
  <ellipse cx="230" cy="164" rx="5"  ry="2.2" fill="#888060" opacity="0.42"/>
  <ellipse cx="380" cy="165" rx="6"  ry="2.0" fill="#888060" opacity="0.40"/>

  <!-- Fish: 眼斑擬石首魚 Sciaenops ocellatus (Red drum / 紅鼓魚) -->
  <!-- Robust streamlined body; bronze-copper-reddish with silver belly;
       KEY DIAGNOSTIC: ONE large black ocellus at base of upper caudal fin;
       slightly inferior mouth; continuous lateral line -->

  <!-- Main fish (foreground) -->
  <g transform="translate(245,118) rotate(-6)" opacity="0.92">
    <!-- Body: robust, slightly tapering, bronze-copper -->
    <ellipse cx="0" cy="0" rx="42" ry="17" fill="#c87840"/>
    <!-- Bronze-reddish upper back -->
    <ellipse cx="-2" cy="-10" rx="35" ry="7" fill="#a05828" opacity="0.55"/>
    <!-- Silver belly -->
    <ellipse cx="3" cy="10" rx="32" ry="6.5" fill="#e0d0b0" opacity="0.50"/>
    <!-- Caudal peduncle (slight narrowing) -->
    <ellipse cx="-38" cy="0" rx="8" ry="10" fill="#c07030" opacity="0.80"/>
    <!-- HEAD: blunt, rounded snout, slightly inferior mouth -->
    <ellipse cx="38" cy="0" rx="14" ry="14" fill="#b87038"/>
    <!-- Slightly inferior mouth (downward-angled) -->
    <path d="M51,3 Q54,5 51,7" fill="none" stroke="#805030" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Eye: medium size -->
    <circle cx="45" cy="-4" r="4.5" fill="#181818"/>
    <circle cx="46" cy="-5" r="1.5" fill="#806040" opacity="0.42"/>
    <!-- Lateral line (continuous, arching toward back) -->
    <path d="M44,-6 Q20,-10 -5,-7 Q-25,-5 -40,-2" fill="none" stroke="#a06030" stroke-width="0.7" opacity="0.38"/>
    <!-- First dorsal fin (spiny, tall) -->
    <path d="M10,-17 Q5,-28 0,-30 Q-5,-28 -10,-22 Q-15,-18 -18,-17"
          fill="none" stroke="#805028" stroke-width="1.3"/>
    <!-- Second dorsal fin (soft-rayed, continuous with first) -->
    <path d="M-18,-17 Q-24,-22 -30,-20 Q-35,-18 -38,-14"
          fill="none" stroke="#805028" stroke-width="1.2"/>
    <!-- Anal fin -->
    <path d="M-12,17 Q-18,24 -25,22 Q-30,20 -34,16"
          fill="none" stroke="#805028" stroke-width="1.1"/>
    <!-- Pectoral fin -->
    <path d="M28,8 Q36,18 38,10" fill="none" stroke="#805028" stroke-width="1.2" opacity="0.75"/>
    <!-- Caudal fin: truncate to slightly lunate -->
    <path d="M-46,-8 Q-54,0 -46,8" fill="none" stroke="#805028" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-42,-10 L-52,-14" stroke="#805028" stroke-width="2.0" stroke-linecap="round" fill="none"/>
    <path d="M-42,10 L-52,14"  stroke="#805028" stroke-width="2.0" stroke-linecap="round" fill="none"/>
    <!-- DIAGNOSTIC: Large black ocellus at upper caudal fin base -->
    <circle cx="-40" cy="-6" r="5.5" fill="#101010"/>
    <circle cx="-40" cy="-6" r="3.5" fill="#181818"/>
    <circle cx="-40" cy="-6" r="7" fill="none" stroke="#d0a060" stroke-width="1.2" opacity="0.60"/>
  </g>

  <!-- Fish 2 (background, partially visible) -->
  <g transform="translate(110,138) rotate(-4)" opacity="0.72">
    <ellipse cx="0" cy="0" rx="34" ry="14" fill="#c87840"/>
    <ellipse cx="-2" cy="-8" rx="28" ry="6" fill="#a05828" opacity="0.48"/>
    <ellipse cx="3" cy="8"  rx="26" ry="5.5" fill="#e0d0b0" opacity="0.45"/>
    <ellipse cx="30" cy="0" rx="11" ry="11" fill="#b87038"/>
    <path d="M41,2 Q44,4 41,6" fill="none" stroke="#805030" stroke-width="1.1" stroke-linecap="round"/>
    <circle cx="36" cy="-3" r="3.8" fill="#181818"/>
    <!-- Ocellus on this fish too -->
    <circle cx="-32" cy="-5" r="4.5" fill="#101010"/>
    <circle cx="-32" cy="-5" r="6"   fill="none" stroke="#d0a060" stroke-width="1.0" opacity="0.55"/>
    <!-- Caudal fin -->
    <path d="M-38,-6 Q-44,0 -38,6" fill="none" stroke="#805028" stroke-width="2.0" stroke-linecap="round"/>
    <!-- Dorsal fin -->
    <path d="M8,-14 Q3,-22 -2,-24 Q-7,-22 -14,-18" fill="none" stroke="#805028" stroke-width="1.2"/>
  </g>

  <!-- Fish 3 (deeper, small) -->
  <g transform="translate(390,145) rotate(-5)" opacity="0.55">
    <ellipse cx="0" cy="0" rx="26" ry="11" fill="#c07840"/>
    <ellipse cx="22" cy="0" rx="9"  ry="9"  fill="#b07038"/>
    <circle cx="27" cy="-2" r="3" fill="#181818"/>
    <circle cx="-22" cy="-4" r="3.5" fill="#101010"/>
    <circle cx="-22" cy="-4" r="5"   fill="none" stroke="#d0a060" stroke-width="0.9" opacity="0.50"/>
    <path d="M-30,-5 Q-36,0 -30,5" fill="none" stroke="#805028" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Depth ruler (0–100 m) -->
  <line x1="478" y1="8" x2="478" y2="162" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="8"   x2="478" y2="8"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="11"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="59"  x2="478" y2="59"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="62"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">30</text>
  <line x1="474" y1="110" x2="478" y2="110" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="113" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">60</text>
  <line x1="474" y1="162" x2="478" y2="162" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="165" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">100</text>
  <text x="481" y="25" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">沿岸砂泥底・河口・潟湖</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">0–100 m；尾柄具一枚大黑眼斑（診斷）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食魚類・甲殼類；銅紅色體表</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">原產大西洋・墨西哥灣；台灣引進養殖</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
