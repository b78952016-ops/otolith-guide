<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea23" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1878b0"/>
      <stop offset="45%" stop-color="#0e5080"/>
      <stop offset="100%" stop-color="#0a2848"/>
    </linearGradient>
    <linearGradient id="sand23" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0a868"/>
      <stop offset="100%" stop-color="#887040"/>
    </linearGradient>
    <linearGradient id="rock23" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#504030"/>
      <stop offset="100%" stop-color="#302018"/>
    </linearGradient>
  </defs>

  <!-- Tropical coastal water, sandy inshore + reef patch -->
  <rect width="500" height="195" fill="url(#sea23)" rx="6"/>

  <!-- Surface shimmer -->
  <path d="M0,7 Q80,4 165,7 Q250,10 335,7 Q415,4 500,7"
        fill="none" stroke="#60e0f8" stroke-width="1.5" opacity="0.60"/>
  <path d="M0,17 Q90,12 185,17 Q280,22 370,17 Q440,12 500,17"
        fill="none" stroke="#48c8e8" stroke-width="1.0" opacity="0.44"/>

  <!-- Light shafts (shallow clear water) -->
  <line x1="140" y1="0" x2="100" y2="130" stroke="#d0f0ff" stroke-width="10" opacity="0.05"/>
  <line x1="280" y1="0" x2="245" y2="135" stroke="#d0f0ff" stroke-width="8"  opacity="0.04"/>

  <!-- Sandy bottom -->
  <path d="M0,170 Q80,164 175,170 Q270,176 360,168 Q420,162 500,168 L500,195 L0,195 Z"
        fill="url(#sand23)"/>
  <!-- Sand ripples -->
  <path d="M20,177 Q80,175 140,177" fill="none" stroke="#d0b878" stroke-width="0.7" opacity="0.55"/>
  <path d="M180,180 Q240,178 300,180" fill="none" stroke="#d0b878" stroke-width="0.7" opacity="0.55"/>
  <path d="M340,177 Q400,175 460,177" fill="none" stroke="#d0b878" stroke-width="0.7" opacity="0.55"/>

  <!-- Rocky reef patch (right side, adult habitat) -->
  <path d="M350,160 Q385,145 420,152 Q455,159 500,148 L500,195 L350,195 Z"
        fill="url(#rock23)"/>
  <path d="M365,152 Q398,142 430,148 Q458,154 492,146"
        fill="none" stroke="#706050" stroke-width="1.5" opacity="0.45"/>
  <!-- Coral on reef -->
  <g stroke="#c06020" fill="none" stroke-width="1.0" opacity="0.78">
    <line x1="405" y1="150" x2="405" y2="132"/>
    <line x1="405" y1="141" x2="396" y2="129"/>
    <line x1="405" y1="137" x2="414" y2="126"/>
    <circle cx="396" cy="129" r="1.4" fill="#e08040"/>
    <circle cx="414" cy="126" r="1.4" fill="#e08040"/>
  </g>

  <!-- Fish: 布氏鯧鰺 Trachinotus blochii (Snubnose pompano / 金鯧) -->
  <!-- Carangidae: very deep oval, laterally compressed; BRIGHT SILVER body;
       YELLOW-GOLDEN fins (diagnostic!); short blunt SNUBNOSE (short snout);
       falcate 2nd dorsal and anal fins (anterior rays longest);
       deeply forked tail; 5–20 m sandy inshore / reef edge -->

  <!-- Main fish (foreground) -->
  <g transform="translate(225,110) rotate(-5)" opacity="0.92">
    <!-- Body: very deep oval, BRIGHT SILVER -->
    <ellipse cx="0" cy="0" rx="25" ry="18" fill="#c8d2dc"/>
    <!-- Dark blue-grey back -->
    <ellipse cx="0" cy="-11" rx="20" ry="7" fill="#2a3858" opacity="0.55"/>
    <!-- Silver-white belly -->
    <ellipse cx="2" cy="9" rx="18" ry="6" fill="#eaf0f8" opacity="0.42"/>
    <!-- Caudal peduncle (slender) -->
    <ellipse cx="-22" cy="0" rx="5" ry="13" fill="#9ab0bc" opacity="0.80"/>
    <!-- Head: SNUBNOSE — steep, rounded forehead (no pointed snout) -->
    <ellipse cx="22" cy="0" rx="8" ry="16" fill="#9ab0bc"/>
    <!-- Steep blunt snout profile -->
    <path d="M28,-7 Q33,0 28,7" fill="none" stroke="#708898" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Small subterminal mouth -->
    <path d="M30,2 Q32,4 30,6" fill="none" stroke="#587888" stroke-width="1.0" stroke-linecap="round"/>
    <!-- Eye -->
    <circle cx="24" cy="-5" r="4.0" fill="#181818"/>
    <circle cx="25" cy="-6" r="1.3" fill="#8090a8" opacity="0.40"/>
    <!-- First dorsal fin (a few short spines, separate from 2nd) -->
    <path d="M2,-18 Q6,-24 10,-18" fill="none" stroke="#c8a020" stroke-width="1.4"/>
    <!-- Second dorsal fin (FALCATE — anterior ray longest, sickle-shaped) -->
    <path d="M10,-18 Q19,-29 24,-23 Q27,-18 26,-13" fill="none" stroke="#c8a020" stroke-width="1.6"/>
    <!-- Anal fin (mirrors 2nd dorsal, FALCATE) -->
    <path d="M10,18 Q19,29 24,23 Q27,18 26,13" fill="none" stroke="#c8a020" stroke-width="1.6"/>
    <!-- Pelvic fins (YELLOW) -->
    <path d="M12,13 Q18,20 22,14" fill="none" stroke="#c8a020" stroke-width="1.5" opacity="0.82"/>
    <!-- Pectoral fin (yellowish) -->
    <path d="M16,9 Q24,17 28,10" fill="none" stroke="#c8a020" stroke-width="1.4" opacity="0.72"/>
    <!-- DEEPLY FORKED tail, long lobes (YELLOW-GOLDEN) -->
    <path d="M-27,0 L-41,-20" stroke="#c8a020" stroke-width="3.8" stroke-linecap="round" fill="none"/>
    <path d="M-27,0 L-41, 20" stroke="#c8a020" stroke-width="3.8" stroke-linecap="round" fill="none"/>
    <path d="M-41,-20 Q-31,0 -41,20" fill="none" stroke="#c8a020" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- Fish 2 (background) -->
  <g transform="translate(370,128) rotate(-3)" opacity="0.78">
    <!-- Body: deep oval, silver -->
    <ellipse cx="0" cy="0" rx="20" ry="14" fill="#c8d2dc"/>
    <ellipse cx="0" cy="-8" rx="16" ry="5.5" fill="#2a3858" opacity="0.52"/>
    <ellipse cx="17" cy="0" rx="6.5" ry="12.5" fill="#9ab0bc"/>
    <!-- Eye -->
    <circle cx="19" cy="-3" r="3.2" fill="#181818"/>
    <!-- Falcate 2nd dorsal -->
    <path d="M8,-14 Q15,-22 19,-17 Q21,-13 21,-10" fill="none" stroke="#c8a020" stroke-width="1.3"/>
    <!-- Falcate anal -->
    <path d="M8,14 Q15,22 19,17 Q21,13 21,10" fill="none" stroke="#c8a020" stroke-width="1.3"/>
    <!-- Yellow tail, forked -->
    <path d="M-20,0 L-30,-15" stroke="#c8a020" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M-20,0 L-30, 15" stroke="#c8a020" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M-30,-15 Q-22,0 -30,15" fill="none" stroke="#c8a020" stroke-width="2.0" stroke-linecap="round"/>
  </g>

  <!-- Fish 3 (juvenile near sand, smaller) -->
  <g transform="translate(110,150) rotate(-4)" opacity="0.80">
    <ellipse cx="0" cy="0" rx="16" ry="11" fill="#c8d2dc"/>
    <ellipse cx="0" cy="-6" rx="12" ry="4.5" fill="#2a3858" opacity="0.50"/>
    <ellipse cx="13" cy="0" rx="5" ry="9.5" fill="#9ab0bc"/>
    <circle cx="14" cy="-3" r="2.6" fill="#181818"/>
    <!-- Fins yellow -->
    <path d="M6,-11 Q11,-17 15,-12 Q17,-9 16,-7" fill="none" stroke="#c8a020" stroke-width="1.2"/>
    <path d="M6,11 Q11,17 15,12 Q17,9 16,7"   fill="none" stroke="#c8a020" stroke-width="1.2"/>
    <path d="M-16,0 L-24,-12" stroke="#c8a020" stroke-width="2.6" stroke-linecap="round" fill="none"/>
    <path d="M-16,0 L-24, 12" stroke="#c8a020" stroke-width="2.6" stroke-linecap="round" fill="none"/>
    <path d="M-24,-12 Q-18,0 -24,12" fill="none" stroke="#c8a020" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- Depth ruler (0–20 m) -->
  <line x1="478" y1="7" x2="478" y2="172" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="7"   x2="478" y2="7"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="10"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="97"  x2="478" y2="97"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="100" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">10</text>
  <line x1="474" y1="172" x2="478" y2="172" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="175" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">20</text>
  <text x="481" y="24" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">砂泥底近岸・幼魚淺灣 ／ 成魚沿岸礁</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">5–20 m；銀白體・黃鰭・短鈍吻（診斷）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食砂地無脊椎動物；重要養殖魚種</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">東非・紅海至薩摩亞，北至日本南部</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
