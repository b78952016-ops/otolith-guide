<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea65" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1878b8"/>
      <stop offset="30%" stop-color="#0e5888"/>
      <stop offset="75%" stop-color="#063040"/>
      <stop offset="100%" stop-color="#031420"/>
    </linearGradient>
    <linearGradient id="rock65" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4e5660"/>
      <stop offset="100%" stop-color="#202428"/>
    </linearGradient>
  </defs>

  <!-- Rocky shore wave zone — 激浪區 -->
  <rect width="500" height="195" fill="url(#sea65)" rx="6"/>

  <!-- Turbulent wave surface (prominent wave action) -->
  <path d="M0,5 Q50,0 100,5 Q150,10 200,4 Q250,-1 300,4 Q350,9 400,4 Q450,-1 500,5"
        fill="none" stroke="#80d8f8" stroke-width="2.0" opacity="0.68"/>
  <path d="M0,13 Q60,8 125,13 Q190,18 255,12 Q320,6 385,12 Q445,18 500,13"
        fill="none" stroke="#58c0e0" stroke-width="1.3" opacity="0.48"/>
  <!-- Wave crests (breaking waves) -->
  <path d="M65,6 Q80,2 95,6"  fill="none" stroke="#d8f4ff" stroke-width="2.5" opacity="0.55"/>
  <path d="M220,4 Q235,0 250,4" fill="none" stroke="#d8f4ff" stroke-width="2.5" opacity="0.52"/>
  <path d="M370,5 Q385,1 400,5" fill="none" stroke="#d8f4ff" stroke-width="2.2" opacity="0.48"/>
  <!-- Wave foam streaks -->
  <path d="M30,15 Q60,12 90,15"  fill="none" stroke="#c0e8f8" stroke-width="1.0" opacity="0.35"/>
  <path d="M200,13 Q230,10 260,13" fill="none" stroke="#c0e8f8" stroke-width="1.0" opacity="0.32"/>

  <!-- Light shafts through surf -->
  <line x1="155" y1="5" x2="125" y2="155" stroke="#d0f0ff" stroke-width="12" opacity="0.06"/>
  <line x1="385" y1="5" x2="360" y2="158" stroke="#d0f0ff" stroke-width="8"  opacity="0.04"/>

  <!-- Prominent rocky reef bottom -->
  <path d="M0,150 Q40,133 90,143 Q140,153 192,133 Q242,113 298,133 Q348,153 400,133 Q448,113 500,128 L500,195 L0,195 Z"
        fill="url(#rock65)"/>
  <!-- Large boulders (wave-zone rocks) -->
  <ellipse cx="55"  cy="145" rx="32" ry="12" fill="#3a4048" opacity="0.78"/>
  <ellipse cx="185" cy="135" rx="28" ry="10" fill="#3a4048" opacity="0.72"/>
  <ellipse cx="318" cy="133" rx="26" ry="10" fill="#3a4048" opacity="0.68"/>
  <ellipse cx="460" cy="135" rx="22" ry="8"  fill="#3a4048" opacity="0.65"/>
  <!-- Algae on rocks (wave zone) -->
  <ellipse cx="90"  cy="140" rx="22" ry="6" fill="#2a5828" opacity="0.60"/>
  <ellipse cx="230" cy="128" rx="20" ry="6" fill="#2a6030" opacity="0.56"/>
  <ellipse cx="370" cy="128" rx="18" ry="5.5" fill="#2a5828" opacity="0.52"/>
  <!-- Rock crevices -->
  <path d="M40,148 Q68,140 100,146" fill="none" stroke="#1a2028" stroke-width="2.0" opacity="0.50"/>
  <path d="M168,137 Q206,129 242,135" fill="none" stroke="#1a2028" stroke-width="1.5" opacity="0.44"/>

  <!-- Fish: 瓜子鱲 Girella punctata (Largescale blackfish / 黑毛) -->
  <!-- Kyphosidae/Girellidae: moderately deep oval body;
       OVERALL DARK charcoal-grey to dark brown (diagnostic 黑毛 = black fish);
       small nearly-terminal mouth; grey-black fins;
       wave zone rocky reef (激浪區), 1–30 m;
       adults in turbulent surf zone -->

  <!-- Main fish (foreground) -->
  <g transform="translate(238,105) rotate(-7)" opacity="0.93">
    <!-- Body: moderately deep oval, dark grey-brown -->
    <ellipse cx="0" cy="0" rx="30" ry="18" fill="#383838"/>
    <!-- Slightly darker back -->
    <ellipse cx="-2" cy="-10" rx="24" ry="7" fill="#202020" opacity="0.68"/>
    <!-- Faint lighter scale shimmer on sides -->
    <ellipse cx="4" cy="4" rx="22" ry="12" fill="#606060" opacity="0.22"/>
    <!-- Paler belly (subtle) -->
    <ellipse cx="4" cy="10" rx="18" ry="7" fill="#585858" opacity="0.30"/>
    <!-- Caudal peduncle -->
    <ellipse cx="-27" cy="0" rx="5" ry="14" fill="#2c2c2c" opacity="0.82"/>
    <!-- Head: blunt, slightly pointed -->
    <ellipse cx="26" cy="0" rx="11" ry="16" fill="#2c2c2c"/>
    <!-- Small terminal mouth -->
    <path d="M36,2 Q39,5 36,8" fill="none" stroke="#181818" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Eye: moderate -->
    <circle cx="28" cy="-5" r="4.5" fill="#101010"/>
    <circle cx="29" cy="-6" r="1.8" fill="#485058" opacity="0.45"/>
    <!-- Long dorsal fin (spiny + soft-rayed) -->
    <path d="M12,-18 Q5,-27 0,-29 Q-6,-27 -12,-22 Q-18,-17 -22,-12"
          fill="none" stroke="#282828" stroke-width="1.4"/>
    <path d="M-22,-12 Q-26,-16 -28,-14 Q-28,-11 -28,-7" fill="none" stroke="#282828" stroke-width="1.2"/>
    <!-- Anal fin -->
    <path d="M-8,18 Q-14,24 -20,22 Q-26,20 -27,15"
          fill="none" stroke="#282828" stroke-width="1.2"/>
    <!-- Pectoral fin -->
    <path d="M20,8 Q30,16 35,9" fill="none" stroke="#303030" stroke-width="1.3" opacity="0.72"/>
    <!-- Caudal fin (forked) -->
    <path d="M-31,0 L-44,-14" stroke="#282828" stroke-width="3.6" stroke-linecap="round" fill="none"/>
    <path d="M-31,0 L-44, 14" stroke="#282828" stroke-width="3.6" stroke-linecap="round" fill="none"/>
    <path d="M-44,-14 Q-49,0 -44,14" fill="none" stroke="#282828" stroke-width="2.3" stroke-linecap="round"/>
  </g>

  <!-- Fish 2 (background) -->
  <g transform="translate(115,125) rotate(-5)" opacity="0.80">
    <ellipse cx="0" cy="0" rx="24" ry="14" fill="#383838"/>
    <ellipse cx="21" cy="0" rx="9" ry="13" fill="#2c2c2c"/>
    <circle cx="22" cy="-4" r="3.8" fill="#101010"/>
    <path d="M8,-14 Q3,-22 -2,-24 Q-7,-22 -12,-17 Q-16,-13 -18,-9" fill="none" stroke="#282828" stroke-width="1.3"/>
    <path d="M-24,0 L-34,-11" stroke="#282828" stroke-width="3.0" stroke-linecap="round" fill="none"/>
    <path d="M-24,0 L-34, 11" stroke="#282828" stroke-width="3.0" stroke-linecap="round" fill="none"/>
    <path d="M-34,-11 Q-38,0 -34,11" fill="none" stroke="#282828" stroke-width="1.9" stroke-linecap="round"/>
  </g>

  <!-- Fish 3 (right, near reef) -->
  <g transform="translate(400,120) rotate(-4)" opacity="0.65">
    <ellipse cx="0" cy="0" rx="20" ry="12" fill="#383838"/>
    <ellipse cx="17" cy="0" rx="7.5" ry="10" fill="#2c2c2c"/>
    <circle cx="18" cy="-3" r="3.2" fill="#101010"/>
    <path d="M-20,0 L-29,-10" stroke="#282828" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-20,0 L-29, 10" stroke="#282828" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Depth ruler (0–30 m) -->
  <line x1="478" y1="5" x2="478" y2="155" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="5"   x2="478" y2="5"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="8"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="57"  x2="478" y2="57"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="60"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">10</text>
  <line x1="474" y1="106" x2="478" y2="106" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="109" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">20</text>
  <line x1="474" y1="155" x2="478" y2="155" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="158" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">30</text>
  <text x="481" y="22" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">岩礁激浪區・亞潮帶礁石</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">1–30 m；全身深炭灰・浪激礁區（診斷）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">冬食藻類・夏食小型生物；黑毛魚科</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">西北太平洋（台灣北部・東北部礁岸）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
