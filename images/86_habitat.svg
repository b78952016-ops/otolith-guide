<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sky86" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#88b8d0"/>
      <stop offset="100%" stop-color="#b0d0e0"/>
    </linearGradient>
    <linearGradient id="sea86" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#708898"/>
      <stop offset="40%" stop-color="#485868"/>
      <stop offset="80%" stop-color="#2c3840"/>
      <stop offset="100%" stop-color="#161e22"/>
    </linearGradient>
    <linearGradient id="mud86" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#989078"/>
      <stop offset="100%" stop-color="#585040"/>
    </linearGradient>
  </defs>

  <!-- Estuarine / coastal shallow water -->
  <rect width="500" height="195" fill="url(#sea86)" rx="6"/>
  <!-- Sky above -->
  <rect width="500" height="28" fill="url(#sky86)" rx="6"/>

  <!-- Shore hints -->
  <path d="M0,0 L0,28 Q18,26 32,28" fill="#7a9060" opacity="0.65"/>
  <path d="M500,0 L500,28 Q482,26 468,28" fill="#7a9060" opacity="0.62"/>

  <!-- Water surface (turbid coastal water) -->
  <path d="M0,28 Q80,25 165,28 Q250,31 335,28 Q415,25 500,28"
        fill="#708898" stroke="#608090" stroke-width="1.0" opacity="0.90"/>
  <!-- Ripples -->
  <path d="M50,31 Q90,29 130,31" fill="none" stroke="#88a0b0" stroke-width="0.8" opacity="0.42"/>
  <path d="M200,30 Q240,28 280,30" fill="none" stroke="#88a0b0" stroke-width="0.8" opacity="0.38"/>

  <!-- Murky light (turbid water) -->
  <line x1="160" y1="28" x2="142" y2="158" stroke="#98b0b8" stroke-width="12" opacity="0.048"/>

  <!-- Sandy-mud bottom -->
  <path d="M0,158 Q70,152 150,158 Q240,164 330,155 Q410,148 490,158 L500,160 L500,195 L0,195 Z"
        fill="url(#mud86)"/>
  <!-- Sandy ripple marks -->
  <path d="M20,165 Q65,162 110,165"  fill="none" stroke="#7a7060" stroke-width="0.7" opacity="0.40"/>
  <path d="M160,167 Q205,164 250,167" fill="none" stroke="#7a7060" stroke-width="0.7" opacity="0.38"/>
  <path d="M290,166 Q335,163 380,166" fill="none" stroke="#7a7060" stroke-width="0.7" opacity="0.35"/>

  <!-- Fish: 短棘鰏 Leiognathus equulus (Common ponyfish / slimy) -->
  <!-- Leiognathidae: EXTREMELY OVAL deeply compressed disc-like body;
       HIGHLY PROTRUSIBLE SMALL MOUTH (can tube forward);
       very shiny/silvery body; small fins; essentially no neck;
       estuarine / coastal sandy-mud 1–110 m -->

  <!-- Main fish (foreground) -->
  <g transform="translate(240,110) rotate(-5)" opacity="0.93">
    <!-- Body: EXTREMELY DEEP OVAL disc (key shape!) -->
    <ellipse cx="0" cy="0" rx="20" ry="22" fill="#d0d8e0"/>
    <!-- Silver sheen -->
    <ellipse cx="2" cy="0" rx="16" ry="18" fill="#e8f0f8" opacity="0.52"/>
    <!-- Slightly darker grey back (dorsal region) -->
    <ellipse cx="-1" cy="-13" rx="15" ry="8" fill="#707888" opacity="0.55"/>
    <!-- Caudal peduncle (narrow and distinct from deep body) -->
    <ellipse cx="-18" cy="0" rx="4" ry="14" fill="#b8c0c8" opacity="0.80"/>
    <!-- Head (small, barely distinct) -->
    <ellipse cx="17" cy="0" rx="6" ry="12" fill="#b8c0c8"/>
    <!-- PROTRUSIBLE SMALL MOUTH (pointing forward-down) -->
    <path d="M22,2 Q25,5 22,8" fill="none" stroke="#808898" stroke-width="1.0" stroke-linecap="round"/>
    <!-- Protruded tube mouth tip hint -->
    <circle cx="24" cy="5" r="1.5" fill="#a0a8b0" opacity="0.55"/>
    <!-- Eye: moderate, positioned high on small head -->
    <circle cx="17" cy="-4" r="3.5" fill="#181818"/>
    <circle cx="18" cy="-5" r="1.2" fill="#808898" opacity="0.38"/>
    <!-- Dorsal fin (long-based, low) -->
    <path d="M4,-22 Q0,-29 -4,-30 Q-9,-28 -12,-24 Q-15,-19 -16,-14"
          fill="none" stroke="#607080" stroke-width="1.2"/>
    <!-- Anal fin (mirrors dorsal, long-based) -->
    <path d="M4,22 Q0,29 -4,30 Q-9,28 -12,24 Q-15,19 -16,14"
          fill="none" stroke="#607080" stroke-width="1.2"/>
    <!-- Pectoral fin (small, fan) -->
    <path d="M13,8 Q20,14 22,8" fill="none" stroke="#607080" stroke-width="1.1" opacity="0.68"/>
    <!-- Small pelvic fin -->
    <path d="M8,15 Q10,20 12,16" fill="none" stroke="#607080" stroke-width="1.0" opacity="0.60"/>
    <!-- Caudal fin (forked) -->
    <path d="M-22,0 L-32,-12" stroke="#607080" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-22,0 L-32, 12" stroke="#607080" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-32,-12 Q-36,0 -32,12" fill="none" stroke="#607080" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Fish 2 (school, different angle) -->
  <g transform="translate(120,135) rotate(-4)" opacity="0.82">
    <ellipse cx="0" cy="0" rx="16" ry="18" fill="#d0d8e0"/>
    <ellipse cx="2" cy="0" rx="13" ry="14" fill="#e8f0f8" opacity="0.48"/>
    <ellipse cx="-1" cy="-11" rx="11" ry="6" fill="#707888" opacity="0.50"/>
    <ellipse cx="-14" cy="0" rx="3.5" ry="11" fill="#b8c0c8" opacity="0.78"/>
    <ellipse cx="14" cy="0" rx="5" ry="10" fill="#b8c0c8"/>
    <circle cx="14" cy="-3" r="2.8" fill="#181818"/>
    <path d="M3,-18 Q-1,-24 -4,-24 Q-8,-22 -10,-19 Q-12,-15 -13,-11" fill="none" stroke="#607080" stroke-width="1.1"/>
    <path d="M3,18 Q-1,24 -4,24 Q-8,22 -10,19 Q-12,15 -13,11" fill="none" stroke="#607080" stroke-width="1.1"/>
    <path d="M-17,0 L-24,-10" stroke="#607080" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <path d="M-17,0 L-24, 10" stroke="#607080" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <path d="M-24,-10 Q-28,0 -24,10" fill="none" stroke="#607080" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Fish 3 (school) -->
  <g transform="translate(360,120) rotate(-6)" opacity="0.75">
    <ellipse cx="0" cy="0" rx="14" ry="16" fill="#d0d8e0"/>
    <ellipse cx="-12" cy="0" rx="3" ry="10" fill="#b8c0c8" opacity="0.75"/>
    <ellipse cx="12" cy="0" rx="4.5" ry="9" fill="#b8c0c8"/>
    <circle cx="12" cy="-3" r="2.5" fill="#181818"/>
    <path d="M-15,0 L-21,-9" stroke="#607080" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <path d="M-15,0 L-21, 9" stroke="#607080" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Fish 4 (near bottom, probing) -->
  <g transform="translate(435,145) rotate(20)" opacity="0.65">
    <ellipse cx="0" cy="0" rx="12" ry="14" fill="#d0d8e0"/>
    <ellipse cx="10" cy="0" rx="4" ry="8" fill="#b8c0c8"/>
    <!-- Protruded mouth pointing down -->
    <path d="M13,5 Q16,9 13,12" fill="none" stroke="#808898" stroke-width="0.9" stroke-linecap="round"/>
    <circle cx="10" cy="-3" r="2.2" fill="#181818"/>
    <path d="M-13,0 L-19,-8" stroke="#607080" stroke-width="2.0" stroke-linecap="round" fill="none"/>
    <path d="M-13,0 L-19, 8" stroke="#607080" stroke-width="2.0" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Depth ruler (0–110 m) -->
  <line x1="478" y1="28" x2="478" y2="158" stroke="#3a5060" stroke-width="1"/>
  <line x1="474" y1="28"  x2="478" y2="28"  stroke="#4a6070" stroke-width="1"/>
  <text x="480" y="31"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="71"  x2="478" y2="71"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="74"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">30</text>
  <line x1="474" y1="115" x2="478" y2="115" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="118" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">70</text>
  <line x1="474" y1="158" x2="478" y2="158" stroke="#4a6070" stroke-width="1"/>
  <text x="480" y="161" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">110</text>
  <text x="481" y="44" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">河口・紅樹林・近岸砂泥底</text>
  <text x="12" y="42" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">1–110 m；極扁圓碟形體・嘴可向前突出（診斷）</text>
  <text x="12" y="56" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食多毛類・甲殼類・小魚；廣鹽性群游</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度－西太平洋（台灣西南部・小琉球）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
