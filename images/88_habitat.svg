<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea88" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1878c0"/>
      <stop offset="40%" stop-color="#0e5888"/>
      <stop offset="80%" stop-color="#062030"/>
      <stop offset="100%" stop-color="#030e18"/>
    </linearGradient>
    <linearGradient id="sand88" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a9070"/>
      <stop offset="100%" stop-color="#605840"/>
    </linearGradient>
  </defs>

  <!-- Open coastal water (pelagic) -->
  <rect width="500" height="195" fill="url(#sea88)" rx="6"/>

  <!-- Surface shimmer -->
  <path d="M0,7 Q80,4 165,7 Q250,10 335,7 Q415,4 500,7"
        fill="none" stroke="#60c8e8" stroke-width="1.5" opacity="0.58"/>
  <path d="M0,17 Q90,12 185,17 Q280,22 370,17 Q440,12 500,17"
        fill="none" stroke="#48b0d0" stroke-width="1.0" opacity="0.44"/>

  <!-- Light shafts (clear coastal water) -->
  <line x1="150" y1="7" x2="118" y2="155" stroke="#c8e8ff" stroke-width="14" opacity="0.055"/>
  <line x1="370" y1="7" x2="342" y2="158" stroke="#c8e8ff" stroke-width="9"  opacity="0.040"/>

  <!-- Distant sandy bottom (deep) -->
  <path d="M0,168 Q80,162 160,168 Q240,174 330,166 Q420,158 500,166 L500,195 L0,195 Z"
        fill="url(#sand88)"/>

  <!-- Marine snow -->
  <circle cx="80"  cy="55"  r="0.9" fill="#ffffff" opacity="0.16"/>
  <circle cx="200" cy="38"  r="0.8" fill="#ffffff" opacity="0.14"/>
  <circle cx="340" cy="65"  r="0.8" fill="#ffffff" opacity="0.14"/>
  <circle cx="440" cy="42"  r="0.7" fill="#ffffff" opacity="0.12"/>
  <circle cx="150" cy="110" r="0.7" fill="#ffffff" opacity="0.11"/>

  <!-- Fish: 北鯧 Pampus argenteus (Silver pomfret) / 中國鯧 -->
  <!-- Very distinctive: highly compressed oval/rhombus body; NO pelvic fins;
       deeply forked tail with VERY long slender lobes; silver-white; small mouth -->

  <!-- Main fish (foreground, slightly angled) -->
  <g transform="translate(252,100) rotate(-7)" opacity="0.92">
    <!-- Body: oval-rhombus, very laterally compressed, silver -->
    <ellipse cx="0" cy="0" rx="28" ry="22" fill="#d8dce0"/>
    <!-- Darker blue-grey back -->
    <ellipse cx="-2" cy="-14" rx="22" ry="8" fill="#3a4858" opacity="0.50"/>
    <!-- Brilliant silver flanks -->
    <ellipse cx="3" cy="2" rx="22" ry="16" fill="#e8eef2" opacity="0.45"/>
    <!-- Dorsal fin (single, arching) -->
    <path d="M-22,-22 Q-10,-36 0,-38 Q10,-36 18,-28 Q22,-24 24,-18"
          fill="none" stroke="#607080" stroke-width="1.5"/>
    <!-- Anal fin (mirrors dorsal below) -->
    <path d="M-18,22 Q-6,35 4,37 Q14,35 20,28 Q23,24 24,18"
          fill="none" stroke="#607080" stroke-width="1.4"/>
    <!-- NO pelvic fins (diagnostic for Pampus!) -->
    <!-- Pectoral fin (small, fan-like) -->
    <path d="M18,8 Q26,16 26,6" fill="none" stroke="#607080" stroke-width="1.2" opacity="0.70"/>
    <!-- DEEPLY forked caudal fin with very long slender lobes (diagnostic) -->
    <path d="M-28,0 L-48,-28" stroke="#607080" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-28,0 L-48, 28" stroke="#607080" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-48,-28 Q-52,0 -48,28" fill="none" stroke="#607080" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Small terminal mouth -->
    <path d="M26,-2 Q29,1 26,4" fill="none" stroke="#506070" stroke-width="1.1" stroke-linecap="round"/>
    <!-- Eye: small-medium -->
    <circle cx="22" cy="-5" r="3.5" fill="#181818"/>
    <circle cx="23" cy="-6" r="1.1" fill="#809090" opacity="0.38"/>
    <!-- Lateral line (faint arc) -->
    <path d="M22,-8 Q0,-12 -22,-5" fill="none" stroke="#9098a0" stroke-width="0.6" opacity="0.25"/>
  </g>

  <!-- Fish 2 (slightly larger, different angle) -->
  <g transform="translate(140,120) rotate(-5)" opacity="0.82">
    <ellipse cx="0" cy="0" rx="23" ry="18" fill="#d8dce0"/>
    <ellipse cx="-2" cy="-11" rx="18" ry="7" fill="#3a4858" opacity="0.45"/>
    <ellipse cx="2" cy="2" rx="18" ry="13" fill="#e8eef2" opacity="0.42"/>
    <path d="M-18,-18 Q-8,-30 0,-32 Q8,-30 14,-23 Q18,-18 20,-14"
          fill="none" stroke="#607080" stroke-width="1.3"/>
    <path d="M-15,18 Q-4,30 3,31 Q11,29 16,23 Q19,18 20,14"
          fill="none" stroke="#607080" stroke-width="1.3"/>
    <path d="M-23,0 L-40,-23" stroke="#607080" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M-23,0 L-40, 23" stroke="#607080" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M-40,-23 Q-44,0 -40,23" fill="none" stroke="#607080" stroke-width="1.9" stroke-linecap="round"/>
    <circle cx="19" cy="-4" r="3" fill="#181818"/>
  </g>

  <!-- Fish 3 (background, deeper) -->
  <g transform="translate(380,128) rotate(-4)" opacity="0.65">
    <ellipse cx="0" cy="0" rx="19" ry="15" fill="#d8dce0"/>
    <ellipse cx="-2" cy="-9" rx="15" ry="6" fill="#3a4858" opacity="0.42"/>
    <path d="M-19,0 L-33,-19" stroke="#607080" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M-19,0 L-33, 19" stroke="#607080" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M-33,-19 Q-37,0 -33,19" fill="none" stroke="#607080" stroke-width="1.6" stroke-linecap="round"/>
    <circle cx="16" cy="-3" r="2.5" fill="#181818"/>
  </g>

  <!-- Depth ruler: 0–100 m -->
  <line x1="478" y1="7" x2="478" y2="168" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="7"   x2="478" y2="7"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="10"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="61"  x2="478" y2="61"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="64"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">30</text>
  <line x1="474" y1="114" x2="478" y2="114" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="117" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">60</text>
  <line x1="474" y1="168" x2="478" y2="168" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="171" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">100</text>
  <text x="481" y="24" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">沿岸中上層・砂泥底大陸棚</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">1–100 m；無腹鰭・深叉尾（診斷）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食浮游動物・小型甲殼類</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">西北太平洋（台灣西部・北部沿海）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
