<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea94" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1888b8"/>
      <stop offset="40%" stop-color="#0e5888"/>
      <stop offset="100%" stop-color="#0a2848"/>
    </linearGradient>
    <linearGradient id="sand94" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8a870"/>
      <stop offset="100%" stop-color="#786840"/>
    </linearGradient>
    <linearGradient id="rock94" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#585050"/>
      <stop offset="100%" stop-color="#302828"/>
    </linearGradient>
  </defs>

  <!-- Coastal water, sandy-reef mixed habitat -->
  <rect width="500" height="195" fill="url(#sea94)" rx="6"/>

  <!-- Surface shimmer -->
  <path d="M0,8 Q80,5 165,8 Q250,11 335,8 Q415,5 500,8"
        fill="none" stroke="#70d0f0" stroke-width="1.4" opacity="0.58"/>
  <path d="M0,18 Q90,13 185,18 Q280,23 370,18 Q440,13 500,18"
        fill="none" stroke="#58c0d8" stroke-width="1.0" opacity="0.44"/>

  <!-- Light shafts -->
  <line x1="130" y1="8" x2="100" y2="130" stroke="#d0f0ff" stroke-width="10" opacity="0.05"/>
  <line x1="360" y1="8" x2="335" y2="140" stroke="#d0f0ff" stroke-width="8"  opacity="0.04"/>

  <!-- Sandy-mud bottom -->
  <path d="M0,168 Q80,162 160,168 Q240,174 320,166 Q400,158 480,166 Q490,167 500,167 L500,195 L0,195 Z"
        fill="url(#sand94)"/>
  <!-- Sand ripples -->
  <path d="M20,175 Q80,173 140,175" fill="none" stroke="#d0c080" stroke-width="0.7" opacity="0.48"/>
  <path d="M185,178 Q245,176 305,178" fill="none" stroke="#d0c080" stroke-width="0.7" opacity="0.48"/>
  <path d="M355,175 Q415,173 470,175" fill="none" stroke="#d0c080" stroke-width="0.7" opacity="0.45"/>

  <!-- Reef patch (right side) -->
  <path d="M360,158 Q400,145 445,152 Q475,158 500,152 L500,195 L360,195 Z"
        fill="url(#rock94)"/>
  <path d="M372,152 Q408,142 445,148 Q472,153 500,148"
        fill="none" stroke="#706050" stroke-width="1.3" opacity="0.40"/>
  <!-- Algae on reef -->
  <ellipse cx="388" cy="153" rx="14" ry="4" fill="#6a9848" opacity="0.35"/>
  <ellipse cx="435" cy="150" rx="10" ry="3" fill="#8ab060" opacity="0.28"/>

  <!-- Fish: 平鯛 Rhabdosargus sarba (Goldsilk sea bream) -->
  <!-- Silver-white body, dark blue-grey back, yellowish-olive fins, faint vertical bars -->
  <!-- Oval sparid body — distinctly NOT red -->

  <!-- Main fish (foreground) -->
  <g transform="translate(230,118) rotate(-5)" opacity="0.92">
    <!-- Body: oval sparid, silver-white -->
    <ellipse cx="0" cy="0" rx="29" ry="17" fill="#d0d8dc"/>
    <!-- Dark blue-grey dorsal zone -->
    <ellipse cx="-1" cy="-9" rx="23" ry="8" fill="#384858" opacity="0.50"/>
    <!-- Near-white belly -->
    <ellipse cx="3"  cy="10" rx="22" ry="5.5" fill="#eef2f8" opacity="0.55"/>
    <!-- Faint vertical bars (characteristic of sarba) -->
    <line x1="10"  y1="-15" x2="10"  y2="15" stroke="#5a6878" stroke-width="0.7" opacity="0.16"/>
    <line x1="1"   y1="-17" x2="1"   y2="17" stroke="#5a6878" stroke-width="0.7" opacity="0.14"/>
    <line x1="-9"  y1="-16" x2="-9"  y2="16" stroke="#5a6878" stroke-width="0.7" opacity="0.14"/>
    <line x1="-18" y1="-14" x2="-18" y2="14" stroke="#5a6878" stroke-width="0.7" opacity="0.12"/>
    <!-- Dorsal fin — spiny + soft, olive-grey tint -->
    <path d="M-18,-17 Q-8,-27 2,-29 Q10,-27 18,-20 Q22,-17 26,-15"
          fill="none" stroke="#607060" stroke-width="1.4"/>
    <!-- Soft dorsal -->
    <path d="M26,-15 Q29,-19 29,-14" fill="none" stroke="#607060" stroke-width="1.2"/>
    <!-- Anal fin -->
    <path d="M-6,17 Q4,23 14,17" fill="none" stroke="#607060" stroke-width="1.2"/>
    <!-- Moderately forked tail — slightly yellowish -->
    <path d="M-29,0 L-41,-14" stroke="#807848" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M-29,0 L-41, 14" stroke="#807848" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M-41,-14 Q-46,0 -41,14" fill="none" stroke="#807848" stroke-width="3.0" stroke-linecap="round"/>
    <!-- Pectoral fin -->
    <path d="M20,10 Q29,18 31,11" fill="none" stroke="#607060" stroke-width="1.2" opacity="0.78"/>
    <!-- Eye: moderately large -->
    <circle cx="26" cy="-3" r="4.0" fill="#181818"/>
    <circle cx="27.2" cy="-4.2" r="1.3" fill="#809090" opacity="0.35"/>
    <!-- Mouth: terminal, small -->
    <path d="M29,0 Q31,2.5 28,5" fill="none" stroke="#506070" stroke-width="1.1" stroke-linecap="round"/>
    <!-- Operculum line -->
    <path d="M18,-12 Q22,0 18,12" fill="none" stroke="#5a6878" stroke-width="0.7" opacity="0.35"/>
  </g>

  <!-- Fish 2 (background, slightly smaller) -->
  <g transform="translate(380,132) rotate(-3)" opacity="0.78">
    <ellipse cx="0" cy="0" rx="22" ry="13" fill="#d0d8dc"/>
    <ellipse cx="-1" cy="-7" rx="18" ry="6" fill="#384858" opacity="0.45"/>
    <line x1="7"  y1="-11" x2="7"  y2="11" stroke="#5a6878" stroke-width="0.6" opacity="0.14"/>
    <line x1="-3" y1="-12" x2="-3" y2="12" stroke="#5a6878" stroke-width="0.6" opacity="0.13"/>
    <path d="M-14,-13 Q-6,-20 3,-13" fill="none" stroke="#607060" stroke-width="1.2"/>
    <path d="M-22,0 L-31,-12" stroke="#807848" stroke-width="3.8" stroke-linecap="round" fill="none"/>
    <path d="M-22,0 L-31, 12" stroke="#807848" stroke-width="3.8" stroke-linecap="round" fill="none"/>
    <path d="M-31,-12 Q-35,0 -31,12" fill="none" stroke="#807848" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="19" cy="-2" r="3.0" fill="#181818"/>
    <path d="M-4,13 Q4,18 11,13" fill="none" stroke="#607060" stroke-width="1.1"/>
  </g>

  <!-- Fish 3 (near bottom) -->
  <g transform="translate(105,155) rotate(-2)" opacity="0.75">
    <ellipse cx="0" cy="0" rx="20" ry="12" fill="#d0d8dc"/>
    <ellipse cx="-1" cy="-6" rx="16" ry="5.5" fill="#384858" opacity="0.42"/>
    <line x1="5"  y1="-10" x2="5"  y2="10" stroke="#5a6878" stroke-width="0.6" opacity="0.13"/>
    <line x1="-4" y1="-11" x2="-4" y2="11" stroke="#5a6878" stroke-width="0.6" opacity="0.12"/>
    <path d="M-13,-12 Q-6,-18 2,-12" fill="none" stroke="#607060" stroke-width="1.1"/>
    <path d="M-20,0 L-28,-11" stroke="#807848" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-20,0 L-28, 11" stroke="#807848" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-28,-11 Q-32,0 -28,11" fill="none" stroke="#807848" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="17" cy="-2" r="2.7" fill="#181818"/>
  </g>

  <!-- Depth ruler: 0–60 m -->
  <line x1="478" y1="8" x2="478" y2="168" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="8"   x2="478" y2="8"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="11"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="69"  x2="478" y2="69"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="72"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">20</text>
  <line x1="474" y1="119" x2="478" y2="119" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="122" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">40</text>
  <line x1="474" y1="168" x2="478" y2="168" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="171" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">60</text>
  <text x="481" y="25" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">沿岸礁砂交錯帶・河口域</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">1–60 m；幼魚入河口，成魚向深處</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食軟體・棘皮・甲殼類；群居性</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度－西太平洋（台灣西部・南部・澎湖）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
