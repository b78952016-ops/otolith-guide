<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea82" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1878b8"/>
      <stop offset="40%" stop-color="#0e5888"/>
      <stop offset="80%" stop-color="#063040"/>
      <stop offset="100%" stop-color="#031420"/>
    </linearGradient>
    <linearGradient id="rock82" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#505858"/>
      <stop offset="100%" stop-color="#202428"/>
    </linearGradient>
  </defs>

  <!-- Rocky reef, tropical -->
  <rect width="500" height="195" fill="url(#sea82)" rx="6"/>

  <!-- Surface shimmer -->
  <path d="M0,8 Q80,5 165,8 Q250,11 335,8 Q415,5 500,8"
        fill="none" stroke="#58c8e8" stroke-width="1.3" opacity="0.52"/>

  <!-- Light shafts (clear reef water) -->
  <line x1="150" y1="8" x2="120" y2="155" stroke="#c8eeff" stroke-width="12" opacity="0.06"/>
  <line x1="385" y1="8" x2="360" y2="158" stroke="#c8eeff" stroke-width="8"  opacity="0.04"/>

  <!-- Large rocky reef bottom — prominent boulders and cave/crevice -->
  <path d="M0,148 Q45,132 100,142 Q155,152 205,130 Q255,108 318,130 Q368,150 420,130 Q462,112 500,122 L500,195 L0,195 Z"
        fill="url(#rock82)"/>
  <!-- Large boulders -->
  <ellipse cx="58"  cy="144" rx="32" ry="12" fill="#3c4048" opacity="0.78"/>
  <ellipse cx="195" cy="133" rx="30" ry="11" fill="#3c4048" opacity="0.74"/>
  <ellipse cx="338" cy="130" rx="28" ry="10" fill="#3c4048" opacity="0.70"/>
  <ellipse cx="474" cy="126" rx="24" ry="9"  fill="#3c4048" opacity="0.68"/>
  <!-- Cave opening (龍膽石斑 hides in caves) -->
  <path d="M145,144 Q180,130 215,144" fill="#101418" opacity="0.85"/>
  <path d="M310,137 Q345,122 380,137" fill="#101418" opacity="0.80"/>
  <!-- Rock crevice lines -->
  <path d="M38,147 Q68,138 100,145" fill="none" stroke="#181c20" stroke-width="2.0" opacity="0.55"/>
  <path d="M175,135 Q215,125 255,133" fill="none" stroke="#181c20" stroke-width="1.6" opacity="0.48"/>
  <!-- Algae patches -->
  <ellipse cx="105" cy="139" rx="18" ry="5" fill="#2a5828" opacity="0.52"/>
  <ellipse cx="268" cy="125" rx="16" ry="5" fill="#2a6030" opacity="0.48"/>

  <!-- Fish: 鞍帶石斑魚 Epinephelus lanceolatus (Giant grouper / 龍膽石斑) -->
  <!-- Epinephelidae: VERY LARGE heavy-set body (largest bony reef fish!);
       adult: dark brownish-olive overall with small pale spots and mottling;
       MASSIVE broad head; large terminal mouth; thick lips;
       rounded caudal fin; solitary, hides in caves; 1–200 m -->

  <!-- Main fish (large, foreground) -->
  <g transform="translate(242,103) rotate(-5)" opacity="0.93">
    <!-- Body: very large, heavy oval-elongated -->
    <ellipse cx="0" cy="0" rx="36" ry="20" fill="#303828"/>
    <!-- Dark mottling/saddle pattern on back -->
    <ellipse cx="-4" cy="-10" rx="28" ry="8" fill="#1c2018" opacity="0.65"/>
    <ellipse cx="-20" cy="-6" rx="14" ry="7" fill="#1c2018" opacity="0.52"/>
    <!-- Small pale spots scattered -->
    <circle cx="10"  cy="-4" r="2.5" fill="#8a9870" opacity="0.50"/>
    <circle cx="-2"  cy="-7" r="2.2" fill="#8a9870" opacity="0.46"/>
    <circle cx="-12" cy="-4" r="2.5" fill="#8a9870" opacity="0.44"/>
    <circle cx="-22" cy="-2" r="2.2" fill="#8a9870" opacity="0.42"/>
    <circle cx="16"  cy="2"  r="2.2" fill="#8a9870" opacity="0.44"/>
    <circle cx="4"   cy="6"  r="2.5" fill="#8a9870" opacity="0.40"/>
    <circle cx="-10" cy="7"  r="2.2" fill="#8a9870" opacity="0.38"/>
    <circle cx="-22" cy="5"  r="2.0" fill="#8a9870" opacity="0.36"/>
    <circle cx="-30" cy="2"  r="1.8" fill="#8a9870" opacity="0.35"/>
    <!-- Caudal peduncle (thick) -->
    <ellipse cx="-33" cy="0" rx="6" ry="16" fill="#202818" opacity="0.82"/>
    <!-- MASSIVE head with large mouth -->
    <ellipse cx="32" cy="0" rx="14" ry="18" fill="#202818"/>
    <!-- Large terminal mouth (gaping slightly) -->
    <path d="M45,-3 Q50,2 45,8" fill="none" stroke="#101410" stroke-width="2.0" stroke-linecap="round"/>
    <!-- Thick lips -->
    <path d="M45,0 Q47,3 45,5" fill="#181c10" opacity="0.60"/>
    <!-- Eye (moderate for large body) -->
    <circle cx="34" cy="-7" r="5.0" fill="#101010"/>
    <circle cx="35" cy="-8" r="1.8" fill="#606850" opacity="0.35"/>
    <!-- Spots on head -->
    <circle cx="28" cy="-12" r="1.8" fill="#8a9870" opacity="0.42"/>
    <circle cx="38" cy="-4"  r="1.6" fill="#8a9870" opacity="0.38"/>
    <!-- Dorsal fin (spiny + soft, long) -->
    <path d="M14,-20 Q7,-30 0,-33 Q-7,-31 -14,-25 Q-20,-19 -24,-14"
          fill="none" stroke="#282e20" stroke-width="1.6"/>
    <path d="M-24,-14 Q-28,-18 -32,-16 Q-34,-13 -34,-8" fill="none" stroke="#282e20" stroke-width="1.4"/>
    <!-- Anal fin -->
    <path d="M-10,20 Q-18,27 -24,25 Q-30,22 -32,17"
          fill="none" stroke="#282e20" stroke-width="1.4"/>
    <!-- Pectoral fin (large) -->
    <path d="M24,10 Q36,20 42,12" fill="none" stroke="#304028" stroke-width="1.5" opacity="0.70"/>
    <!-- ROUNDED caudal fin (not forked — grouper typical!) -->
    <path d="M-38,-18 Q-48,0 -38,18" fill="none" stroke="#282e20" stroke-width="2.8" stroke-linecap="round"/>
    <path d="M-37,-18 L-48,-22" stroke="#282e20" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.70"/>
    <path d="M-37, 18 L-48, 22" stroke="#282e20" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.70"/>
  </g>

  <!-- (No fish 2 — giant grouper is solitary) -->
  <!-- Small juvenile hint near cave -->
  <g transform="translate(148,150) rotate(-3)" opacity="0.55">
    <ellipse cx="0" cy="0" rx="12" ry="7" fill="#303828"/>
    <circle cx="2"  cy="-2" r="1.5" fill="#8a9870" opacity="0.45"/>
    <circle cx="-4" cy="-1" r="1.5" fill="#8a9870" opacity="0.40"/>
    <ellipse cx="10" cy="0" rx="4.5" ry="6" fill="#202818"/>
    <circle cx="11" cy="-2" r="2.0" fill="#101010"/>
    <path d="M-12,0 L-17,-6" stroke="#282e20" stroke-width="2.0" stroke-linecap="round" fill="none"/>
    <path d="M-12,0 L-17, 6" stroke="#282e20" stroke-width="2.0" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Depth ruler (0–200 m) -->
  <line x1="478" y1="8" x2="478" y2="155" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="8"   x2="478" y2="8"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="11"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="53"  x2="478" y2="53"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="56"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">50</text>
  <line x1="474" y1="104" x2="478" y2="104" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="107" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">100</text>
  <line x1="474" y1="155" x2="478" y2="155" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="158" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">200</text>
  <text x="481" y="25" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">岩礁區・珊瑚礁・洞穴岩縫</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">1–200 m；深褐體・散佈淡斑・巨型重體（診斷）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食魚類・甲殼類；鮨科・硬骨魚中最大礁魚</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度－西太平洋（台灣東北部礁區）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
