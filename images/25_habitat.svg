<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea25" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1468a8"/>
      <stop offset="40%" stop-color="#0a4878"/>
      <stop offset="80%" stop-color="#062838"/>
      <stop offset="100%" stop-color="#031420"/>
    </linearGradient>
    <linearGradient id="sand25" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a89870"/>
      <stop offset="100%" stop-color="#706848"/>
    </linearGradient>
  </defs>

  <!-- Coastal sandy-mud sea, 1–40 m -->
  <rect width="500" height="195" fill="url(#sea25)" rx="6"/>

  <!-- Surface shimmer -->
  <path d="M0,8 Q80,5 165,8 Q250,11 335,8 Q415,5 500,8"
        fill="none" stroke="#58c8e8" stroke-width="1.2" opacity="0.50"/>

  <!-- Light shafts -->
  <line x1="160" y1="8" x2="132" y2="155" stroke="#c8eeff" stroke-width="10" opacity="0.05"/>
  <line x1="385" y1="8" x2="360" y2="158" stroke="#c8eeff" stroke-width="7" opacity="0.04"/>

  <!-- Sandy-mud bottom -->
  <path d="M0,160 Q70,154 150,160 Q240,166 320,158 Q410,152 490,158 L500,158 L500,195 L0,195 Z"
        fill="url(#sand25)"/>
  <path d="M20,166 Q70,164 120,166" fill="none" stroke="#806858" stroke-width="0.7" opacity="0.42"/>
  <path d="M170,168 Q220,166 270,168" fill="none" stroke="#806858" stroke-width="0.7" opacity="0.40"/>
  <path d="M310,167 Q360,165 410,167" fill="none" stroke="#806858" stroke-width="0.7" opacity="0.38"/>

  <!-- Fish: 白姑魚 Pennahia argentata (White croaker / Silver croaker) -->
  <!-- Sciaenidae: elongated-oval; TWO dorsal fins (spiny then soft);
       silvery-white body; dark grey-blue back; oblique mouth;
       slightly forked tail; coastal sandy-mud 1–40 m -->

  <!-- Main fish (foreground) -->
  <g transform="translate(240,118) rotate(-6)" opacity="0.93">
    <!-- Body: elongated oval (more elongated than deep) -->
    <ellipse cx="0" cy="0" rx="35" ry="13" fill="#d0d4d8"/>
    <!-- Dark greyish-blue back -->
    <ellipse cx="2" cy="-8" rx="28" ry="6" fill="#3a5068" opacity="0.58"/>
    <!-- Silvery sheen -->
    <ellipse cx="4" cy="2" rx="26" ry="7" fill="#e8ecf0" opacity="0.40"/>
    <!-- Caudal peduncle -->
    <ellipse cx="-30" cy="0" rx="6" ry="10" fill="#b0b4b8" opacity="0.82"/>
    <!-- Head: large -->
    <ellipse cx="30" cy="0" rx="12" ry="13" fill="#b0b4b8"/>
    <!-- Oblique terminal mouth (slanting upward) -->
    <path d="M41,-3 Q45,1 41,6" fill="none" stroke="#607080" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Eye: medium-large -->
    <circle cx="32" cy="-5" r="4.2" fill="#181818"/>
    <circle cx="33" cy="-6" r="1.5" fill="#808898" opacity="0.38"/>
    <!-- FIRST dorsal fin (spiny, taller) -->
    <path d="M18,-13 Q10,-24 3,-26 Q-2,-24 -6,-20 Q-10,-15 -11,-12"
          fill="none" stroke="#505868" stroke-width="1.4"/>
    <!-- SECOND dorsal fin (soft, lower profile) -->
    <path d="M-11,-12 Q-16,-16 -22,-15 Q-26,-12 -28,-9"
          fill="none" stroke="#505868" stroke-width="1.2"/>
    <!-- Anal fin -->
    <path d="M-5,13 Q-13,19 -20,17 Q-25,14 -27,10"
          fill="none" stroke="#787050" stroke-width="1.2"/>
    <!-- Pectoral fin (slight yellowish tinge) -->
    <path d="M22,7 Q32,15 37,8" fill="none" stroke="#806840" stroke-width="1.3" opacity="0.72"/>
    <!-- Slightly forked tail (emarginate) -->
    <path d="M-36,0 L-47,-10" stroke="#505868" stroke-width="3.0" stroke-linecap="round" fill="none"/>
    <path d="M-36,0 L-47, 10" stroke="#505868" stroke-width="3.0" stroke-linecap="round" fill="none"/>
    <path d="M-47,-10 Q-51,0 -47,10" fill="none" stroke="#505868" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Lateral line (arched, prominent) -->
    <path d="M34,-7 Q18,-12 0,-9 Q-14,-7 -28,-4" fill="none" stroke="#9098a0" stroke-width="0.8" opacity="0.35"/>
  </g>

  <!-- Fish 2 (background) -->
  <g transform="translate(128,140) rotate(-4)" opacity="0.76">
    <ellipse cx="0" cy="0" rx="28" ry="10" fill="#d0d4d8"/>
    <ellipse cx="2" cy="-6" rx="22" ry="5" fill="#3a5068" opacity="0.52"/>
    <ellipse cx="24" cy="0" rx="9.5" ry="10" fill="#b0b4b8"/>
    <circle cx="26" cy="-3" r="3.4" fill="#181818"/>
    <!-- Two dorsal fins -->
    <path d="M13,-10 Q7,-19 1,-21 Q-3,-19 -6,-16 Q-9,-12 -10,-10" fill="none" stroke="#505868" stroke-width="1.1"/>
    <path d="M-10,-10 Q-14,-13 -18,-12 Q-21,-10 -22,-8" fill="none" stroke="#505868" stroke-width="1.0"/>
    <path d="M-30,0 L-39,-8" stroke="#505868" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <path d="M-30,0 L-39, 8" stroke="#505868" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <path d="M-39,-8 Q-43,0 -39,8" fill="none" stroke="#505868" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Fish 3 -->
  <g transform="translate(392,132) rotate(-5)" opacity="0.62">
    <ellipse cx="0" cy="0" rx="22" ry="8" fill="#d0d4d8"/>
    <ellipse cx="19" cy="0" rx="7.5" ry="8" fill="#b0b4b8"/>
    <circle cx="20" cy="-3" r="2.8" fill="#181818"/>
    <path d="M-24,0 L-31,-8" stroke="#505868" stroke-width="2.0" stroke-linecap="round" fill="none"/>
    <path d="M-24,0 L-31, 8" stroke="#505868" stroke-width="2.0" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Depth ruler (0–40 m) -->
  <line x1="478" y1="8" x2="478" y2="158" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="8"   x2="478" y2="8"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="11"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="83"  x2="478" y2="83"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="86"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">20</text>
  <line x1="474" y1="158" x2="478" y2="158" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="161" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">40</text>
  <text x="481" y="24" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">沿岸砂泥底・底棲</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">1–40 m；銀白體・雙背鰭・大頭斜口（診斷）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食小魚・甲殼類；產卵洄游</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">西北太平洋（台灣西部・北部・澎湖）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
