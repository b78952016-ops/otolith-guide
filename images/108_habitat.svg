<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="w108" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a86a0"/>
      <stop offset="100%" stop-color="#124054"/>
    </linearGradient>
    <linearGradient id="sand108" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#847252"/>
      <stop offset="100%" stop-color="#4e3e30"/>
    </linearGradient>
    <linearGradient id="man108" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4e6a44"/>
      <stop offset="100%" stop-color="#3a86a0" stop-opacity="0"/>
    </linearGradient>
    <marker id="arr108" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <polygon points="0,0 6,3 0,6" fill="#c9a84c"/>
    </marker>
  </defs>

  <rect width="500" height="195" fill="url(#w108)" rx="6"/>

  <!-- 左側河口紅樹林／潟湖淺灘 -->
  <polygon points="0,0 104,0 104,46 66,96 0,150" fill="url(#man108)" opacity="0.8"/>
  <!-- 紅樹林樹叢 -->
  <ellipse cx="26" cy="30" rx="20" ry="12" fill="#3e5a34" opacity="0.7"/>
  <ellipse cx="58" cy="26" rx="16" ry="10" fill="#46643a" opacity="0.65"/>
  <!-- 支柱根 -->
  <path d="M18,40 L16,60 M26,40 L26,62 M34,40 L36,60" stroke="#3a5030" stroke-width="1.4" opacity="0.6" fill="none"/>
  <path d="M52,38 L50,58 M60,38 L60,60 M68,38 L70,58" stroke="#3a5030" stroke-width="1.4" opacity="0.55" fill="none"/>

  <!-- 水面波紋 -->
  <path d="M0,46 Q28,40 56,46 Q84,52 112,46 Q140,40 168,46 Q196,52 224,46 Q252,40 280,46 Q308,52 336,46 Q364,40 392,46 Q420,52 448,46 Q474,50 500,46"
        fill="none" stroke="#5ab0c8" stroke-width="1.5" opacity="0.8"/>

  <!-- 砂泥底 -->
  <path d="M0,166 Q90,160 180,168 Q270,175 360,172 Q430,170 500,169 L500,195 L0,195 Z" fill="url(#sand108)"/>
  <!-- 底藻（雜食攝食底藻） -->
  <ellipse cx="150" cy="164" rx="14" ry="4" fill="#3a6828" opacity="0.5"/>
  <ellipse cx="300" cy="169" rx="16" ry="4" fill="#40702a" opacity="0.48"/>
  <ellipse cx="420" cy="169" rx="12" ry="3.5" fill="#3a6828" opacity="0.5"/>
  <!-- 沙紋 -->
  <path d="M210,170 Q230,167 250,170" fill="none" stroke="#a89878" stroke-width="0.8" opacity="0.5"/>
  <path d="M350,171 Q370,168 390,171" fill="none" stroke="#a89878" stroke-width="0.8" opacity="0.5"/>

  <!-- 虱目魚群（流線型、深叉尾） -->
  <g transform="translate(210,100) rotate(-4)" opacity="0.9">
    <ellipse cx="0" cy="0" rx="32" ry="8" fill="#93aab0"/>
    <path d="M-30,2.5 Q0,7.5 30,2 Q6,4.5 -30,2.5Z" fill="#e8f0f2" opacity="0.42"/>
    <!-- 背部青綠 -->
    <path d="M-24,-4 Q0,-9 26,-4 Q2,-6 -24,-4Z" fill="#5e8286" opacity="0.5"/>
    <!-- 背鰭 -->
    <path d="M-4,-8 Q3,-14 11,-8" fill="none" stroke="#4e7276" stroke-width="1.4"/>
    <!-- 深叉大尾 -->
    <path d="M-32,0 L-47,-13" stroke="#4e7276" stroke-width="3.4" stroke-linecap="round" fill="none"/>
    <path d="M-32,0 L-47,13"  stroke="#4e7276" stroke-width="3.4" stroke-linecap="round" fill="none"/>
    <path d="M-47,-13 L-44,0 L-47,13" fill="none" stroke="#4e7276" stroke-width="1"/>
    <!-- 胸鰭 -->
    <path d="M11,4 Q18,11 24,6" fill="none" stroke="#4e7276" stroke-width="1.2" opacity="0.8"/>
    <circle cx="27" cy="-1.5" r="3.2" fill="#12202c"/>
    <circle cx="28" cy="-2" r="1" fill="#7aa0a8" opacity="0.5"/>
  </g>
  <g transform="translate(320,128) rotate(-3)" opacity="0.8">
    <ellipse cx="0" cy="0" rx="25" ry="6.2" fill="#88a1a8"/>
    <path d="M-19,-3.2 Q0,-6.5 20,-3.2 Q2,-4.5 -19,-3.2Z" fill="#5a7e82" opacity="0.5"/>
    <path d="M-3,-6.2 Q3,-11 10,-6.2" fill="none" stroke="#4a6e72" stroke-width="1.2"/>
    <path d="M-25,0 L-38,-10" stroke="#4a6e72" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-25,0 L-38,10"  stroke="#4a6e72" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <circle cx="21" cy="-1" r="2.6" fill="#12202c"/>
  </g>
  <g transform="translate(160,142) rotate(-2)" opacity="0.72">
    <ellipse cx="0" cy="0" rx="20" ry="5" fill="#7e989e"/>
    <path d="M-20,0 L-30,-8" stroke="#486a6e" stroke-width="2.3" stroke-linecap="round" fill="none"/>
    <path d="M-20,0 L-30,8"  stroke="#486a6e" stroke-width="2.3" stroke-linecap="round" fill="none"/>
    <circle cx="17" cy="-0.5" r="2.1" fill="#12202c"/>
  </g>

  <!-- 仔稚魚入河口箭頭 -->
  <line x1="158" y1="80" x2="92" y2="64" stroke="#c9a84c" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arr108)"/>
  <text x="74" y="58" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">仔稚魚</text>
  <text x="74" y="69" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">入河口</text>

  <!-- 深度尺 0–80m -->
  <line x1="478" y1="46" x2="478" y2="170" stroke="#8a9bb0" stroke-width="1" opacity="0.6"/>
  <line x1="474" y1="46"  x2="478" y2="46"  stroke="#8a9bb0" stroke-width="1"/>
  <line x1="474" y1="87"  x2="478" y2="87"  stroke="#8a9bb0" stroke-width="1"/>
  <line x1="474" y1="129" x2="478" y2="129" stroke="#8a9bb0" stroke-width="1"/>
  <line x1="474" y1="170" x2="478" y2="170" stroke="#8a9bb0" stroke-width="1"/>
  <text x="480" y="50"  fill="#8a9bb0" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">  0 m</text>
  <text x="480" y="91"  fill="#8a9bb0" font-size="8.5" font-family="Microsoft JhengHei,sans-serif"> 27 m</text>
  <text x="480" y="133" fill="#8a9bb0" font-size="8.5" font-family="Microsoft JhengHei,sans-serif"> 53 m</text>
  <text x="480" y="174" fill="#8a9bb0" font-size="8.5" font-family="Microsoft JhengHei,sans-serif"> 80 m</text>

  <!-- 標籤 -->
  <text x="112" y="26" fill="#8a9bb0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">河口紅樹林 ／ 潟湖砂泥底</text>
  <text x="14"  y="86" fill="#7ab890" font-size="9" font-family="Microsoft JhengHei,sans-serif">紅樹林潟湖</text>
  <text x="250" y="188" fill="#b09868" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">廣鹽性 ・ 印度-太平洋（台灣南部為多）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
