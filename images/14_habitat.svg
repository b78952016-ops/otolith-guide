<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea14" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a8aaa"/>
      <stop offset="55%" stop-color="#0e5878"/>
      <stop offset="100%" stop-color="#0a3050"/>
    </linearGradient>
    <linearGradient id="reef14" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#504030"/>
      <stop offset="100%" stop-color="#302018"/>
    </linearGradient>
    <linearGradient id="sand14" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8b070"/>
      <stop offset="100%" stop-color="#906840"/>
    </linearGradient>
  </defs>

  <!-- Shallow tropical water — turquoise/teal -->
  <rect width="500" height="195" fill="url(#sea14)" rx="6"/>

  <!-- Surface shimmer -->
  <path d="M0,7 Q80,4 165,7 Q250,10 335,7 Q415,4 500,7"
        fill="none" stroke="#60e0f8" stroke-width="1.5" opacity="0.65"/>
  <path d="M0,17 Q90,13 185,17 Q280,21 370,17 Q440,13 500,17"
        fill="none" stroke="#48c8e8" stroke-width="1.0" opacity="0.48"/>

  <!-- Bright sunlight shafts (shallow, clear water) -->
  <line x1="100" y1="0" x2="60"  y2="130" stroke="#d8f8ff" stroke-width="12" opacity="0.06"/>
  <line x1="210" y1="0" x2="170" y2="140" stroke="#d8f8ff" stroke-width="9"  opacity="0.05"/>
  <line x1="320" y1="0" x2="285" y2="135" stroke="#d8f8ff" stroke-width="8"  opacity="0.04"/>

  <!-- Reef rock on left -->
  <path d="M0,100 Q25,80 55,85 Q80,90 100,80 Q125,70 148,82 L148,195 L0,195 Z"
        fill="url(#reef14)"/>
  <path d="M20,88 Q55,78 88,82 Q115,85 140,78"
        fill="none" stroke="#706050" stroke-width="1.5" opacity="0.45"/>

  <!-- Sandy lagoon bottom (right) -->
  <path d="M148,175 Q250,168 360,174 Q420,178 500,172 L500,195 L148,195 Z"
        fill="url(#sand14)"/>
  <!-- Sand ripples -->
  <path d="M170,182 Q230,180 290,182" fill="none" stroke="#d8c090" stroke-width="0.8" opacity="0.55"/>
  <path d="M320,183 Q380,181 440,183" fill="none" stroke="#d8c090" stroke-width="0.8" opacity="0.55"/>

  <!-- Small coral on reef -->
  <g stroke="#c06020" fill="none" stroke-width="1.0" opacity="0.75">
    <line x1="60" y1="84" x2="60" y2="65"/>
    <line x1="60" y1="74" x2="51" y2="63"/>
    <line x1="60" y1="70" x2="69" y2="60"/>
    <circle cx="51" cy="63" r="1.4" fill="#e08040"/>
    <circle cx="69" cy="60" r="1.4" fill="#e08040"/>
    <circle cx="60" cy="65" r="1.2" fill="#e08040"/>
  </g>
  <ellipse cx="110" cy="82" rx="12" ry="5" fill="#6a4820" opacity="0.70"/>

  <!-- School of 丁香魚 (Japanese silver sprat) — small, silvery, schooling mid-water -->
  <!-- Main school, upper level -->
  <g opacity="0.90">
    <g transform="translate(210,65) rotate(-4)">
      <ellipse cx="0" cy="0" rx="13" ry="3" fill="#d0e0f0"/>
      <ellipse cx="0" cy="0" rx="13" ry="1.5" fill="#e8f8ff" opacity="0.60"/>
      <path d="M-13,0 L-18,-4" stroke="#9ab0c8" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      <path d="M-13,0 L-18, 4" stroke="#9ab0c8" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      <circle cx="11" cy="0" r="1.5" fill="#181818"/>
    </g>
    <g transform="translate(248,74) rotate(-3)">
      <ellipse cx="0" cy="0" rx="13" ry="3" fill="#d0e0f0"/>
      <ellipse cx="0" cy="0" rx="13" ry="1.5" fill="#e8f8ff" opacity="0.60"/>
      <path d="M-13,0 L-18,-4" stroke="#9ab0c8" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      <path d="M-13,0 L-18, 4" stroke="#9ab0c8" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      <circle cx="11" cy="0" r="1.5" fill="#181818"/>
    </g>
    <g transform="translate(230,84) rotate(-5)">
      <ellipse cx="0" cy="0" rx="12" ry="2.8" fill="#d0e0f0"/>
      <ellipse cx="0" cy="0" rx="12" ry="1.4" fill="#e8f8ff" opacity="0.55"/>
      <path d="M-12,0 L-17,-3.5" stroke="#9ab0c8" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <path d="M-12,0 L-17, 3.5" stroke="#9ab0c8" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <circle cx="10" cy="0" r="1.4" fill="#181818"/>
    </g>
    <g transform="translate(193,76) rotate(-2)">
      <ellipse cx="0" cy="0" rx="12" ry="2.8" fill="#d0e0f0"/>
      <ellipse cx="0" cy="0" rx="12" ry="1.4" fill="#e8f8ff" opacity="0.55"/>
      <path d="M-12,0 L-17,-3.5" stroke="#9ab0c8" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <path d="M-12,0 L-17, 3.5" stroke="#9ab0c8" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <circle cx="10" cy="0" r="1.4" fill="#181818"/>
    </g>
    <g transform="translate(270,62) rotate(-6)">
      <ellipse cx="0" cy="0" rx="11" ry="2.6" fill="#d0e0f0"/>
      <path d="M-11,0 L-16,-3.3" stroke="#9ab0c8" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <path d="M-11,0 L-16, 3.3" stroke="#9ab0c8" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <circle cx="9" cy="0" r="1.3" fill="#181818"/>
    </g>
  </g>
  <!-- Second school, lower level, right side -->
  <g opacity="0.72">
    <g transform="translate(370,105) rotate(-3)">
      <ellipse cx="0" cy="0" rx="11" ry="2.6" fill="#b8c8d8"/>
      <path d="M-11,0 L-16,-3.5" stroke="#8898a8" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <path d="M-11,0 L-16, 3.5" stroke="#8898a8" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <circle cx="9" cy="0" r="1.2" fill="#181818"/>
    </g>
    <g transform="translate(405,115) rotate(-2)">
      <ellipse cx="0" cy="0" rx="11" ry="2.6" fill="#b8c8d8"/>
      <path d="M-11,0 L-16,-3.5" stroke="#8898a8" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <path d="M-11,0 L-16, 3.5" stroke="#8898a8" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <circle cx="9" cy="0" r="1.2" fill="#181818"/>
    </g>
    <g transform="translate(388,126) rotate(-5)">
      <ellipse cx="0" cy="0" rx="10" ry="2.4" fill="#b8c8d8"/>
      <path d="M-10,0 L-14,-3" stroke="#8898a8" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      <path d="M-10,0 L-14, 3" stroke="#8898a8" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      <circle cx="8" cy="0" r="1.1" fill="#181818"/>
    </g>
  </g>

  <!-- Depth ruler (right side) — 0-40m -->
  <line x1="478" y1="7" x2="478" y2="172" stroke="#3a5070" stroke-width="1"/>
  <!-- 0 m -->
  <line x1="474" y1="7" x2="478" y2="7" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="10" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <!-- 10 m -->
  <line x1="474" y1="48" x2="478" y2="48" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="51" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">10</text>
  <!-- 20 m -->
  <line x1="474" y1="90" x2="478" y2="90" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="93" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">20</text>
  <!-- 30 m -->
  <line x1="474" y1="131" x2="478" y2="131" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="134" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">30</text>
  <!-- 40 m -->
  <line x1="474" y1="172" x2="478" y2="172" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="175" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">40</text>
  <text x="481" y="24" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">沿近海中上層 ／ 清澈水域・潟湖</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">≤40 m</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">強烈群游，以浮游生物・矽藻為食</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度太平洋（紅海至薩摩亞）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
