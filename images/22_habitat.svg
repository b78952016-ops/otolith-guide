<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sky22" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3050"/>
      <stop offset="100%" stop-color="#2a5878"/>
    </linearGradient>
    <linearGradient id="water22" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#206890"/>
      <stop offset="50%" stop-color="#124870"/>
      <stop offset="100%" stop-color="#0a2848"/>
    </linearGradient>
    <linearGradient id="rock22" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#585040"/>
      <stop offset="100%" stop-color="#382818"/>
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="500" height="195" fill="url(#sky22)" rx="6"/>

  <!-- Coastal land on both sides -->
  <polygon points="0,68 40,20 90,68" fill="#2a3040" opacity="0.90"/>
  <polygon points="80,68 140,12 200,68" fill="#222830" opacity="0.85"/>
  <polygon points="400,68 440,25 500,68" fill="#2a3040" opacity="0.90"/>
  <!-- Vegetation/treeline -->
  <ellipse cx="40"  cy="20" rx="18" ry="6" fill="#224020" opacity="0.55"/>
  <ellipse cx="140" cy="12" rx="24" ry="8" fill="#204020" opacity="0.55"/>
  <ellipse cx="440" cy="25" rx="20" ry="7" fill="#224020" opacity="0.50"/>

  <!-- Estuary / tidal water -->
  <rect x="0" y="68" width="500" height="127" fill="url(#water22)"/>

  <!-- Tidal current ripples (mixing fresh/salt) -->
  <path d="M0,76 Q80,72 160,76 Q240,80 320,76 Q400,72 500,76"
        fill="none" stroke="#50c8e8" stroke-width="1.3" opacity="0.52"/>
  <path d="M0,87 Q90,82 185,87 Q280,92 375,87 Q440,82 500,87"
        fill="none" stroke="#40b0d0" stroke-width="1.0" opacity="0.40"/>
  <path d="M0,102 Q100,97 200,102 Q300,107 400,102 Q450,99 500,102"
        fill="none" stroke="#30a0c0" stroke-width="0.8" opacity="0.30"/>

  <!-- Rocky estuary bottom -->
  <path d="M0,165 Q55,158 110,165 Q165,172 220,163 Q280,154 340,163 Q400,172 460,163 Q480,160 500,165 L500,195 L0,195 Z"
        fill="url(#rock22)"/>
  <!-- Rocks and boulders at bottom -->
  <ellipse cx="50"  cy="170" rx="18" ry="8" fill="#484038" opacity="0.85"/>
  <ellipse cx="110" cy="174" rx="12" ry="6" fill="#504840" opacity="0.80"/>
  <ellipse cx="175" cy="169" rx="20" ry="9" fill="#444038" opacity="0.85"/>
  <ellipse cx="235" cy="173" rx="14" ry="7" fill="#484840" opacity="0.80"/>
  <ellipse cx="290" cy="168" rx="18" ry="8" fill="#444038" opacity="0.85"/>
  <ellipse cx="355" cy="172" rx="15" ry="7" fill="#484038" opacity="0.80"/>
  <ellipse cx="415" cy="168" rx="17" ry="8" fill="#444038" opacity="0.85"/>
  <ellipse cx="468" cy="172" rx="12" ry="6" fill="#484840" opacity="0.80"/>

  <!-- Seaweed/algae on rocks -->
  <g fill="none" stroke="#3a7040" stroke-width="1.2" opacity="0.60">
    <path d="M50,162 Q52,152 55,162"/>
    <path d="M57,162 Q60,150 63,162"/>
    <path d="M175,160 Q178,150 181,160"/>
    <path d="M183,160 Q186,148 189,160"/>
    <path d="M290,160 Q293,150 296,160"/>
    <path d="M415,160 Q418,152 421,160"/>
  </g>

  <!-- Fish 1: 七星鱸 (Lateolabrax japonicus, Japanese sea bass) — slender, silvery, black spots -->
  <g transform="translate(270,110) rotate(-4)" opacity="0.91">
    <!-- Body: streamlined, somewhat elongated -->
    <ellipse cx="0" cy="0" rx="32" ry="9" fill="#9ab0c0"/>
    <!-- Silver belly -->
    <ellipse cx="3" cy="3.5" rx="25" ry="4.5" fill="#e0eef8" opacity="0.50"/>
    <!-- Darker back -->
    <ellipse cx="0" cy="-5.5" rx="27" ry="3.5" fill="#6888a0" opacity="0.60"/>
    <!-- Black spots along lateral line (七星 pattern) -->
    <circle cx="-18" cy="0" r="2.2" fill="#181820" opacity="0.75"/>
    <circle cx="-8"  cy="-1" r="2.2" fill="#181820" opacity="0.75"/>
    <circle cx="3"   cy="0.5" r="2.2" fill="#181820" opacity="0.75"/>
    <circle cx="14"  cy="0" r="2.0" fill="#181820" opacity="0.70"/>
    <circle cx="22"  cy="-0.5" r="1.8" fill="#181820" opacity="0.65"/>
    <!-- First dorsal fin (spiny) -->
    <path d="M-10,-9 L-7,-18 L-2,-21 L4,-20 L8,-18 L12,-9"
          fill="none" stroke="#607888" stroke-width="1.4"/>
    <!-- Second dorsal fin (soft) -->
    <path d="M12,-9 Q18,-14 24,-9" fill="none" stroke="#607888" stroke-width="1.3"/>
    <!-- Tail fin (forked) -->
    <path d="M-32,0 L-44,-13" stroke="#607888" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-32,0 L-44, 13" stroke="#607888" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Pectoral fin -->
    <path d="M14,6 Q22,13 28,8" fill="none" stroke="#607888" stroke-width="1.3" opacity="0.8"/>
    <!-- Anal fin -->
    <path d="M-10,9 Q-2,15 8,9" fill="none" stroke="#607888" stroke-width="1.2"/>
    <!-- Eye -->
    <circle cx="28" cy="-1" r="3.5" fill="#181818"/>
    <circle cx="29" cy="-2" r="1.1" fill="#9aacbc" opacity="0.5"/>
  </g>

  <!-- Fish 2: smaller, near rocks -->
  <g transform="translate(130,132) rotate(-3)" opacity="0.80">
    <ellipse cx="0" cy="0" rx="24" ry="7" fill="#9ab0c0"/>
    <ellipse cx="2" cy="2.5" rx="19" ry="3.5" fill="#e0eef8" opacity="0.45"/>
    <circle cx="-12" cy="0" r="1.8" fill="#181820" opacity="0.70"/>
    <circle cx="-3"  cy="-0.5" r="1.8" fill="#181820" opacity="0.70"/>
    <circle cx="7"   cy="0" r="1.6" fill="#181820" opacity="0.65"/>
    <circle cx="16"  cy="-0.5" r="1.5" fill="#181820" opacity="0.60"/>
    <path d="M-7,-7 L-4,-14 L1,-16 L5,-14 L8,-7" fill="none" stroke="#607888" stroke-width="1.2"/>
    <path d="M-24,0 L-34,-10" stroke="#607888" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M-24,0 L-34, 10" stroke="#607888" stroke-width="3" stroke-linecap="round" fill="none"/>
    <circle cx="20" cy="-0.5" r="2.8" fill="#181818"/>
  </g>

  <!-- Depth ruler (right side) — 0-30m -->
  <line x1="478" y1="68" x2="478" y2="172" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="68"  x2="478" y2="68"  stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="71"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="103" x2="478" y2="103" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="106" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">10</text>
  <line x1="474" y1="137" x2="478" y2="137" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="140" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">20</text>
  <line x1="474" y1="172" x2="478" y2="172" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="175" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">30</text>
  <text x="481" y="84" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">淡海水交會 ／ 礁區・河口</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">5–30 m；春夏溯淡水域</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">以魚蝦為食；重要垂釣魚種</text>
  <text x="250" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">台灣西部・北部沿岸</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
