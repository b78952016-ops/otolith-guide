<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea55" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1870b0"/>
      <stop offset="40%" stop-color="#0e5888"/>
      <stop offset="80%" stop-color="#062838"/>
      <stop offset="100%" stop-color="#031420"/>
    </linearGradient>
  </defs>

  <!-- Rocky/algal-bed coastal shallow water -->
  <rect width="500" height="195" fill="url(#sea55)" rx="6"/>

  <!-- Surface shimmer -->
  <path d="M0,8 Q80,5 165,8 Q250,11 335,8 Q415,5 500,8"
        fill="none" stroke="#58c8e8" stroke-width="1.3" opacity="0.50"/>

  <!-- Light shafts (clear shallow water) -->
  <line x1="145" y1="8" x2="116" y2="155" stroke="#c8eeff" stroke-width="13" opacity="0.065"/>
  <line x1="350" y1="8" x2="326" y2="155" stroke="#c8eeff" stroke-width="9"  opacity="0.048"/>

  <!-- Rocky bottom base -->
  <path d="M0,152 Q50,138 110,148 Q170,158 230,138 Q290,118 360,138 Q420,158 470,140 Q490,130 500,128 L500,195 L0,195 Z"
        fill="#404848"/>
  <!-- ALGAL BEDS — extensive green algae mats (dominant!) -->
  <ellipse cx="55"  cy="148" rx="34" ry="8"  fill="#2a6028" opacity="0.72"/>
  <ellipse cx="160" cy="142" rx="30" ry="7"  fill="#2a6830" opacity="0.68"/>
  <ellipse cx="278" cy="130" rx="34" ry="8"  fill="#2a6028" opacity="0.65"/>
  <ellipse cx="390" cy="132" rx="30" ry="7"  fill="#2a6830" opacity="0.62"/>
  <ellipse cx="478" cy="135" rx="22" ry="6"  fill="#2a6028" opacity="0.58"/>
  <!-- Algae filaments / seaweed wisps -->
  <path d="M30,148 Q26,140 30,132 Q34,124 30,118" fill="none" stroke="#3a8038" stroke-width="1.5" opacity="0.55"/>
  <path d="M55,144 Q52,136 56,128" fill="none" stroke="#3a8038" stroke-width="1.4" opacity="0.52"/>
  <path d="M180,140 Q177,132 181,124" fill="none" stroke="#408038" stroke-width="1.4" opacity="0.50"/>
  <path d="M290,128 Q287,120 291,112" fill="none" stroke="#3a8038" stroke-width="1.4" opacity="0.50"/>
  <path d="M410,132 Q407,124 411,116" fill="none" stroke="#408038" stroke-width="1.3" opacity="0.48"/>
  <!-- Some scattered rocks (smaller than algae areas) -->
  <ellipse cx="120" cy="154" rx="18" ry="7"  fill="#383e40" opacity="0.72"/>
  <ellipse cx="330" cy="142" rx="16" ry="6"  fill="#383e40" opacity="0.68"/>
  <ellipse cx="450" cy="146" rx="14" ry="5.5" fill="#383e40" opacity="0.65"/>
  <!-- Sandy patch between algae (goatfish probes here) -->
  <ellipse cx="240" cy="148" rx="20" ry="5" fill="#786858" opacity="0.50"/>
  <ellipse cx="360" cy="152" rx="16" ry="4" fill="#786858" opacity="0.45"/>

  <!-- Fish: 短鬚海緋鯉 Parupeneus ciliatus (White-lined goatfish / Doublebar goatfish) -->
  <!-- Mullidae: elongated oval; ORANGE-RED body; TWO LONG BARBELS under chin (diagnostic!);
       two separate dorsal fins; forked tail;
       probes sandy/algal areas with barbels; 2–40 m -->

  <!-- Main fish (foreground, nosing into algae/sand) -->
  <g transform="translate(238,122) rotate(5)" opacity="0.93">
    <!-- Body: elongated oval, orange-red -->
    <ellipse cx="0" cy="0" rx="32" ry="12" fill="#c06030"/>
    <!-- Darker reddish back -->
    <ellipse cx="2" cy="-7" rx="26" ry="5.5" fill="#882018" opacity="0.55"/>
    <!-- Pale whitish belly -->
    <ellipse cx="2" cy="6" rx="24" ry="4" fill="#f0c090" opacity="0.40"/>
    <!-- Caudal peduncle -->
    <ellipse cx="-27" cy="0" rx="6" ry="9" fill="#a05028" opacity="0.82"/>
    <!-- Head -->
    <ellipse cx="28" cy="0" rx="10" ry="11" fill="#a05028"/>
    <!-- Snout (slightly downward-pointing for bottom feeding) -->
    <path d="M37,2 Q40,5 37,8" fill="none" stroke="#782818" stroke-width="1.3" stroke-linecap="round"/>
    <!-- TWO LONG BARBELS hanging under chin (diagnostic!) -->
    <path d="M36,8 L38,18" stroke="#c87040" stroke-width="1.6" stroke-linecap="round" fill="none"/>
    <path d="M33,9 L34,19" stroke="#c87040" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <!-- Eye: medium -->
    <circle cx="29" cy="-4" r="3.8" fill="#181818"/>
    <circle cx="30" cy="-5" r="1.3" fill="#c08060" opacity="0.40"/>
    <!-- FIRST dorsal fin (spiny) -->
    <path d="M16,-12 Q8,-22 1,-24 Q-4,-22 -8,-17 Q-11,-12 -11,-10"
          fill="none" stroke="#882018" stroke-width="1.4"/>
    <!-- SECOND dorsal fin (soft, separated gap) -->
    <path d="M-14,-10 Q-19,-14 -24,-12 Q-26,-9 -27,-7"
          fill="none" stroke="#882018" stroke-width="1.2"/>
    <!-- Anal fin -->
    <path d="M-7,12 Q-13,17 -19,15 Q-23,12 -24,9"
          fill="none" stroke="#882018" stroke-width="1.2"/>
    <!-- Pectoral fin -->
    <path d="M20,7 Q29,14 32,7" fill="none" stroke="#a04028" stroke-width="1.3" opacity="0.70"/>
    <!-- Forked caudal fin -->
    <path d="M-33,0 L-44,-11" stroke="#882018" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-33,0 L-44, 11" stroke="#882018" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-44,-11 Q-48,0 -44,11" fill="none" stroke="#882018" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Fish 2 (probing sandy patch) -->
  <g transform="translate(355,138) rotate(15)" opacity="0.80">
    <ellipse cx="0" cy="0" rx="25" ry="9.5" fill="#c06030"/>
    <ellipse cx="2" cy="-5.5" rx="20" ry="4.5" fill="#882018" opacity="0.52"/>
    <ellipse cx="-21" cy="0" rx="5" ry="7" fill="#a05028" opacity="0.80"/>
    <ellipse cx="21" cy="0" rx="8" ry="9" fill="#a05028"/>
    <!-- Barbels pointing down -->
    <path d="M29,6 L30,14" stroke="#c87040" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <path d="M27,7 L27,15" stroke="#c87040" stroke-width="1.2" stroke-linecap="round" fill="none"/>
    <circle cx="22" cy="-3" r="3.0" fill="#181818"/>
    <path d="M13,-9 Q6,-17 0,-18 Q-4,-17 -7,-13" fill="none" stroke="#882018" stroke-width="1.2"/>
    <path d="M-9,-8 Q-13,-11 -17,-10 Q-19,-8 -20,-6" fill="none" stroke="#882018" stroke-width="1.1"/>
    <path d="M-27,0 L-35,-9" stroke="#882018" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <path d="M-27,0 L-35, 9" stroke="#882018" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <path d="M-35,-9 Q-38,0 -35,9" fill="none" stroke="#882018" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Depth ruler (0–40 m) -->
  <line x1="478" y1="8" x2="478" y2="152" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="8"   x2="478" y2="8"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="11"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="80"  x2="478" y2="80"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="83"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">20</text>
  <line x1="474" y1="152" x2="478" y2="152" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="155" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">40</text>
  <text x="481" y="24" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">沙底・海藻床・內灣礁區</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">2–40 m；橙紅體・頤下雙鬚（診斷）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">夜間以鬚探沙；食甲殼類・軟體動物</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度－太平洋（台灣各礁區沿岸）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
