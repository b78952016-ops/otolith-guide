<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea20" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a68a8"/>
      <stop offset="40%" stop-color="#0e4878"/>
      <stop offset="100%" stop-color="#0a2848"/>
    </linearGradient>
    <linearGradient id="sand20" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a8858"/>
      <stop offset="100%" stop-color="#685840"/>
    </linearGradient>
  </defs>

  <!-- Near-surface tropical ocean -->
  <rect width="500" height="195" fill="url(#sea20)" rx="6"/>

  <!-- Active surface waves (tuna habitat) -->
  <path d="M0,7 Q80,4 165,7 Q250,10 335,7 Q415,4 500,7"
        fill="none" stroke="#60e0f8" stroke-width="1.6" opacity="0.65"/>
  <path d="M0,18 Q90,13 185,18 Q280,23 370,18 Q440,13 500,18"
        fill="none" stroke="#48c8e8" stroke-width="1.2" opacity="0.50"/>
  <path d="M0,30 Q100,25 200,30 Q300,35 400,30 Q450,27 500,30"
        fill="none" stroke="#38b0d8" stroke-width="0.9" opacity="0.36"/>

  <!-- Light shafts (clear tropical water) -->
  <line x1="120" y1="0" x2="80"  y2="140" stroke="#c0e8ff" stroke-width="12" opacity="0.05"/>
  <line x1="250" y1="0" x2="215" y2="145" stroke="#c0e8ff" stroke-width="9"  opacity="0.04"/>
  <line x1="380" y1="0" x2="348" y2="142" stroke="#c0e8ff" stroke-width="8"  opacity="0.04"/>

  <!-- Sandy bottom (1-50m) -->
  <path d="M0,172 Q80,167 160,172 Q240,177 320,170 Q400,163 480,170 Q490,171 500,171 L500,195 L0,195 Z"
        fill="url(#sand20)"/>
  <!-- Sand ripples -->
  <path d="M20,179 Q80,177 140,179" fill="none" stroke="#b8a070" stroke-width="0.7" opacity="0.50"/>
  <path d="M180,182 Q240,180 300,182" fill="none" stroke="#b8a070" stroke-width="0.7" opacity="0.50"/>
  <path d="M340,179 Q400,177 460,179" fill="none" stroke="#b8a070" stroke-width="0.7" opacity="0.50"/>

  <!-- Fish 1: 巴鰹 (Euthynnus affinis, Kawakawa) — streamlined small tuna, dark back with diagonal lines -->
  <g transform="translate(195,90) rotate(-6)" opacity="0.91">
    <!-- Body: torpedo-shaped tuna -->
    <ellipse cx="0" cy="0" rx="38" ry="10" fill="#2848a0"/>
    <!-- Back: very dark blue-black -->
    <ellipse cx="0" cy="-6" rx="34" ry="4.5" fill="#18283a" opacity="0.80"/>
    <!-- Silver belly -->
    <ellipse cx="4" cy="5" rx="28" ry="4" fill="#e0e8f8" opacity="0.50"/>
    <!-- Characteristic worm-like markings on back (Euthynnus diagnosis) -->
    <path d="M-15,-10 Q-10,-6 -5,-10" fill="none" stroke="#102030" stroke-width="1.5" opacity="0.70"/>
    <path d="M-5,-10 Q0,-6 5,-10" fill="none" stroke="#102030" stroke-width="1.5" opacity="0.70"/>
    <path d="M5,-10 Q10,-7 16,-10" fill="none" stroke="#102030" stroke-width="1.5" opacity="0.70"/>
    <path d="M-20,-9 Q-16,-6 -12,-9" fill="none" stroke="#102030" stroke-width="1.4" opacity="0.65"/>
    <!-- First dorsal fin (long, pointed) -->
    <path d="M-10,-10 Q-4,-20 10,-10" fill="none" stroke="#1a2840" stroke-width="1.5"/>
    <!-- Second dorsal (small, triangular) -->
    <path d="M10,-10 Q18,-14 24,-10" fill="none" stroke="#1a2840" stroke-width="1.3"/>
    <!-- Dorsal finlets -->
    <path d="M24,0 L28,-6 M28,0 L32,-5 M32,0 L35,-4" stroke="#1a2840" stroke-width="0.9" fill="none"/>
    <!-- Crescent-shaped tail (strongly forked) -->
    <path d="M-38,0 L-54,-20" stroke="#1a2840" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-38,0 L-54, 20" stroke="#1a2840" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Anal fin finlets -->
    <path d="M24,0 L28, 5 M28,0 L32, 4" stroke="#1a2840" stroke-width="0.9" fill="none"/>
    <!-- Pectoral fin (large, falcate) -->
    <path d="M18,6 Q26,16 32,10" fill="none" stroke="#1a2840" stroke-width="1.4" opacity="0.8"/>
    <!-- Eye -->
    <circle cx="34" cy="-1" r="3" fill="#181818"/>
    <circle cx="35" cy="-1.8" r="1.0" fill="#8898b0" opacity="0.5"/>
  </g>

  <!-- Fish 2+3: schooling, slightly higher in water -->
  <g transform="translate(310,65) rotate(-4)" opacity="0.80">
    <ellipse cx="0" cy="0" rx="29" ry="7.5" fill="#2848a0"/>
    <ellipse cx="0" cy="-4.5" rx="26" ry="3" fill="#18283a" opacity="0.80"/>
    <path d="M-8,-7.5 Q-2,-14 8,-7.5" fill="none" stroke="#1a2840" stroke-width="1.3"/>
    <path d="M-29,0 L-41,-15" stroke="#1a2840" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-29,0 L-41, 15" stroke="#1a2840" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <circle cx="25" cy="-0.5" r="2.4" fill="#181818"/>
  </g>
  <g transform="translate(380,78) rotate(-5)" opacity="0.72">
    <ellipse cx="0" cy="0" rx="24" ry="6.5" fill="#2848a0"/>
    <ellipse cx="0" cy="-4" rx="21" ry="2.8" fill="#18283a" opacity="0.75"/>
    <path d="M-24,0 L-34,-12" stroke="#1a2840" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <path d="M-24,0 L-34, 12" stroke="#1a2840" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <circle cx="20" cy="-0.5" r="2" fill="#181818"/>
  </g>

  <!-- Depth ruler (right side) — 0-50m -->
  <line x1="478" y1="7" x2="478" y2="172" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="7"   x2="478" y2="7"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="10"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="40"  x2="478" y2="40"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="43"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">10</text>
  <line x1="474" y1="73"  x2="478" y2="73"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="76"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">20</text>
  <line x1="474" y1="106" x2="478" y2="106" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="109" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">30</text>
  <line x1="474" y1="172" x2="478" y2="172" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="175" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">50</text>
  <text x="481" y="24" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">近海大洋性上層 ／ 沿岸周邊</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">1–50 m</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">大群洄游，機會主義掠食者；幼魚進內灣</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度西太平洋（台灣東部・花蓮）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
