<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sky93" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58b0e0"/>
      <stop offset="100%" stop-color="#3898c8"/>
    </linearGradient>
    <linearGradient id="water93" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a9868"/>
      <stop offset="55%" stop-color="#2a6848"/>
      <stop offset="100%" stop-color="#1a3828"/>
    </linearGradient>
    <linearGradient id="mud93" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#706050"/>
      <stop offset="100%" stop-color="#403820"/>
    </linearGradient>
  </defs>

  <!-- Sky — flat lowland agricultural landscape -->
  <rect width="500" height="195" fill="url(#sky93)" rx="6"/>

  <!-- Low embankments -->
  <rect x="0" y="45" width="80" height="12" fill="#608040" opacity="0.80"/>
  <rect x="420" y="45" width="80" height="12" fill="#608040" opacity="0.80"/>
  <!-- Cattails (left) -->
  <line x1="20" y1="57" x2="20" y2="32" stroke="#405028" stroke-width="2.5" opacity="0.85"/>
  <ellipse cx="20" cy="28" rx="3" ry="7" fill="#602818" opacity="0.80"/>
  <line x1="35" y1="57" x2="35" y2="28" stroke="#405028" stroke-width="2.5" opacity="0.80"/>
  <ellipse cx="35" cy="24" rx="3" ry="8" fill="#602818" opacity="0.78"/>
  <line x1="50" y1="57" x2="50" y2="35" stroke="#405028" stroke-width="2.5" opacity="0.75"/>
  <ellipse cx="50" cy="31" rx="2.5" ry="6" fill="#602818" opacity="0.75"/>
  <!-- Cattails (right) -->
  <line x1="480" y1="57" x2="480" y2="30" stroke="#405028" stroke-width="2.5" opacity="0.85"/>
  <ellipse cx="480" cy="26" rx="3" ry="7" fill="#602818" opacity="0.80"/>
  <line x1="465" y1="57" x2="465" y2="26" stroke="#405028" stroke-width="2.5" opacity="0.80"/>
  <ellipse cx="465" cy="22" rx="3" ry="8" fill="#602818" opacity="0.78"/>
  <!-- Water hyacinth patches -->
  <ellipse cx="90"  cy="63" rx="18" ry="7" fill="#5a9048" opacity="0.70"/>
  <ellipse cx="420" cy="65" rx="18" ry="7" fill="#5a9048" opacity="0.70"/>
  <ellipse cx="200" cy="66" rx="14" ry="5" fill="#6a9850" opacity="0.55"/>
  <ellipse cx="330" cy="64" rx="12" ry="5" fill="#6a9850" opacity="0.52"/>

  <!-- Shallow murky pond water -->
  <rect x="0" y="57" width="500" height="138" fill="url(#water93)"/>

  <!-- Calm surface ripples -->
  <path d="M0,62 Q120,58 250,62 Q380,66 500,62" fill="none" stroke="#88c898" stroke-width="1.0" opacity="0.38"/>
  <path d="M0,75 Q130,71 265,75 Q400,79 500,75" fill="none" stroke="#70b888" stroke-width="0.8" opacity="0.28"/>

  <!-- Muddy bottom -->
  <path d="M0,162 Q80,157 160,162 Q240,167 320,160 Q400,154 480,160 L500,160 L500,195 L0,195 Z"
        fill="url(#mud93)"/>
  <path d="M15,168 Q65,166 115,168" fill="none" stroke="#808060" stroke-width="0.7" opacity="0.40"/>
  <path d="M165,170 Q215,168 265,170" fill="none" stroke="#808060" stroke-width="0.7" opacity="0.38"/>
  <path d="M310,168 Q360,166 410,168" fill="none" stroke="#808060" stroke-width="0.7" opacity="0.38"/>

  <!-- Fish: 塘虱魚 Clarias fuscus (Hong Kong catfish) -->
  <!-- Dark brownish-black; very elongated; flat wide head; 4 pairs of barbels;
       long continuous dorsal fin; rounded tail; pectoral spine -->

  <!-- Main fish (mid-water, near bottom) -->
  <g transform="translate(248,140) rotate(-3)" opacity="0.91">
    <!-- Body: elongated oval, dark -->
    <ellipse cx="0" cy="0" rx="52" ry="9" fill="#302010"/>
    <!-- Head: flatter, slightly wider -->
    <ellipse cx="46" cy="0" rx="16" ry="11.5" fill="#302010"/>
    <!-- Belly slightly lighter -->
    <ellipse cx="4" cy="4" rx="42" ry="4" fill="#4a3020" opacity="0.45"/>
    <!-- Long continuous dorsal fin (from just behind head to near tail) -->
    <path d="M-46,-9 Q-25,-14 0,-13 Q22,-12 42,-9"
          fill="none" stroke="#201808" stroke-width="1.3"/>
    <!-- Long anal fin -->
    <path d="M-42,9 Q-22,14 0,13 Q20,12 38,9"
          fill="none" stroke="#201808" stroke-width="1.2"/>
    <!-- Rounded caudal fin (not forked) -->
    <path d="M-52,0 L-64,-12" stroke="#201808" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M-52,0 L-64, 12" stroke="#201808" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M-64,-12 Q-70,0 -64,12" fill="none" stroke="#201808" stroke-width="6" stroke-linecap="round"/>
    <!-- Pectoral fin spine (stiff, diagnostic) -->
    <path d="M38,10 L46,22" stroke="#201808" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <!-- Barbels — maxillary (long, at corner of mouth) -->
    <path d="M62,-3 L76,-16" stroke="#1a1008" stroke-width="1.0" stroke-linecap="round" fill="none"/>
    <path d="M62, 3 L76, 18" stroke="#1a1008" stroke-width="1.0" stroke-linecap="round" fill="none"/>
    <!-- Nasal barbels (shorter, upward) -->
    <path d="M57,-8 L60,-20" stroke="#1a1008" stroke-width="0.9" stroke-linecap="round" fill="none"/>
    <!-- Mandibular barbels (below jaw) -->
    <path d="M60,7 L66,18" stroke="#1a1008" stroke-width="0.9" stroke-linecap="round" fill="none"/>
    <path d="M55,8 L58,18" stroke="#1a1008" stroke-width="0.8" stroke-linecap="round" fill="none"/>
    <!-- Eye: small -->
    <circle cx="59" cy="-4" r="2.5" fill="#181818"/>
    <!-- Mouth: wide terminal -->
    <path d="M63,2 Q66,5 62,9" fill="none" stroke="#181008" stroke-width="1.3" stroke-linecap="round"/>
  </g>

  <!-- Fish 2 (smaller, near bottom) -->
  <g transform="translate(128,158) rotate(-2)" opacity="0.72">
    <ellipse cx="0" cy="0" rx="38" ry="7" fill="#302010"/>
    <ellipse cx="34" cy="0" rx="12" ry="9" fill="#302010"/>
    <!-- Long dorsal -->
    <path d="M-34,-7 Q-15,-11 0,-10 Q16,-9 30,-7" fill="none" stroke="#201808" stroke-width="1.1"/>
    <!-- Rounded tail -->
    <path d="M-38,0 L-48,-9" stroke="#201808" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <path d="M-38,0 L-48, 9" stroke="#201808" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <path d="M-48,-9 Q-53,0 -48,9" fill="none" stroke="#201808" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Barbels -->
    <path d="M46,-2 L55,-12" stroke="#1a1008" stroke-width="0.8" stroke-linecap="round" fill="none"/>
    <path d="M46, 2 L55, 13" stroke="#1a1008" stroke-width="0.8" stroke-linecap="round" fill="none"/>
    <circle cx="44" cy="-3" r="2.0" fill="#181818"/>
  </g>

  <!-- Labels (no depth ruler — very shallow) -->
  <text x="80" y="18" fill="#d0f0ff" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">淡水池塘・水溝・田間渠道</text>
  <text x="80" y="32" fill="#f0f060" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">0–1 m；底棲耐污；可呼吸空氣</text>
  <text x="80" y="45" fill="#c0e8d0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食甲殼類・小魚・有機碎屑；四對鬚</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">東亞（台灣各流域水渠・池塘普遍）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
