<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea33" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1870b0"/>
      <stop offset="40%" stop-color="#0e5888"/>
      <stop offset="80%" stop-color="#063040"/>
      <stop offset="100%" stop-color="#031420"/>
    </linearGradient>
    <linearGradient id="rock33" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#505860"/>
      <stop offset="100%" stop-color="#202830"/>
    </linearGradient>
  </defs>

  <!-- Rocky reef, tropical water -->
  <rect width="500" height="195" fill="url(#sea33)" rx="6"/>

  <!-- Surface shimmer -->
  <path d="M0,8 Q80,5 165,8 Q250,11 335,8 Q415,5 500,8"
        fill="none" stroke="#58c8e8" stroke-width="1.3" opacity="0.52"/>

  <!-- Light shafts -->
  <line x1="150" y1="8" x2="120" y2="155" stroke="#c8eeff" stroke-width="12" opacity="0.06"/>
  <line x1="380" y1="8" x2="356" y2="158" stroke="#c8eeff" stroke-width="8"  opacity="0.04"/>

  <!-- Rocky reef bottom -->
  <path d="M0,155 Q40,140 85,150 Q130,160 178,140 Q225,120 275,140 Q322,160 370,140 Q415,120 460,140 Q480,148 500,144 L500,195 L0,195 Z"
        fill="url(#rock33)"/>
  <ellipse cx="65"  cy="152" rx="28" ry="10" fill="#3c4450" opacity="0.72"/>
  <ellipse cx="198" cy="142" rx="26" ry="9"  fill="#3c4450" opacity="0.68"/>
  <ellipse cx="328" cy="140" rx="24" ry="8"  fill="#3c4450" opacity="0.65"/>
  <ellipse cx="462" cy="142" rx="20" ry="7"  fill="#3c4450" opacity="0.62"/>
  <!-- Rocky crevices -->
  <path d="M50,154 Q75,146 102,152" fill="none" stroke="#282e38" stroke-width="1.5" opacity="0.45"/>
  <path d="M178,143 Q214,135 248,141" fill="none" stroke="#282e38" stroke-width="1.2" opacity="0.40"/>
  <!-- Algae on rocks -->
  <ellipse cx="95"  cy="148" rx="18" ry="5" fill="#3a6040" opacity="0.55"/>
  <ellipse cx="240" cy="136" rx="16" ry="5" fill="#2a7040" opacity="0.50"/>
  <ellipse cx="368" cy="135" rx="15" ry="4.5" fill="#3a6040" opacity="0.48"/>

  <!-- Fish: 藍豬齒魚 Choerodon azurio (Scarbreast tuskfish / blue tuskfish) -->
  <!-- Labridae (wrasse): moderately deep oval body;
       blue-green/turquoise body with reddish-orange chest area (scarbreast);
       LARGE PROTRUDING CANINE TEETH (tusk-like, 豬齒 = pig teeth) from front of jaws;
       thick wrasse lips; orange-red eye; rocky reef 7–80 m -->

  <!-- Main fish (foreground) -->
  <g transform="translate(238,108) rotate(-6)" opacity="0.93">
    <!-- Body: moderately deep oval -->
    <ellipse cx="0" cy="0" rx="30" ry="17" fill="#3c7088"/>
    <!-- Blue-green back -->
    <ellipse cx="-2" cy="-9" rx="24" ry="7" fill="#206080" opacity="0.60"/>
    <!-- Reddish-orange scarbreast (diagnostic) -->
    <ellipse cx="20" cy="6" rx="14" ry="9" fill="#c06040" opacity="0.45"/>
    <!-- Pale belly -->
    <ellipse cx="4" cy="9" rx="20" ry="7" fill="#90c0c8" opacity="0.35"/>
    <!-- Caudal peduncle -->
    <ellipse cx="-27" cy="0" rx="5" ry="13" fill="#2a6078" opacity="0.80"/>
    <!-- Head: somewhat blunt wrasse profile -->
    <ellipse cx="26" cy="0" rx="11" ry="15" fill="#2a6078"/>
    <!-- Thick lips (wrasse) -->
    <path d="M36,2 Q40,5 36,9" fill="none" stroke="#184858" stroke-width="1.5" stroke-linecap="round"/>
    <!-- LARGE CANINE TEETH (tusk-like! — key ID character) -->
    <path d="M37,3 L39,8" stroke="#e8e0c0" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <path d="M35,4 L36,9" stroke="#e8e0c0" stroke-width="2.0" stroke-linecap="round" fill="none" opacity="0.80"/>
    <!-- Eye: orange-red (wrasse typical) -->
    <circle cx="29" cy="-4" r="4.5" fill="#181818"/>
    <circle cx="30" cy="-5" r="2.0" fill="#c84020" opacity="0.55"/>
    <!-- Continuous dorsal fin (long, wrasse style) -->
    <path d="M14,-17 Q6,-26 0,-28 Q-6,-26 -12,-22 Q-18,-17 -22,-12"
          fill="none" stroke="#1c5870" stroke-width="1.4"/>
    <path d="M-22,-12 Q-26,-16 -28,-14 Q-29,-11 -29,-7" fill="none" stroke="#1c5870" stroke-width="1.2"/>
    <!-- Anal fin -->
    <path d="M-8,17 Q-14,23 -20,21 Q-26,19 -27,14"
          fill="none" stroke="#1c5870" stroke-width="1.2"/>
    <!-- Pectoral fin (large, fan-like — wrasse typical) -->
    <path d="M20,9 Q30,18 36,10" fill="none" stroke="#2878a0" stroke-width="1.4" opacity="0.72"/>
    <!-- Caudal fin (rounded to slightly forked) -->
    <path d="M-31,0 L-42,-13" stroke="#1c5870" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-31,0 L-42, 13" stroke="#1c5870" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-42,-13 Q-47,0 -42,13" fill="none" stroke="#1c5870" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- Fish 2 (background) -->
  <g transform="translate(115,130) rotate(-5)" opacity="0.78">
    <ellipse cx="0" cy="0" rx="24" ry="14" fill="#3c7088"/>
    <ellipse cx="21" cy="0" rx="9"  ry="12" fill="#2a6078"/>
    <ellipse cx="16" cy="5" rx="11" ry="7"  fill="#c06040" opacity="0.40"/>
    <!-- Tusk teeth -->
    <path d="M30,3 L32,7" stroke="#e8e0c0" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <circle cx="23" cy="-3" r="3.8" fill="#181818"/>
    <path d="M10,-14 Q4,-22 -1,-24 Q-6,-22 -10,-18 Q-15,-13 -17,-9" fill="none" stroke="#1c5870" stroke-width="1.3"/>
    <path d="M-24,0 L-34,-11" stroke="#1c5870" stroke-width="3.0" stroke-linecap="round" fill="none"/>
    <path d="M-24,0 L-34, 11" stroke="#1c5870" stroke-width="3.0" stroke-linecap="round" fill="none"/>
    <path d="M-34,-11 Q-38,0 -34,11" fill="none" stroke="#1c5870" stroke-width="1.9" stroke-linecap="round"/>
  </g>

  <!-- Fish 3 (right, near reef) -->
  <g transform="translate(400,128) rotate(-4)" opacity="0.65">
    <ellipse cx="0" cy="0" rx="20" ry="12" fill="#3c7088"/>
    <ellipse cx="17" cy="0" rx="7.5" ry="10" fill="#2a6078"/>
    <circle cx="18" cy="-3" r="3.2" fill="#181818"/>
    <path d="M-20,0 L-29,-10" stroke="#1c5870" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-20,0 L-29, 10" stroke="#1c5870" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Depth ruler (0–80 m) -->
  <line x1="478" y1="8" x2="478" y2="158" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="8"   x2="478" y2="8"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="11"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="62"  x2="478" y2="62"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="65"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">25</text>
  <line x1="474" y1="110" x2="478" y2="110" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="113" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">50</text>
  <line x1="474" y1="158" x2="478" y2="158" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="161" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">80</text>
  <text x="481" y="25" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">岩礁區・礁岩縫隙底部</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">7–80 m；大型犬齒突出・胸腹橙紅（診斷）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食貝類・甲殼類；隆頭魚科豬齒魚屬</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">西北太平洋（台灣・日本・東海礁區）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
