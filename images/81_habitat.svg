<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sky81" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#284870"/>
      <stop offset="100%" stop-color="#1a3860"/>
    </linearGradient>
    <linearGradient id="sea81" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1060a0"/>
      <stop offset="30%" stop-color="#0a4880"/>
      <stop offset="70%" stop-color="#052040"/>
      <stop offset="100%" stop-color="#020c1e"/>
    </linearGradient>
  </defs>

  <!-- Grey-blue North Pacific sky (cool) -->
  <rect width="500" height="22" fill="url(#sky81)" rx="6"/>

  <!-- Cool North Pacific ocean -->
  <rect x="0" y="22" width="500" height="173" fill="url(#sea81)"/>

  <!-- Choppy North Pacific surface (often rough) -->
  <path d="M0,22 Q60,18 130,23 Q200,28 270,23 Q340,18 415,23 Q460,27 500,23"
        fill="none" stroke="#50c0d8" stroke-width="1.5" opacity="0.55"/>
  <path d="M0,33 Q70,28 148,33 Q226,38 305,33 Q384,28 500,33"
        fill="none" stroke="#38a8c8" stroke-width="1.0" opacity="0.42"/>
  <!-- Whitecaps -->
  <path d="M55,22  Q67,19  79,22"  fill="none" stroke="#c8e8f8" stroke-width="0.9" opacity="0.65"/>
  <path d="M240,23 Q252,20 264,23" fill="none" stroke="#c8e8f8" stroke-width="0.9" opacity="0.60"/>
  <path d="M415,22 Q427,19 439,22" fill="none" stroke="#c8e8f8" stroke-width="0.8" opacity="0.55"/>

  <!-- Small patches of diatom bloom / surface plankton -->
  <ellipse cx="160" cy="28" rx="30" ry="3" fill="#608890" opacity="0.18"/>
  <ellipse cx="350" cy="30" rx="24" ry="2.5" fill="#608890" opacity="0.15"/>

  <!-- Fish: 秋刀魚 (Cololabis saira, Pacific saury) -->
  <!-- Very elongated, both jaws beak-like, silvery with dark back, row of small finlets -->

  <!-- Surface school of saury (mostly at surface 0-10m) -->

  <!-- Fish 1 (largest, angled partly out of water — saury leap) -->
  <g transform="translate(260,30) rotate(-15)" opacity="0.92">
    <!-- Body: very elongated cigar shape -->
    <ellipse cx="0" cy="0" rx="44" ry="5" fill="#b0c0c8"/>
    <!-- Dark blue-green back -->
    <ellipse cx="0" cy="-3.5" rx="38" ry="2" fill="#1a3858" opacity="0.80"/>
    <!-- Iridescent silver belly -->
    <ellipse cx="3" cy="3" rx="36" ry="1.8" fill="#e0e8f0" opacity="0.65"/>
    <!-- Both jaw tips elongated (beak-like) -->
    <path d="M44,-1 L56,-2" stroke="#808898" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M44, 1 L56, 2" stroke="#808898" stroke-width="1.0" stroke-linecap="round"/>
    <!-- Small finlets behind dorsal/anal (diagnostic) -->
    <ellipse cx="30" cy="-5" rx="2.2" ry="3.5" fill="#1a3858" opacity="0.65"/>
    <ellipse cx="35" cy="-4.5" rx="1.8" ry="2.8" fill="#1a3858" opacity="0.58"/>
    <ellipse cx="39" cy="-4" rx="1.4" ry="2.2" fill="#1a3858" opacity="0.50"/>
    <ellipse cx="30" cy="5" rx="2.2" ry="3.5" fill="#1a3858" opacity="0.60"/>
    <ellipse cx="35" cy="4.5" rx="1.8" ry="2.8" fill="#1a3858" opacity="0.55"/>
    <ellipse cx="39" cy="4" rx="1.4" ry="2.2" fill="#1a3858" opacity="0.48"/>
    <!-- Dorsal fin (low, set back) -->
    <path d="M14,-5 Q22,-10 30,-5" fill="none" stroke="#1a3858" stroke-width="1.2"/>
    <!-- Anal fin -->
    <path d="M14,5 Q22,10 30,5" fill="none" stroke="#1a3858" stroke-width="1.2"/>
    <!-- Forked tail -->
    <path d="M-44,0 L-55,-8" stroke="#1a3858" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M-44,0 L-55, 8" stroke="#1a3858" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Small eye -->
    <circle cx="42" cy="-0.5" r="2" fill="#181818"/>
  </g>

  <!-- Fish 2 (at surface, horizontal) -->
  <g transform="translate(150,38) rotate(-4)" opacity="0.88">
    <ellipse cx="0" cy="0" rx="40" ry="4.5" fill="#b0c0c8"/>
    <ellipse cx="0" cy="-3" rx="34" ry="1.8" fill="#1a3858" opacity="0.75"/>
    <path d="M40,-0.5 L50,-1.2" stroke="#808898" stroke-width="1.0"/>
    <path d="M40, 0.5 L50, 1.2" stroke="#808898" stroke-width="0.9"/>
    <ellipse cx="28" cy="-5" rx="1.8" ry="3" fill="#1a3858" opacity="0.58"/>
    <ellipse cx="32" cy="-4.5" rx="1.5" ry="2.5" fill="#1a3858" opacity="0.52"/>
    <path d="M-40,0 L-50,-7" stroke="#1a3858" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M-40,0 L-50, 7" stroke="#1a3858" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <circle cx="38" cy="-0.5" r="1.7" fill="#181818"/>
  </g>

  <!-- Fish 3 (slightly deeper) -->
  <g transform="translate(360,52) rotate(-5)" opacity="0.82">
    <ellipse cx="0" cy="0" rx="36" ry="4" fill="#b0c0c8"/>
    <ellipse cx="0" cy="-2.5" rx="30" ry="1.6" fill="#1a3858" opacity="0.72"/>
    <path d="M36,-0.5 L45,-1" stroke="#808898" stroke-width="0.9"/>
    <path d="M-36,0 L-45,-6" stroke="#1a3858" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <path d="M-36,0 L-45, 6" stroke="#1a3858" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <circle cx="34" cy="-0.5" r="1.5" fill="#181818"/>
  </g>

  <!-- Fish 4 (deeper mid-water) -->
  <g transform="translate(200,100) rotate(-3)" opacity="0.60">
    <ellipse cx="0" cy="0" rx="32" ry="3.8" fill="#7898a8"/>
    <ellipse cx="0" cy="-2.5" rx="27" ry="1.5" fill="#1a3858" opacity="0.65"/>
    <path d="M-32,0 L-40,-5.5" stroke="#1a3858" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M-32,0 L-40, 5.5" stroke="#1a3858" stroke-width="2" stroke-linecap="round" fill="none"/>
    <circle cx="30" cy="-0.5" r="1.3" fill="#181818"/>
  </g>

  <!-- Depth ruler -->
  <line x1="478" y1="22" x2="478" y2="168" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="22"  x2="478" y2="22"  stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="25"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="71"  x2="478" y2="71"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="74"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">80</text>
  <line x1="474" y1="120" x2="478" y2="120" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="123" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">160</text>
  <line x1="474" y1="168" x2="478" y2="168" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="171" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">230</text>
  <text x="481" y="38" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="15" fill="#a0c8e0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">北太平洋冷溫性表層海域</text>
  <text x="12" y="56" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">0–230 m；受驚可滑翔出水</text>
  <text x="12" y="70" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食小型甲殼類・魚卵；偏好 5–15°C</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">北太平洋（日本・韓國；台灣為進口魚種）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
