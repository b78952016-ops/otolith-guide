<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea62" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1060a0"/>
      <stop offset="40%" stop-color="#083868"/>
      <stop offset="80%" stop-color="#041828"/>
      <stop offset="100%" stop-color="#020e18"/>
    </linearGradient>
    <linearGradient id="sand62" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a09878"/>
      <stop offset="100%" stop-color="#686048"/>
    </linearGradient>
  </defs>

  <!-- Continental shelf water 50-200m -->
  <rect width="500" height="195" fill="url(#sea62)" rx="6"/>

  <!-- Faint surface shimmer -->
  <path d="M0,6 Q120,3 250,6 Q380,9 500,6"
        fill="none" stroke="#4888c0" stroke-width="1.2" opacity="0.42"/>
  <path d="M0,16 Q100,12 210,16 Q320,20 430,16 Q465,14 500,16"
        fill="none" stroke="#3870a8" stroke-width="0.8" opacity="0.30"/>

  <!-- Light shafts penetrating deep water -->
  <line x1="150" y1="6" x2="115" y2="140" stroke="#d0e8ff" stroke-width="12" opacity="0.04"/>
  <line x1="380" y1="6" x2="350" y2="150" stroke="#d0e8ff" stroke-width="8"  opacity="0.03"/>

  <!-- Sandy-mud continental shelf bottom -->
  <path d="M0,162 Q80,156 170,162 Q260,168 340,160 Q420,152 490,160 Q495,161 500,160 L500,195 L0,195 Z"
        fill="url(#sand62)"/>
  <!-- Sand ripples -->
  <path d="M20,170 Q75,168 130,170" fill="none" stroke="#c8b870" stroke-width="0.7" opacity="0.45"/>
  <path d="M190,174 Q245,172 300,174" fill="none" stroke="#c8b870" stroke-width="0.7" opacity="0.42"/>
  <path d="M350,170 Q405,168 460,170" fill="none" stroke="#c8b870" stroke-width="0.7" opacity="0.42"/>

  <!-- Marine snow particles -->
  <circle cx="80"  cy="50"  r="0.7" fill="#ffffff" opacity="0.15"/>
  <circle cx="200" cy="38"  r="0.8" fill="#ffffff" opacity="0.14"/>
  <circle cx="340" cy="60"  r="0.7" fill="#ffffff" opacity="0.13"/>
  <circle cx="440" cy="42"  r="0.6" fill="#ffffff" opacity="0.12"/>
  <circle cx="130" cy="110" r="0.7" fill="#ffffff" opacity="0.11"/>

  <!-- Fish: 海魴 Zeus faber (John Dory / 多莉魚) -->
  <!-- Very distinctive: extremely laterally compressed disc body, large oblique mouth,
       black circular spot on flank, long trailing dorsal fin spines -->

  <!-- Main fish (foreground, side view shows full disc shape) -->
  <g transform="translate(260,120) rotate(-5)" opacity="0.92">
    <!-- Body: almost circular/oval disc, very tall and thin -->
    <ellipse cx="0" cy="0" rx="24" ry="28" fill="#807060"/>
    <!-- Upper body slightly darker -->
    <ellipse cx="0" cy="-14" rx="20" ry="12" fill="#585040" opacity="0.45"/>
    <!-- Silver-cream belly -->
    <ellipse cx="2" cy="16" rx="18" ry="8" fill="#e0d8c0" opacity="0.30"/>
    <!-- Diagnostic BLACK CIRCULAR SPOT on mid-flank (famous feature of Zeus faber) -->
    <circle cx="-2" cy="2" r="9" fill="#101010" opacity="0.85"/>
    <!-- White ring around spot -->
    <circle cx="-2" cy="2" r="11" fill="none" stroke="#d0c8a8" stroke-width="1.5" opacity="0.55"/>
    <!-- Spiny dorsal fin with elongated trailing filaments (very distinctive) -->
    <!-- Spiny section: several distinct spines arching back -->
    <path d="M-15,-28 L-10,-50" stroke="#606050" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M-8,-28 L-3,-52" stroke="#606050" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M0,-29 Q5,-54 8,-58" stroke="#606050" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M8,-28 Q14,-50 18,-52" stroke="#606050" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M15,-26 Q22,-44 26,-45" stroke="#606050" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- Membrane connecting spines -->
    <path d="M-15,-28 Q-8,-48 0,-50 Q8,-51 15,-45" fill="none" stroke="#808060" stroke-width="0.8" opacity="0.50"/>
    <!-- Soft dorsal (low, behind spines) -->
    <path d="M15,-26 Q20,-30 24,-24" fill="none" stroke="#606050" stroke-width="1.2"/>
    <!-- Ventral spines (two long trailing filaments) -->
    <path d="M-8,28 L-12,52" stroke="#606050" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M0,29 Q2,54 4,58" stroke="#606050" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <!-- Anal fin -->
    <path d="M0,28 Q8,33 16,27" fill="none" stroke="#606050" stroke-width="1.2"/>
    <!-- Truncate tail (not forked — nearly straight) -->
    <path d="M-24,0 L-34,-8" stroke="#606050" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-24,0 L-34, 8" stroke="#606050" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-34,-8 L-34,8" stroke="#606050" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Pectoral fin -->
    <path d="M16,10 Q26,18 28,10" fill="none" stroke="#606050" stroke-width="1.2" opacity="0.75"/>
    <!-- Large oblique mouth (tilted upward — characteristic) -->
    <path d="M24,-8 Q30,0 24,8" fill="none" stroke="#484038" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Eye (moderately large) -->
    <circle cx="20" cy="-10" r="4" fill="#181818"/>
    <circle cx="21" cy="-11" r="1.3" fill="#906040" opacity="0.45"/>
  </g>

  <!-- Fish 2 (background) -->
  <g transform="translate(130,140) rotate(-4)" opacity="0.70">
    <ellipse cx="0" cy="0" rx="18" ry="22" fill="#807060"/>
    <circle cx="-2" cy="2" r="7" fill="#101010" opacity="0.80"/>
    <circle cx="-2" cy="2" r="9" fill="none" stroke="#c8b898" stroke-width="1.2" opacity="0.50"/>
    <path d="M-10,-22 L-7,-38" stroke="#606050" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M0,-22 L3,-40" stroke="#606050" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M8,-21 L12,-36" stroke="#606050" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M-18,0 L-25,-7" stroke="#606050" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M-18,0 L-25, 7" stroke="#606050" stroke-width="3" stroke-linecap="round" fill="none"/>
    <circle cx="15" cy="-8" r="3" fill="#181818"/>
  </g>

  <!-- Depth ruler -->
  <line x1="478" y1="8" x2="478" y2="168" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="8"   x2="478" y2="8"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="11"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="49"  x2="478" y2="49"  stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="52"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">50</text>
  <line x1="474" y1="89"  x2="478" y2="89"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="92"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">100</text>
  <line x1="474" y1="129" x2="478" y2="129" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="132" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">150</text>
  <line x1="474" y1="168" x2="478" y2="168" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="171" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">200</text>
  <text x="481" y="25" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">大陸棚砂泥底・開闊中底層</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">50–150 m（最深達400 m）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">孤獨獵食；側扁圓盤身・黑眼斑</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">全球廣佈（東大西洋至地中海・西太平洋）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
