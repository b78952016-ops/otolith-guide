<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sky35" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3888c8"/>
      <stop offset="100%" stop-color="#2068a8"/>
    </linearGradient>
    <linearGradient id="water35" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38b0a0"/>
      <stop offset="55%" stop-color="#1a8070"/>
      <stop offset="100%" stop-color="#0e4840"/>
    </linearGradient>
    <linearGradient id="pebble35" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a9080"/>
      <stop offset="100%" stop-color="#606050"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="500" height="195" fill="url(#sky35)" rx="6"/>

  <!-- Hillside vegetation (left bank) -->
  <path d="M0,0 Q40,28 70,50 L0,50 Z" fill="#2a5020" opacity="0.82"/>
  <ellipse cx="26"  cy="18" rx="32" ry="18" fill="#2a5818" opacity="0.75"/>
  <ellipse cx="58"  cy="36" rx="24" ry="14" fill="#306020" opacity="0.70"/>
  <!-- Hillside vegetation (right bank) -->
  <path d="M500,0 Q460,28 430,50 L500,50 Z" fill="#2a5020" opacity="0.82"/>
  <ellipse cx="474" cy="18" rx="32" ry="18" fill="#2a5818" opacity="0.75"/>
  <ellipse cx="442" cy="36" rx="24" ry="14" fill="#306020" opacity="0.70"/>

  <!-- Stream water body -->
  <rect x="0" y="50" width="500" height="145" fill="url(#water35)"/>

  <!-- Current flow lines (showing direction of flow) -->
  <path d="M0,64 Q120,59 250,64 Q380,69 500,64" fill="none" stroke="#70d8c0" stroke-width="1.3" opacity="0.42"/>
  <path d="M0,78 Q130,72 265,78 Q395,84 500,78" fill="none" stroke="#58c8b0" stroke-width="1.0" opacity="0.34"/>
  <path d="M0,94 Q110,87 235,94 Q365,101 500,94" fill="none" stroke="#48b8a0" stroke-width="0.9" opacity="0.28"/>
  <!-- Whitewater ripples on rocks -->
  <path d="M88,60 Q98,57 108,60"  fill="none" stroke="#c0f0e8" stroke-width="1.0" opacity="0.58"/>
  <path d="M205,68 Q218,65 231,68" fill="none" stroke="#c0f0e8" stroke-width="0.9" opacity="0.52"/>
  <path d="M348,62 Q361,59 374,62" fill="none" stroke="#c0f0e8" stroke-width="0.9" opacity="0.52"/>
  <path d="M430,74 Q442,71 454,74" fill="none" stroke="#c0f0e8" stroke-width="0.8" opacity="0.45"/>

  <!-- Boulders in stream -->
  <ellipse cx="102" cy="158" rx="30" ry="15" fill="url(#pebble35)" opacity="0.85"/>
  <ellipse cx="100" cy="154" rx="19" ry="8"  fill="#c0b8a8" opacity="0.28"/>
  <ellipse cx="368" cy="162" rx="24" ry="12" fill="url(#pebble35)" opacity="0.80"/>
  <ellipse cx="366" cy="158" rx="15" ry="7"  fill="#c0b8a8" opacity="0.26"/>
  <ellipse cx="230" cy="170" rx="18" ry="9"  fill="url(#pebble35)" opacity="0.78"/>
  <ellipse cx="462" cy="155" rx="16" ry="8"  fill="url(#pebble35)" opacity="0.75"/>

  <!-- Pebbly streambed -->
  <path d="M0,176 Q80,171 160,176 Q240,181 320,174 Q400,167 480,174 Q490,175 500,175 L500,195 L0,195 Z"
        fill="#888070"/>
  <circle cx="35"  cy="183" r="4"   fill="#a09888" opacity="0.62"/>
  <circle cx="82"  cy="186" r="3.5" fill="#988878" opacity="0.58"/>
  <circle cx="145" cy="182" r="5"   fill="#a09888" opacity="0.60"/>
  <circle cx="192" cy="185" r="3"   fill="#988878" opacity="0.56"/>
  <circle cx="268" cy="183" r="4.5" fill="#a09888" opacity="0.60"/>
  <circle cx="318" cy="186" r="3"   fill="#988878" opacity="0.56"/>
  <circle cx="385" cy="182" r="5"   fill="#a09888" opacity="0.60"/>
  <circle cx="445" cy="185" r="4"   fill="#988878" opacity="0.56"/>
  <!-- Algae on rocks (food for Zacco) -->
  <path d="M92,151 Q102,144 112,149"  fill="none" stroke="#488030" stroke-width="1.4" opacity="0.68"/>
  <path d="M358,154 Q368,147 378,152" fill="none" stroke="#488030" stroke-width="1.3" opacity="0.64"/>

  <!-- Fish 1: 平頜鱲 (Zacco platypus) — breeding male, reddish flanks -->
  <g transform="translate(245,112) rotate(-7)" opacity="0.92">
    <!-- Body: elongated, slightly compressed -->
    <ellipse cx="0" cy="0" rx="22" ry="6" fill="#a86038"/>
    <!-- Orange-red breeding flank color -->
    <ellipse cx="2" cy="2" rx="16" ry="4" fill="#d87838" opacity="0.48"/>
    <!-- Dark olive-brown back -->
    <ellipse cx="0" cy="-4" rx="18" ry="2.5" fill="#604820" opacity="0.72"/>
    <!-- Dorsal fin -->
    <path d="M-4,-6 L0,-14 L6,-15 L10,-13 L11,-6" fill="none" stroke="#805028" stroke-width="1.3"/>
    <!-- Forked tail -->
    <path d="M-22,0 L-31,-10" stroke="#805028" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-22,0 L-31, 10" stroke="#805028" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <!-- Pectoral fin -->
    <path d="M14,4 Q20,9 23,5" fill="none" stroke="#805028" stroke-width="1.1" opacity="0.7"/>
    <!-- Anal fin -->
    <path d="M-6,6 Q2,11 10,6" fill="none" stroke="#805028" stroke-width="1.1"/>
    <!-- Eye -->
    <circle cx="19" cy="-0.5" r="2.5" fill="#181818"/>
    <circle cx="20" cy="-1" r="0.8" fill="#a06838" opacity="0.50"/>
    <!-- Breeding tubercles on snout -->
    <circle cx="22" cy="1"    r="0.8" fill="#e09060" opacity="0.55"/>
    <circle cx="21" cy="-0.5" r="0.7" fill="#e09060" opacity="0.50"/>
  </g>

  <!-- Fish 2: smaller, facing current -->
  <g transform="translate(132,132) rotate(-9)" opacity="0.80">
    <ellipse cx="0" cy="0" rx="17" ry="5" fill="#a86038"/>
    <ellipse cx="1" cy="2" rx="12" ry="3" fill="#d07030" opacity="0.40"/>
    <path d="M-2,-5 L1,-11 L5,-12 L8,-10 L9,-5" fill="none" stroke="#805028" stroke-width="1.1"/>
    <path d="M-17,0 L-24,-8" stroke="#805028" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <path d="M-17,0 L-24, 8" stroke="#805028" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <circle cx="14" cy="0" r="2.0" fill="#181818"/>
  </g>

  <!-- Fish 3: female (less colorful) -->
  <g transform="translate(378,122) rotate(-5)" opacity="0.75">
    <ellipse cx="0" cy="0" rx="16" ry="4.5" fill="#8a7050"/>
    <path d="M-3,-4.5 L0,-10 L4,-11 L7,-9 L8,-4.5" fill="none" stroke="#605038" stroke-width="1.1"/>
    <path d="M-16,0 L-22,-7" stroke="#605038" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <path d="M-16,0 L-22, 7" stroke="#605038" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <circle cx="13" cy="0" r="1.8" fill="#181818"/>
  </g>

  <!-- Labels (no depth ruler for freshwater scene) -->
  <text x="112" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">淡水／河川中游急流段</text>
  <text x="112" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">不喜深水或靜止水域</text>
  <text x="112" y="45" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食藻類・水生昆蟲・落水昆蟲</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">東亞原產（台灣北部為外來入侵種）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
