<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5890"/>
      <stop offset="45%" stop-color="#0e3868"/>
      <stop offset="100%" stop-color="#0a2248"/>
    </linearGradient>
    <linearGradient id="sand18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a8860"/>
      <stop offset="100%" stop-color="#685840"/>
    </linearGradient>
  </defs>

  <!-- Shallow pelagic/shelf water -->
  <rect width="500" height="195" fill="url(#sea18)" rx="6"/>

  <!-- Surface waves (near-surface fishing area) -->
  <path d="M0,7 Q80,4 165,7 Q250,10 335,7 Q415,4 500,7"
        fill="none" stroke="#50d8f8" stroke-width="1.6" opacity="0.60"/>
  <path d="M0,17 Q90,12 185,17 Q280,22 370,17 Q440,12 500,17"
        fill="none" stroke="#38c0e0" stroke-width="1.1" opacity="0.45"/>
  <path d="M0,30 Q100,25 200,30 Q300,35 400,30 Q450,27 500,30"
        fill="none" stroke="#28a8c8" stroke-width="0.9" opacity="0.32"/>

  <!-- Sandy shelf bottom -->
  <path d="M0,172 Q80,167 160,172 Q240,177 320,170 Q400,163 480,170 Q490,171 500,171 L500,195 L0,195 Z"
        fill="url(#sand18)"/>
  <!-- Sand ripples -->
  <path d="M20,179 Q80,177 140,179" fill="none" stroke="#b0a070" stroke-width="0.7" opacity="0.55"/>
  <path d="M170,182 Q230,180 290,182" fill="none" stroke="#b0a070" stroke-width="0.7" opacity="0.55"/>
  <path d="M320,179 Q380,177 440,179" fill="none" stroke="#b0a070" stroke-width="0.7" opacity="0.55"/>

  <!-- Fish 1: 土魠/康氏馬加鰆 (Narrow-barred Spanish Mackerel) — long torpedo, vertical stripes -->
  <g transform="translate(200,100) rotate(-5)" opacity="0.91">
    <!-- Body: very elongated torpedo -->
    <ellipse cx="0" cy="0" rx="50" ry="9" fill="#7890a0"/>
    <!-- Blue-green back -->
    <ellipse cx="0" cy="-5" rx="44" ry="4" fill="#507090" opacity="0.75"/>
    <!-- Silver belly -->
    <ellipse cx="4" cy="4" rx="38" ry="4" fill="#d8e8f0" opacity="0.40"/>
    <!-- Characteristic vertical dark bands (Scomberomorus pattern) -->
    <line x1="-30" y1="-8" x2="-30" y2="8" stroke="#384858" stroke-width="2.0" opacity="0.55"/>
    <line x1="-15" y1="-8" x2="-15" y2="8" stroke="#384858" stroke-width="2.0" opacity="0.55"/>
    <line x1="0"   y1="-8" x2="0"   y2="8" stroke="#384858" stroke-width="2.0" opacity="0.55"/>
    <line x1="15"  y1="-8" x2="15"  y2="8" stroke="#384858" stroke-width="2.0" opacity="0.55"/>
    <line x1="28"  y1="-7" x2="28"  y2="7" stroke="#384858" stroke-width="2.0" opacity="0.45"/>
    <!-- First dorsal fin (long, low) -->
    <path d="M-20,-9 Q0,-16 25,-9" fill="none" stroke="#506878" stroke-width="1.4"/>
    <!-- Second dorsal (small, near tail) -->
    <path d="M25,-9 Q34,-13 40,-9" fill="none" stroke="#506878" stroke-width="1.2"/>
    <!-- Small finlets near tail -->
    <path d="M40,0 L44,-5" stroke="#506878" stroke-width="1" stroke-linecap="round" fill="none"/>
    <path d="M40,0 L44, 5" stroke="#506878" stroke-width="1" stroke-linecap="round" fill="none"/>
    <!-- Deeply sickle-shaped forked tail -->
    <path d="M-50,0 L-65,-18" stroke="#506878" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M-50,0 L-65, 18" stroke="#506878" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <!-- Pectoral fin -->
    <path d="M28,6 Q36,13 42,8" fill="none" stroke="#506878" stroke-width="1.3" opacity="0.8"/>
    <!-- Eye -->
    <circle cx="43" cy="-0.5" r="3" fill="#181818"/>
    <circle cx="44" cy="-1.2" r="1.0" fill="#9ab0c0" opacity="0.5"/>
  </g>

  <!-- Fish 2: smaller, pursuing prey in same school -->
  <g transform="translate(350,130) rotate(-4)" opacity="0.80">
    <ellipse cx="0" cy="0" rx="38" ry="7" fill="#7890a0"/>
    <ellipse cx="0" cy="-4" rx="33" ry="3" fill="#507090" opacity="0.70"/>
    <line x1="-22" y1="-6" x2="-22" y2="6" stroke="#384858" stroke-width="1.8" opacity="0.50"/>
    <line x1="-8"  y1="-6" x2="-8"  y2="6" stroke="#384858" stroke-width="1.8" opacity="0.50"/>
    <line x1="6"   y1="-6" x2="6"   y2="6" stroke="#384858" stroke-width="1.8" opacity="0.50"/>
    <line x1="18"  y1="-6" x2="18"  y2="6" stroke="#384858" stroke-width="1.8" opacity="0.45"/>
    <path d="M-15,-7 Q0,-12 18,-7" fill="none" stroke="#506878" stroke-width="1.3"/>
    <path d="M-38,0 L-50,-14" stroke="#506878" stroke-width="2.7" stroke-linecap="round" fill="none"/>
    <path d="M-38,0 L-50, 14" stroke="#506878" stroke-width="2.7" stroke-linecap="round" fill="none"/>
    <circle cx="32" cy="-0.5" r="2.4" fill="#181818"/>
  </g>

  <!-- Depth ruler (right side) — 0-70m -->
  <line x1="478" y1="7" x2="478" y2="172" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="7"   x2="478" y2="7"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="10"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="54"  x2="478" y2="54"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="57"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">20</text>
  <line x1="474" y1="101" x2="478" y2="101" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="104" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">40</text>
  <line x1="474" y1="148" x2="478" y2="148" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="151" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">60</text>
  <line x1="474" y1="172" x2="478" y2="172" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="175" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">70</text>
  <text x="481" y="24" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">淺大陸棚 ／ 中上層暖水</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">10–70 m</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">凶猛掠食；成小群追捕鯡科・鰺科群游魚</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度西太平洋・地中海</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
