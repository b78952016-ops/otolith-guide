<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea67" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1878b8"/>
      <stop offset="40%" stop-color="#0e5888"/>
      <stop offset="80%" stop-color="#063040"/>
      <stop offset="100%" stop-color="#031420"/>
    </linearGradient>
    <linearGradient id="rock67" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#505860"/>
      <stop offset="100%" stop-color="#202830"/>
    </linearGradient>
  </defs>

  <!-- Rocky reef water, tropical -->
  <rect width="500" height="195" fill="url(#sea67)" rx="6"/>

  <!-- Surface shimmer -->
  <path d="M0,8 Q80,5 165,8 Q250,11 335,8 Q415,5 500,8"
        fill="none" stroke="#60c8e8" stroke-width="1.3" opacity="0.52"/>

  <!-- Light shafts -->
  <line x1="150" y1="8" x2="120" y2="155" stroke="#c8eeff" stroke-width="12" opacity="0.06"/>
  <line x1="385" y1="8" x2="360" y2="158" stroke="#c8eeff" stroke-width="8"  opacity="0.04"/>

  <!-- Prominent rocky reef bottom -->
  <path d="M0,155 Q40,138 88,148 Q136,158 186,138 Q235,118 288,138 Q338,158 388,138 Q435,118 480,135 L500,132 L500,195 L0,195 Z"
        fill="url(#rock67)"/>
  <!-- Large reef rocks -->
  <ellipse cx="62"  cy="150" rx="30" ry="11" fill="#3c4450" opacity="0.75"/>
  <ellipse cx="196" cy="140" rx="26" ry="9"  fill="#3c4450" opacity="0.70"/>
  <ellipse cx="332" cy="138" rx="25" ry="9"  fill="#3c4450" opacity="0.68"/>
  <ellipse cx="468" cy="138" rx="22" ry="8"  fill="#3c4450" opacity="0.65"/>
  <!-- Rock crevices -->
  <path d="M44,153 Q72,143 104,150" fill="none" stroke="#1a2028" stroke-width="1.8" opacity="0.50"/>
  <path d="M172,142 Q210,132 248,140" fill="none" stroke="#1a2028" stroke-width="1.4" opacity="0.44"/>
  <!-- Algae on reef -->
  <ellipse cx="96"  cy="144" rx="20" ry="6" fill="#3a6040" opacity="0.58"/>
  <ellipse cx="240" cy="132" rx="18" ry="5.5" fill="#2a7040" opacity="0.54"/>
  <ellipse cx="378" cy="130" rx="17" ry="5.5" fill="#3a6040" opacity="0.50"/>

  <!-- Fish: 花尾胡椒鯛 Plectorhinchus cinctus (Crescent sweetlips) -->
  <!-- Haemulidae (sweetlips/grunts): large oval body;
       ADULT PATTERN: whitish-grey/silver base with MANY dark brown/black spots
       scattered all over body, head, and fins (NOT horizontal stripes!);
       THICK PROMINENT LIPS (sweetlips diagnostic!);
       yellow/orange tinge on fin edges;
       rocky reef 0–50 m -->

  <!-- Main fish (foreground) -->
  <g transform="translate(240,105) rotate(-6)" opacity="0.93">
    <!-- Body: large oval -->
    <ellipse cx="0" cy="0" rx="31" ry="18" fill="#d0c8b0"/>
    <!-- Slightly darker grey-brown back -->
    <ellipse cx="-2" cy="-10" rx="25" ry="7" fill="#908070" opacity="0.52"/>
    <!-- Paler silver-white belly -->
    <ellipse cx="4" cy="9" rx="22" ry="8" fill="#e8e4d8" opacity="0.42"/>
    <!-- Caudal peduncle -->
    <ellipse cx="-28" cy="0" rx="5" ry="14" fill="#b0a898" opacity="0.80"/>
    <!-- Head: somewhat blunt, thick lips -->
    <ellipse cx="27" cy="0" rx="12" ry="16" fill="#b0a898"/>
    <!-- THICK LIPS (sweetlips diagnostic!) -->
    <path d="M38,2 Q42,6 38,11" fill="none" stroke="#806850" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Eye -->
    <circle cx="29" cy="-5" r="4.5" fill="#181818"/>
    <circle cx="30" cy="-6" r="1.5" fill="#908070" opacity="0.38"/>
    <!-- SPOTS scattered over body (diagnostic — adult pattern!) -->
    <circle cx="8"   cy="-5" r="2.8" fill="#383028" opacity="0.72"/>
    <circle cx="-4"  cy="-8" r="2.5" fill="#383028" opacity="0.68"/>
    <circle cx="-14" cy="-5" r="2.8" fill="#383028" opacity="0.65"/>
    <circle cx="-22" cy="-2" r="2.5" fill="#383028" opacity="0.62"/>
    <circle cx="18"  cy="-2" r="2.5" fill="#383028" opacity="0.66"/>
    <circle cx="6"   cy="6"  r="2.8" fill="#383028" opacity="0.64"/>
    <circle cx="-5"  cy="8"  r="2.5" fill="#383028" opacity="0.60"/>
    <circle cx="-16" cy="6"  r="2.5" fill="#383028" opacity="0.58"/>
    <circle cx="-24" cy="3"  r="2.2" fill="#383028" opacity="0.55"/>
    <circle cx="16"  cy="7"  r="2.2" fill="#383028" opacity="0.58"/>
    <circle cx="0"   cy="-1" r="2.2" fill="#383028" opacity="0.55"/>
    <!-- Spots on head -->
    <circle cx="24" cy="4"  r="2.0" fill="#383028" opacity="0.60"/>
    <circle cx="22" cy="-8" r="1.8" fill="#383028" opacity="0.55"/>
    <!-- Dorsal fin: spiny + soft, with spots -->
    <path d="M10,-18 Q4,-27 -2,-29 Q-8,-27 -14,-22 Q-20,-17 -24,-12"
          fill="none" stroke="#706050" stroke-width="1.4"/>
    <path d="M-24,-12 Q-28,-16 -30,-14 Q-30,-11 -30,-7" fill="none" stroke="#706050" stroke-width="1.2"/>
    <!-- Anal fin -->
    <path d="M-8,18 Q-14,24 -20,22 Q-26,20 -28,15"
          fill="none" stroke="#706050" stroke-width="1.2"/>
    <!-- Pectoral fin (yellow-orange tinge) -->
    <path d="M20,9 Q30,17 36,10" fill="none" stroke="#c8a030" stroke-width="1.4" opacity="0.65"/>
    <!-- Caudal fin (forked, spotted) -->
    <path d="M-32,0 L-44,-14" stroke="#706050" stroke-width="3.6" stroke-linecap="round" fill="none"/>
    <path d="M-32,0 L-44, 14" stroke="#706050" stroke-width="3.6" stroke-linecap="round" fill="none"/>
    <path d="M-44,-14 Q-49,0 -44,14" fill="none" stroke="#706050" stroke-width="2.3" stroke-linecap="round"/>
  </g>

  <!-- Fish 2 (background) -->
  <g transform="translate(118,122) rotate(-5)" opacity="0.80">
    <ellipse cx="0" cy="0" rx="25" ry="14" fill="#d0c8b0"/>
    <ellipse cx="22" cy="0" rx="10" ry="13" fill="#b0a898"/>
    <!-- Some spots -->
    <circle cx="4"  cy="-4" r="2.2" fill="#383028" opacity="0.65"/>
    <circle cx="-6" cy="-5" r="2.0" fill="#383028" opacity="0.60"/>
    <circle cx="-14" cy="-3" r="2.2" fill="#383028" opacity="0.58"/>
    <circle cx="3"  cy="5"  r="2.0" fill="#383028" opacity="0.55"/>
    <circle cx="-10" cy="5" r="2.0" fill="#383028" opacity="0.52"/>
    <circle cx="24" cy="-3" r="3.8" fill="#181818"/>
    <!-- Thick lips -->
    <path d="M31,2 Q34,5 31,8" fill="none" stroke="#806850" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M8,-14 Q3,-22 -2,-24 Q-7,-22 -12,-17 Q-16,-12 -18,-9" fill="none" stroke="#706050" stroke-width="1.3"/>
    <path d="M-26,0 L-36,-11" stroke="#706050" stroke-width="3.0" stroke-linecap="round" fill="none"/>
    <path d="M-26,0 L-36, 11" stroke="#706050" stroke-width="3.0" stroke-linecap="round" fill="none"/>
    <path d="M-36,-11 Q-40,0 -36,11" fill="none" stroke="#706050" stroke-width="2.0" stroke-linecap="round"/>
  </g>

  <!-- Fish 3 (right) -->
  <g transform="translate(400,125) rotate(-4)" opacity="0.65">
    <ellipse cx="0" cy="0" rx="21" ry="12" fill="#d0c8b0"/>
    <ellipse cx="18" cy="0" rx="8" ry="10" fill="#b0a898"/>
    <circle cx="4"  cy="-3" r="1.8" fill="#383028" opacity="0.60"/>
    <circle cx="-6" cy="-3" r="1.8" fill="#383028" opacity="0.55"/>
    <circle cx="-14" cy="-1" r="1.8" fill="#383028" opacity="0.52"/>
    <circle cx="2"  cy="4"  r="1.8" fill="#383028" opacity="0.50"/>
    <circle cx="19" cy="-3" r="3.2" fill="#181818"/>
    <path d="M-21,0 L-30,-10" stroke="#706050" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-21,0 L-30, 10" stroke="#706050" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Depth ruler (0–50 m) -->
  <line x1="478" y1="8" x2="478" y2="155" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="8"   x2="478" y2="8"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="11"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="58"  x2="478" y2="58"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="61"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">15</text>
  <line x1="474" y1="108" x2="478" y2="108" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="111" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">30</text>
  <line x1="474" y1="155" x2="478" y2="155" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="158" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">50</text>
  <text x="481" y="25" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">岩礁區・人工魚礁・礁沙交界</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">0–50 m；灰白體・滿身黑斑・厚唇（診斷）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食甲殼類・小魚；石鱸科（Haemulidae）</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度－西太平洋（台灣各礁區）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
