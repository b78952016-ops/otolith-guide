<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea24" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c5890"/>
      <stop offset="40%" stop-color="#083468"/>
      <stop offset="80%" stop-color="#041c3c"/>
      <stop offset="100%" stop-color="#020c20"/>
    </linearGradient>
  </defs>

  <!-- Cold open ocean, pelagic surface — 北太平洋 -->
  <rect width="500" height="195" fill="url(#sea24)" rx="6"/>

  <!-- Surface waves -->
  <path d="M0,6 Q60,3 120,6 Q180,9 240,5 Q300,1 360,5 Q420,9 500,6"
        fill="none" stroke="#4888b8" stroke-width="1.6" opacity="0.65"/>
  <path d="M0,14 Q80,10 160,14 Q240,18 320,13 Q400,8 500,13"
        fill="none" stroke="#3070a0" stroke-width="1.0" opacity="0.40"/>
  <path d="M100,7 Q115,4 130,7" fill="none" stroke="#b0d8f0" stroke-width="1.8" opacity="0.40"/>
  <path d="M300,5 Q315,2 330,5" fill="none" stroke="#b0d8f0" stroke-width="1.8" opacity="0.38"/>

  <!-- Light penetration -->
  <line x1="180" y1="6" x2="150" y2="160" stroke="#c8e8ff" stroke-width="14" opacity="0.05"/>
  <line x1="400" y1="6" x2="374" y2="160" stroke="#c8e8ff" stroke-width="9"  opacity="0.035"/>

  <!-- Marine snow -->
  <circle cx="60"  cy="55" r="0.9" fill="#ffffff" opacity="0.14"/>
  <circle cx="200" cy="40" r="0.8" fill="#ffffff" opacity="0.12"/>
  <circle cx="350" cy="70" r="0.8" fill="#ffffff" opacity="0.12"/>
  <circle cx="450" cy="45" r="0.9" fill="#ffffff" opacity="0.13"/>

  <!-- Fish: 秋刀魚 Cololabis saira (Pacific saury) -->
  <!-- Scomberesocidae: EXTREMELY elongated slender torpedo body;
       BOTH upper AND lower jaws project into long pointed beak (diagnostic!);
       dark metallic blue-green back, bright silver sides;
       all fins set far back; 5 small finlets after dorsal and anal fins;
       small forked caudal fin; pelagic surface schooling fish -->

  <!-- Main fish (foreground) -->
  <g transform="translate(240,88) rotate(-3)" opacity="0.93">
    <!-- Body: extremely elongated, slender torpedo -->
    <ellipse cx="0" cy="0" rx="50" ry="7" fill="#b8c8d0"/>
    <!-- Dark metallic blue-green back -->
    <ellipse cx="0" cy="-4" rx="46" ry="3.2" fill="#1c4060" opacity="0.85"/>
    <!-- Bright silver sheen -->
    <ellipse cx="6" cy="1" rx="38" ry="4" fill="#e8f0f8" opacity="0.42"/>
    <!-- Caudal peduncle (narrow) -->
    <ellipse cx="-46" cy="0" rx="6" ry="5" fill="#a8b8c0" opacity="0.82"/>
    <!-- Head: slightly rounded -->
    <ellipse cx="46" cy="0" rx="5" ry="6" fill="#2c5068"/>
    <!-- BOTH JAWS extended into beak (diagnostic!) -->
    <!-- Upper beak -->
    <path d="M49,-0.5 L66,-1.5" stroke="#1a3848" stroke-width="2.6" stroke-linecap="round" fill="none"/>
    <!-- Lower beak -->
    <path d="M49,1 L65,2" stroke="#1a3848" stroke-width="2.0" stroke-linecap="round" fill="none"/>
    <!-- Eye: small -->
    <circle cx="48" cy="-2.5" r="2.4" fill="#101010"/>
    <!-- Dorsal fin (far back, small) -->
    <path d="M-18,-7 Q-22,-13 -28,-14 Q-34,-13 -36,-9"
          fill="none" stroke="#4070a0" stroke-width="1.2"/>
    <!-- Anal fin (mirrors dorsal) -->
    <path d="M-18,7 Q-22,13 -28,14 Q-34,13 -36,9"
          fill="none" stroke="#4070a0" stroke-width="1.2"/>
    <!-- Pectoral fin (small) -->
    <path d="M36,3 Q42,8 44,4" fill="none" stroke="#4070a0" stroke-width="1.0" opacity="0.68"/>
    <!-- 5 finlets after dorsal -->
    <line x1="-40" y1="-6" x2="-40" y2="-3" stroke="#5888a8" stroke-width="1.3"/>
    <line x1="-43" y1="-5" x2="-43" y2="-3" stroke="#5888a8" stroke-width="1.2"/>
    <line x1="-46" y1="-4" x2="-46" y2="-2" stroke="#5888a8" stroke-width="1.1"/>
    <line x1="-49" y1="-3" x2="-49" y2="-2" stroke="#5888a8" stroke-width="1.0"/>
    <line x1="-52" y1="-3" x2="-52" y2="-1" stroke="#5888a8" stroke-width="0.9"/>
    <!-- 5 finlets after anal fin -->
    <line x1="-40" y1="6" x2="-40" y2="3" stroke="#5888a8" stroke-width="1.3"/>
    <line x1="-43" y1="5" x2="-43" y2="3" stroke="#5888a8" stroke-width="1.2"/>
    <line x1="-46" y1="4" x2="-46" y2="2" stroke="#5888a8" stroke-width="1.1"/>
    <line x1="-49" y1="3" x2="-49" y2="2" stroke="#5888a8" stroke-width="1.0"/>
    <line x1="-52" y1="3" x2="-52" y2="1" stroke="#5888a8" stroke-width="0.9"/>
    <!-- Caudal fin (small, forked) -->
    <path d="M-56,0 L-66,-9" stroke="#4070a0" stroke-width="2.6" stroke-linecap="round" fill="none"/>
    <path d="M-56,0 L-66, 9" stroke="#4070a0" stroke-width="2.6" stroke-linecap="round" fill="none"/>
    <path d="M-66,-9 Q-70,0 -66,9" fill="none" stroke="#4070a0" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- Fish 2 (background, lower) -->
  <g transform="translate(118,115) rotate(-4)" opacity="0.78">
    <ellipse cx="0" cy="0" rx="40" ry="5.5" fill="#b8c8d0"/>
    <ellipse cx="0" cy="-3" rx="37" ry="2.5" fill="#1c4060" opacity="0.80"/>
    <path d="M39,-0.5 L53,-1.5" stroke="#1a3848" stroke-width="2.0" stroke-linecap="round" fill="none"/>
    <path d="M39,1 L52,2" stroke="#1a3848" stroke-width="1.6" stroke-linecap="round" fill="none"/>
    <ellipse cx="37" cy="0" rx="4" ry="5.2" fill="#2c5068"/>
    <circle cx="39" cy="-2" r="2.0" fill="#101010"/>
    <path d="M-14,-5.5 Q-18,-10 -24,-11 Q-28,-10 -30,-7" fill="none" stroke="#4070a0" stroke-width="1.0"/>
    <line x1="-33" y1="-5" x2="-33" y2="-3" stroke="#5888a8" stroke-width="1.1"/>
    <line x1="-36" y1="-4" x2="-36" y2="-2" stroke="#5888a8" stroke-width="1.0"/>
    <line x1="-39" y1="-3" x2="-39" y2="-2" stroke="#5888a8" stroke-width="0.9"/>
    <path d="M-44,0 L-52,-7" stroke="#4070a0" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <path d="M-44,0 L-52, 7" stroke="#4070a0" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Fish 3 (upper right) -->
  <g transform="translate(405,65) rotate(-2)" opacity="0.58">
    <ellipse cx="0" cy="0" rx="34" ry="4.8" fill="#b8c8d0"/>
    <ellipse cx="0" cy="-3" rx="31" ry="2.0" fill="#1c4060" opacity="0.78"/>
    <path d="M33,-0.5 L46,-1.5" stroke="#1a3848" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <ellipse cx="32" cy="0" rx="3.5" ry="4.5" fill="#2c5068"/>
    <path d="M-38,0 L-45,-7" stroke="#4070a0" stroke-width="2.0" stroke-linecap="round" fill="none"/>
    <path d="M-38,0 L-45, 7" stroke="#4070a0" stroke-width="2.0" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Depth ruler (0–230 m) -->
  <line x1="478" y1="6" x2="478" y2="160" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="6"   x2="478" y2="6"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="9"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="55"  x2="478" y2="55"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="58"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">50</text>
  <line x1="474" y1="104" x2="478" y2="104" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="107" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">130</text>
  <line x1="474" y1="160" x2="478" y2="160" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="163" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">230</text>
  <text x="481" y="24" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">北太平洋冷溫帶開放水域・近表層洄游</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">0–230 m；極細長體・上下頜皆延伸成喙（診斷）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食浮游甲殼類・魚卵；秋刀魚科</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">北太平洋（台灣東北部秋冬季洄游）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
