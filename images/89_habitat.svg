<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea89" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1878b8"/>
      <stop offset="40%" stop-color="#0e5888"/>
      <stop offset="80%" stop-color="#063040"/>
      <stop offset="100%" stop-color="#031420"/>
    </linearGradient>
    <linearGradient id="rock89" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#505858"/>
      <stop offset="100%" stop-color="#202428"/>
    </linearGradient>
  </defs>

  <!-- Coastal reef water, somewhat turbid -->
  <rect width="500" height="195" fill="url(#sea89)" rx="6"/>

  <!-- Surface shimmer -->
  <path d="M0,8 Q80,5 165,8 Q250,11 335,8 Q415,5 500,8"
        fill="none" stroke="#58c8e8" stroke-width="1.3" opacity="0.52"/>

  <!-- Light shafts (slightly turbid coastal water) -->
  <line x1="155" y1="8" x2="128" y2="158" stroke="#c8eeff" stroke-width="12" opacity="0.055"/>
  <line x1="388" y1="8" x2="363" y2="158" stroke="#c8eeff" stroke-width="8"  opacity="0.040"/>

  <!-- Rocky reef bottom — prominent with algae (coastal reef feel) -->
  <path d="M0,152 Q42,136 92,146 Q142,156 192,135 Q242,114 298,135 Q350,155 402,135 Q448,116 498,130 L500,128 L500,195 L0,195 Z"
        fill="url(#rock89)"/>
  <!-- Large coastal boulders -->
  <ellipse cx="60"  cy="148" rx="30" ry="11" fill="#3c4048" opacity="0.76"/>
  <ellipse cx="192" cy="137" rx="28" ry="10" fill="#3c4048" opacity="0.72"/>
  <ellipse cx="328" cy="134" rx="26" ry="10" fill="#3c4048" opacity="0.68"/>
  <ellipse cx="468" cy="133" rx="22" ry="8"  fill="#3c4048" opacity="0.64"/>
  <!-- Rock crevice (grouper hides here) -->
  <path d="M148,148 Q180,136 212,148" fill="#0e1416" opacity="0.80"/>
  <!-- Algae (coastal reef) -->
  <ellipse cx="98"  cy="142" rx="20" ry="6" fill="#2a5828" opacity="0.58"/>
  <ellipse cx="240" cy="128" rx="18" ry="5.5" fill="#2a6030" opacity="0.54"/>
  <ellipse cx="382" cy="126" rx="17" ry="5.5" fill="#2a5828" opacity="0.50"/>
  <!-- Sandy patches (coastal mixed habitat) -->
  <ellipse cx="132" cy="154" rx="18" ry="4" fill="#786a50" opacity="0.38"/>

  <!-- Fish: 點帶石斑 Epinephelus coioides (Orange-spotted grouper) -->
  <!-- Epinephelidae: oval moderately deep grouper body;
       PALE brownish-grey background with MANY ORANGE/BROWN SPOTS scattered over body, head, fins;
       several dark saddle-like blotches along back;
       moderately large mouth; rounded caudal fin;
       coastal reef, mangroves, estuarine 1–100 m -->

  <!-- Main fish (foreground) -->
  <g transform="translate(240,105) rotate(-6)" opacity="0.93">
    <!-- Body: oval moderately deep grouper -->
    <ellipse cx="0" cy="0" rx="32" ry="18" fill="#c8b890"/>
    <!-- Pale brownish-grey base -->
    <ellipse cx="3" cy="2" rx="26" ry="14" fill="#d8c8a0" opacity="0.35"/>
    <!-- Dark saddle-like blotches along back -->
    <ellipse cx="-6"  cy="-14" rx="12" ry="5" fill="#504028" opacity="0.62"/>
    <ellipse cx="-22" cy="-12" rx="10" ry="4.5" fill="#504028" opacity="0.55"/>
    <ellipse cx="12"  cy="-15" rx="8"  ry="4"   fill="#504028" opacity="0.50"/>
    <!-- ORANGE SPOTS scattered over body (diagnostic! 點帶) -->
    <circle cx="8"   cy="-5" r="2.5" fill="#c87828" opacity="0.78"/>
    <circle cx="-2"  cy="-8" r="2.2" fill="#c87828" opacity="0.74"/>
    <circle cx="-12" cy="-5" r="2.5" fill="#c87828" opacity="0.72"/>
    <circle cx="-22" cy="-3" r="2.2" fill="#c87828" opacity="0.68"/>
    <circle cx="-30" cy="-1" r="2.0" fill="#c87828" opacity="0.65"/>
    <circle cx="18"  cy="-2" r="2.2" fill="#c87828" opacity="0.70"/>
    <circle cx="6"   cy="5"  r="2.5" fill="#c87828" opacity="0.68"/>
    <circle cx="-5"  cy="7"  r="2.2" fill="#c87828" opacity="0.64"/>
    <circle cx="-16" cy="6"  r="2.5" fill="#c87828" opacity="0.62"/>
    <circle cx="-25" cy="4"  r="2.0" fill="#c87828" opacity="0.58"/>
    <circle cx="16"  cy="7"  r="2.0" fill="#c87828" opacity="0.60"/>
    <circle cx="0"   cy="-1" r="2.0" fill="#c87828" opacity="0.58"/>
    <!-- Caudal peduncle -->
    <ellipse cx="-29" cy="0" rx="6" ry="14" fill="#a09060" opacity="0.82"/>
    <!-- Head: moderately large, slightly concave profile -->
    <ellipse cx="28" cy="0" rx="12" ry="16" fill="#a09060"/>
    <!-- Orange spots on head -->
    <circle cx="24" cy="-7"  r="2.0" fill="#c87828" opacity="0.68"/>
    <circle cx="30" cy="-4"  r="1.8" fill="#c87828" opacity="0.62"/>
    <circle cx="22" cy="4"   r="1.8" fill="#c87828" opacity="0.60"/>
    <!-- Large terminal mouth -->
    <path d="M39,-2 Q43,2 39,7" fill="none" stroke="#6a5030" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Eye: moderate -->
    <circle cx="30" cy="-6" r="4.5" fill="#181818"/>
    <circle cx="31" cy="-7" r="1.6" fill="#a08040" opacity="0.38"/>
    <!-- Long dorsal fin (spiny + soft) -->
    <path d="M13,-18 Q6,-27 0,-30 Q-6,-28 -13,-22 Q-19,-17 -23,-12"
          fill="none" stroke="#604820" stroke-width="1.5"/>
    <path d="M-23,-12 Q-27,-16 -30,-14 Q-30,-11 -30,-7" fill="none" stroke="#604820" stroke-width="1.3"/>
    <!-- Anal fin -->
    <path d="M-9,18 Q-16,25 -22,23 Q-28,20 -29,15"
          fill="none" stroke="#604820" stroke-width="1.3"/>
    <!-- Pectoral fin -->
    <path d="M22,9 Q34,19 40,11" fill="none" stroke="#786030" stroke-width="1.5" opacity="0.70"/>
    <!-- ROUNDED caudal fin (grouper typical) -->
    <path d="M-34,-16 Q-44,0 -34,16" fill="none" stroke="#604820" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M-33,-16 L-44,-19" stroke="#604820" stroke-width="2.0" stroke-linecap="round" fill="none" opacity="0.68"/>
    <path d="M-33, 16 L-44, 19" stroke="#604820" stroke-width="2.0" stroke-linecap="round" fill="none" opacity="0.68"/>
  </g>

  <!-- Fish 2 (background, near reef) -->
  <g transform="translate(116,128) rotate(-5)" opacity="0.78">
    <ellipse cx="0" cy="0" rx="25" ry="14" fill="#c8b890"/>
    <ellipse cx="-5" cy="-10" rx="10" ry="4" fill="#504028" opacity="0.55"/>
    <!-- Orange spots -->
    <circle cx="5"  cy="-4" r="2.0" fill="#c87828" opacity="0.72"/>
    <circle cx="-5" cy="-5" r="1.8" fill="#c87828" opacity="0.68"/>
    <circle cx="-14" cy="-3" r="2.0" fill="#c87828" opacity="0.65"/>
    <circle cx="3"  cy="4"  r="2.0" fill="#c87828" opacity="0.62"/>
    <circle cx="-8" cy="5"  r="1.8" fill="#c87828" opacity="0.58"/>
    <ellipse cx="21" cy="0" rx="9.5" ry="12" fill="#a09060"/>
    <circle cx="22" cy="-4" r="3.8" fill="#181818"/>
    <path d="M8,-14 Q3,-22 -2,-24 Q-7,-22 -12,-17 Q-16,-12 -18,-9" fill="none" stroke="#604820" stroke-width="1.3"/>
    <path d="M-26,0 L-35,-12" stroke="#604820" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-26,0 L-35, 12" stroke="#604820" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-34,-12 Q-40,0 -34,12" fill="none" stroke="#604820" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Depth ruler (0–100 m) -->
  <line x1="478" y1="8" x2="478" y2="155" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="8"   x2="478" y2="8"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="11"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="55"  x2="478" y2="55"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="58"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">35</text>
  <line x1="474" y1="104" x2="478" y2="104" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="107" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">65</text>
  <line x1="474" y1="155" x2="478" y2="155" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="158" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">100</text>
  <text x="481" y="25" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">沿岸礁區・河口・紅樹林潟湖</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">1–100 m；淡褐體・滿布橙色小點・鞍紋（診斷）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食小魚・甲殼類；性轉換（先雌後雄）</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度－西太平洋（台灣各沿岸・養殖重要種）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
