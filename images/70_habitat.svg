<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea70" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1090c8"/>
      <stop offset="40%" stop-color="#0868a0"/>
      <stop offset="100%" stop-color="#043860"/>
    </linearGradient>
    <linearGradient id="reef70" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#605848"/>
      <stop offset="100%" stop-color="#302820"/>
    </linearGradient>
  </defs>

  <!-- Tropical coral reef water -->
  <rect width="500" height="195" fill="url(#sea70)" rx="6"/>

  <!-- Surface shimmer -->
  <path d="M0,8 Q80,5 165,8 Q250,11 335,8 Q415,5 500,8"
        fill="none" stroke="#70d8f8" stroke-width="1.4" opacity="0.60"/>
  <path d="M0,18 Q90,13 185,18 Q280,23 370,18 Q440,13 500,18"
        fill="none" stroke="#58c0e0" stroke-width="1.0" opacity="0.46"/>

  <!-- Light shafts (clear tropical ocean) -->
  <line x1="200" y1="8" x2="170" y2="160" stroke="#d0f4ff" stroke-width="14" opacity="0.07"/>
  <line x1="400" y1="8" x2="375" y2="165" stroke="#d0f4ff" stroke-width="9"  opacity="0.05"/>

  <!-- Steep coral reef wall (left side, steep drop-off) -->
  <path d="M0,0 L0,195 Q30,185 40,160 Q42,130 38,100 Q35,60 50,30 Q55,15 40,0 Z"
        fill="url(#reef70)"/>
  <!-- Coral on reef wall -->
  <!-- Table coral -->
  <ellipse cx="35" cy="105" rx="22" ry="5" fill="#d07030" opacity="0.65"/>
  <line x1="35" y1="105" x2="35" y2="118" stroke="#c06020" stroke-width="2.5" opacity="0.65"/>
  <!-- Fan coral -->
  <ellipse cx="28" cy="75" rx="14" ry="18" fill="none" stroke="#d06820" stroke-width="1.0" opacity="0.55"/>
  <ellipse cx="28" cy="75" rx="10" ry="13" fill="none" stroke="#e08030" stroke-width="0.7" opacity="0.45"/>
  <!-- Branching coral -->
  <g stroke="#c85820" fill="none" stroke-width="0.9" opacity="0.70">
    <line x1="38" y1="140" x2="38" y2="122"/>
    <line x1="38" y1="132" x2="31" y2="122"/>
    <line x1="38" y1="129" x2="45" y2="118"/>
  </g>
  <!-- Encrusting coralline algae -->
  <path d="M0,155 Q25,148 42,155 Q40,165 0,168 Z" fill="#c08090" opacity="0.35"/>

  <!-- Fish: 黑體羽鰓笛鯛 (Macolor niger) — large dark-bodied snapper -->
  <!-- Adult: uniformly dark brown-black with white belly, lunate tail -->

  <!-- Main fish (foreground) -->
  <g transform="translate(270,105) rotate(-5)" opacity="0.92">
    <!-- Body: large oval snapper form -->
    <ellipse cx="0" cy="0" rx="30" ry="16" fill="#282020"/>
    <!-- Dark brownish-black coloration -->
    <ellipse cx="0" cy="-8" rx="25" ry="7" fill="#181010" opacity="0.55"/>
    <!-- Whitish belly (adults) -->
    <ellipse cx="4" cy="10" rx="22" ry="5" fill="#e0d8c8" opacity="0.25"/>
    <!-- Yellow-gold scale margins (subtle) -->
    <ellipse cx="0" cy="-2" rx="22" ry="10" fill="none" stroke="#a08840" stroke-width="0.6" opacity="0.25"/>
    <!-- High arched dorsal fin -->
    <path d="M-20,-16 Q-10,-26 0,-28 Q10,-26 18,-18" fill="none" stroke="#181010" stroke-width="1.5"/>
    <!-- Soft dorsal -->
    <path d="M18,-18 Q24,-22 28,-17" fill="none" stroke="#181010" stroke-width="1.3"/>
    <!-- Anal fin -->
    <path d="M-10,16 Q0,22 10,16" fill="none" stroke="#181010" stroke-width="1.3"/>
    <!-- Lunate / forked tail -->
    <path d="M-30,0 L-44,-16" stroke="#181010" stroke-width="4.0" stroke-linecap="round" fill="none"/>
    <path d="M-30,0 L-44, 16" stroke="#181010" stroke-width="4.0" stroke-linecap="round" fill="none"/>
    <!-- Large pectoral fin -->
    <path d="M18,10 Q28,20 32,12" fill="none" stroke="#181010" stroke-width="1.3" opacity="0.80"/>
    <!-- Eye (large, yellowish iris typical of snappers) -->
    <circle cx="25" cy="-3" r="4" fill="#181818"/>
    <circle cx="26" cy="-4" r="1.5" fill="#c0a040" opacity="0.50"/>
  </g>

  <!-- Fish 2 (mid background) -->
  <g transform="translate(390,130) rotate(-4)" opacity="0.78">
    <ellipse cx="0" cy="0" rx="24" ry="13" fill="#282020"/>
    <ellipse cx="0" cy="-6" rx="20" ry="5.5" fill="#181010" opacity="0.50"/>
    <path d="M-14,-13 Q-6,-22 4,-14" fill="none" stroke="#181010" stroke-width="1.3"/>
    <path d="M-24,0 L-34,-13" stroke="#181010" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M-24,0 L-34, 13" stroke="#181010" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <circle cx="20" cy="-2" r="3.2" fill="#181818"/>
  </g>

  <!-- Fish 3 (near wall) -->
  <g transform="translate(140,150) rotate(-3)" opacity="0.70">
    <ellipse cx="0" cy="0" rx="20" ry="11" fill="#282020"/>
    <path d="M-20,0 L-28,-10" stroke="#181010" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-20,0 L-28, 10" stroke="#181010" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <circle cx="16" cy="-2" r="2.6" fill="#181818"/>
  </g>

  <!-- Depth ruler -->
  <line x1="478" y1="8" x2="478" y2="168" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="8"   x2="478" y2="8"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="11"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="62"  x2="478" y2="62"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="65"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">30</text>
  <line x1="474" y1="116" x2="478" y2="116" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="119" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">60</text>
  <line x1="474" y1="168" x2="478" y2="168" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="171" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">90</text>
  <text x="481" y="25" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="82" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">珊瑚礁向海陡坡區</text>
  <text x="82" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">5–90 m；成魚群聚活動</text>
  <text x="82" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">深色大型笛鯛；食魚類・甲殼類</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度－西太平洋（台灣東部・南部・離島礁區）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
