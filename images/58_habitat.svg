<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sky58" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2880c8"/>
      <stop offset="100%" stop-color="#1868b0"/>
    </linearGradient>
    <linearGradient id="water58" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2888a8"/>
      <stop offset="50%" stop-color="#186888"/>
      <stop offset="100%" stop-color="#0c3848"/>
    </linearGradient>
    <linearGradient id="sand58" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8a880"/>
      <stop offset="100%" stop-color="#706858"/>
    </linearGradient>
  </defs>

  <!-- Lagoon / coastal, sky visible, 1–30 m -->
  <rect width="500" height="195" fill="url(#sky58)" rx="6"/>

  <!-- Mangrove / coastal vegetation (left) -->
  <path d="M0,0 L0,46 Q20,44 38,46" fill="#507840" opacity="0.80"/>
  <ellipse cx="20" cy="36" rx="22" ry="10" fill="#3a6028" opacity="0.72"/>
  <ellipse cx="38" cy="40" rx="16" ry="7"  fill="#3a6028" opacity="0.62"/>
  <!-- Right bank -->
  <path d="M500,0 L500,46 Q482,44 462,46" fill="#507840" opacity="0.78"/>
  <ellipse cx="482" cy="36" rx="22" ry="10" fill="#3a6028" opacity="0.70"/>
  <!-- Sun hint -->
  <circle cx="440" cy="18" r="10" fill="#f8e880" opacity="0.45"/>
  <circle cx="440" cy="18" r="6"  fill="#fff8d0" opacity="0.55"/>

  <!-- Lagoon water -->
  <rect x="0" y="46" width="500" height="149" fill="url(#water58)"/>

  <!-- Water surface ripples -->
  <path d="M0,50 Q120,46 250,50 Q380,54 500,50" fill="none" stroke="#80d0e8" stroke-width="1.0" opacity="0.45"/>
  <path d="M0,60 Q130,55 265,60 Q395,65 500,60" fill="none" stroke="#60b8d0" stroke-width="0.8" opacity="0.32"/>

  <!-- Sandy bottom -->
  <path d="M0,165 Q80,160 160,165 Q240,170 320,162 Q400,156 480,162 L500,162 L500,195 L0,195 Z"
        fill="url(#sand58)"/>
  <path d="M20,170 Q70,168 120,170" fill="none" stroke="#808868" stroke-width="0.6" opacity="0.38"/>
  <path d="M165,172 Q215,170 265,172" fill="none" stroke="#808868" stroke-width="0.6" opacity="0.36"/>

  <!-- Fish: 虱目魚 Chanos chanos (Milkfish) -->
  <!-- Chanidae: VERY STREAMLINED torpedo; iridescent silver-grey;
       DEEPLY FORKED tail (large, powerful); NO TEETH (small terminal mouth);
       false caudal keels; versatile habitat: lagoon/mangrove/reef/aquaculture;
       1–30 m -->

  <!-- Main fish (large foreground, streamlined) -->
  <g transform="translate(244,105) rotate(-6)" opacity="0.93">
    <!-- Body: very streamlined torpedo, fusiform -->
    <ellipse cx="0" cy="0" rx="48" ry="11" fill="#b8c8c8"/>
    <!-- Dark blue-green back (iridescent) -->
    <ellipse cx="2" cy="-6" rx="42" ry="5" fill="#1c5050" opacity="0.72"/>
    <!-- Brilliant silver flanks -->
    <ellipse cx="4" cy="2" rx="40" ry="6" fill="#e0ece8" opacity="0.45"/>
    <!-- Silver iridescent sheen stripe -->
    <path d="M42,0 Q18,-3 -10,-2 Q-34,-1 -44,0" fill="none" stroke="#d0e8e0" stroke-width="3.5" stroke-linecap="round" opacity="0.30"/>
    <!-- Caudal peduncle (slender, with slight keel) -->
    <ellipse cx="-43" cy="0" rx="6" ry="7.5" fill="#90b0b0" opacity="0.82"/>
    <!-- Caudal keels hint -->
    <line x1="-37" y1="-2.5" x2="-48" y2="-2.5" stroke="#708898" stroke-width="0.9" opacity="0.50"/>
    <line x1="-37" y1=" 2.5" x2="-48" y2=" 2.5" stroke="#708898" stroke-width="0.9" opacity="0.50"/>
    <!-- Head: pointed (herring-like) -->
    <ellipse cx="45" cy="0" rx="12" ry="11" fill="#90b0b0"/>
    <!-- SMALL TERMINAL MOUTH — NO TEETH (filter feeder) -->
    <path d="M56,0 Q57,1 56,3" fill="none" stroke="#607880" stroke-width="1.0" stroke-linecap="round"/>
    <!-- Eye: moderate -->
    <circle cx="47" cy="-3" r="3.5" fill="#181818"/>
    <circle cx="48" cy="-4" r="1.2" fill="#7090a0" opacity="0.38"/>
    <!-- Single dorsal fin (mid-back) -->
    <path d="M14,-11 Q6,-21 -1,-23 Q-6,-21 -10,-15 Q-12,-10 -13,-8"
          fill="none" stroke="#304858" stroke-width="1.3"/>
    <!-- Anal fin (small) -->
    <path d="M-22,11 Q-26,15 -29,13 Q-30,10 -31,8" fill="none" stroke="#304858" stroke-width="1.2"/>
    <!-- Pectoral fin (fan-shaped) -->
    <path d="M40,6 Q50,14 52,6" fill="none" stroke="#405868" stroke-width="1.3" opacity="0.68"/>
    <!-- Pelvic fin -->
    <path d="M8,9 Q10,15 13,11" fill="none" stroke="#304858" stroke-width="1.1" opacity="0.62"/>
    <!-- DEEPLY FORKED tail (large, powerful — diagnostic!) -->
    <path d="M-49,0 L-63,-15" stroke="#304858" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M-49,0 L-63, 15" stroke="#304858" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M-63,-15 Q-67,0 -63,15" fill="none" stroke="#304858" stroke-width="2.8" stroke-linecap="round"/>
  </g>

  <!-- Fish 2 (school) -->
  <g transform="translate(130,128) rotate(-4)" opacity="0.82">
    <ellipse cx="0" cy="0" rx="38" ry="9" fill="#b8c8c8"/>
    <ellipse cx="2" cy="-5" rx="33" ry="4" fill="#1c5050" opacity="0.68"/>
    <ellipse cx="-34" cy="0" rx="5" ry="6" fill="#90b0b0" opacity="0.80"/>
    <ellipse cx="35" cy="0" rx="9.5" ry="9" fill="#90b0b0"/>
    <circle cx="37" cy="-2.5" r="2.8" fill="#181818"/>
    <path d="M10,-9 Q3,-17 -3,-19 Q-7,-17 -10,-12 Q-12,-8 -12,-6" fill="none" stroke="#304858" stroke-width="1.1"/>
    <path d="M-39,0 L-51,-12" stroke="#304858" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-39,0 L-51, 12" stroke="#304858" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-51,-12 Q-55,0 -51,12" fill="none" stroke="#304858" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- Fish 3 (near surface) -->
  <g transform="translate(400,70) rotate(-8)" opacity="0.72">
    <ellipse cx="0" cy="0" rx="30" ry="7" fill="#b8c8c8"/>
    <ellipse cx="2" cy="-4" rx="26" ry="3.5" fill="#1c5050" opacity="0.65"/>
    <ellipse cx="27" cy="0" rx="7.5" ry="7" fill="#90b0b0"/>
    <circle cx="28" cy="-2" r="2.4" fill="#181818"/>
    <path d="M-30,0 L-39,-10" stroke="#304858" stroke-width="3.0" stroke-linecap="round" fill="none"/>
    <path d="M-30,0 L-39, 10" stroke="#304858" stroke-width="3.0" stroke-linecap="round" fill="none"/>
    <path d="M-39,-10 Q-43,0 -39,10" fill="none" stroke="#304858" stroke-width="1.9" stroke-linecap="round"/>
  </g>

  <!-- Depth ruler (0–30 m) -->
  <line x1="478" y1="46" x2="478" y2="165" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="46"  x2="478" y2="46"  stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="49"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="106" x2="478" y2="106" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="109" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">15</text>
  <line x1="474" y1="165" x2="478" y2="165" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="168" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">30</text>
  <text x="481" y="62" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="48" y="18" fill="#d0f0ff" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">潟湖・紅樹林・珊瑚礁砂底</text>
  <text x="48" y="32" fill="#f0e860" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">1–30 m；極流線形・強力深叉尾（診斷）</text>
  <text x="48" y="45" fill="#c0e8d0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食藻類・浮游生物；廣鹽性；重要養殖魚</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度－太平洋（台灣西南沿岸・養殖重要種）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
