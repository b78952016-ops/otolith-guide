<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea92" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1878b8"/>
      <stop offset="40%" stop-color="#0e5888"/>
      <stop offset="80%" stop-color="#062840"/>
      <stop offset="100%" stop-color="#031018"/>
    </linearGradient>
    <linearGradient id="rock92" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#485060"/>
      <stop offset="100%" stop-color="#202228"/>
    </linearGradient>
  </defs>

  <!-- Tropical rocky reef + wave environment -->
  <rect width="500" height="195" fill="url(#sea92)" rx="6"/>

  <!-- Surface with wave/surge feel -->
  <path d="M0,7 Q60,3 120,7 Q180,11 240,6 Q300,1 360,6 Q420,11 500,7"
        fill="none" stroke="#80d8f8" stroke-width="1.8" opacity="0.62"/>
  <path d="M0,17 Q70,12 145,18 Q220,24 295,17 Q370,10 445,17 Q470,20 500,18"
        fill="none" stroke="#58c0e0" stroke-width="1.2" opacity="0.45"/>
  <!-- Wave crest hints -->
  <path d="M80,8 Q95,5 110,8" fill="none" stroke="#c0f0ff" stroke-width="2.0" opacity="0.35"/>
  <path d="M280,6 Q295,3 310,6" fill="none" stroke="#c0f0ff" stroke-width="2.0" opacity="0.35"/>

  <!-- Light shafts -->
  <line x1="150" y1="7" x2="118" y2="155" stroke="#d0f0ff" stroke-width="12" opacity="0.06"/>
  <line x1="390" y1="7" x2="362" y2="158" stroke="#d0f0ff" stroke-width="8"  opacity="0.04"/>

  <!-- Rocky reef bottom with prominent rocks and algae -->
  <path d="M0,155 Q35,138 80,148 Q125,158 170,138 Q215,118 265,138 Q310,158 360,138 Q408,118 455,138 Q478,148 500,143 L500,195 L0,195 Z"
        fill="url(#rock92)"/>
  <!-- Large rocks / boulders -->
  <ellipse cx="60"  cy="150" rx="30" ry="11" fill="#383840" opacity="0.72"/>
  <ellipse cx="190" cy="140" rx="26" ry="9"  fill="#383840" opacity="0.68"/>
  <ellipse cx="320" cy="140" rx="24" ry="8.5" fill="#383840" opacity="0.65"/>
  <ellipse cx="455" cy="142" rx="20" ry="7.5" fill="#383840" opacity="0.62"/>
  <!-- Algae / urchins on reef surface -->
  <ellipse cx="90"  cy="146" rx="20" ry="6" fill="#2a5830" opacity="0.65"/>
  <ellipse cx="230" cy="136" rx="18" ry="5.5" fill="#285830" opacity="0.60"/>
  <ellipse cx="370" cy="135" rx="16" ry="5.5" fill="#2a5830" opacity="0.57"/>
  <!-- Algae tufts -->
  <line x1="110" y1="146" x2="105" y2="130" stroke="#2a7030" stroke-width="1.5" opacity="0.55"/>
  <line x1="118" y1="146" x2="116" y2="128" stroke="#2a7030" stroke-width="1.4" opacity="0.52"/>
  <line x1="355" y1="137" x2="350" y2="122" stroke="#2a7030" stroke-width="1.5" opacity="0.50"/>

  <!-- Fish: 褐臭肚魚 Siganus fuscescens (Mottled spinefoot / brown rabbitfish) -->
  <!-- Siganidae (rabbitfish); oval, slightly deep body;
       DARK BROWNISH with MANY small pale/white spots/mottles in complex pattern;
       BLUNT RABBIT-LIKE SMALL MOUTH (hence 臭肚/rabbitfish name);
       VENOMOUS SPINES in dorsal, pelvic, and anal fins (handle carefully!);
       bright yellow fins;
       rocky reef + algae habitat -->

  <!-- Main fish (foreground) -->
  <g transform="translate(240,107) rotate(-6)" opacity="0.93">
    <!-- Body: oval, moderately deep, dark brownish -->
    <ellipse cx="0" cy="0" rx="30" ry="16" fill="#504030"/>
    <!-- Mottled dark-brown base with complex texture -->
    <ellipse cx="-2" cy="-8" rx="25" ry="7" fill="#382810" opacity="0.60"/>
    <!-- MANY pale spots (diagnostic mottled pattern) -->
    <circle cx="5"   cy="-4" r="2.2" fill="#d0b878" opacity="0.55"/>
    <circle cx="-5"  cy="-6" r="2.0" fill="#d0b878" opacity="0.52"/>
    <circle cx="-14" cy="-3" r="2.2" fill="#d0b878" opacity="0.50"/>
    <circle cx="-22" cy="-1" r="2.0" fill="#d0b878" opacity="0.48"/>
    <circle cx="14"  cy="0"  r="2.0" fill="#d0b878" opacity="0.50"/>
    <circle cx="4"   cy="5"  r="2.2" fill="#d0b878" opacity="0.48"/>
    <circle cx="-8"  cy="6"  r="2.0" fill="#d0b878" opacity="0.45"/>
    <circle cx="-18" cy="5"  r="2.0" fill="#d0b878" opacity="0.42"/>
    <circle cx="-26" cy="3"  r="1.8" fill="#d0b878" opacity="0.40"/>
    <circle cx="18"  cy="-5" r="1.8" fill="#d0b878" opacity="0.45"/>
    <circle cx="10"  cy="8"  r="1.8" fill="#d0b878" opacity="0.40"/>
    <!-- Caudal peduncle -->
    <ellipse cx="-28" cy="0" rx="5" ry="12" fill="#483820" opacity="0.78"/>
    <!-- Head: small, blunt, rabbit-like -->
    <ellipse cx="26" cy="0" rx="11" ry="14" fill="#483820"/>
    <!-- Blunt rabbit-like small mouth (slightly inferior) -->
    <path d="M36,2 Q38,5 35,8" fill="none" stroke="#302010" stroke-width="1.0" stroke-linecap="round"/>
    <!-- Eye: large-ish -->
    <circle cx="28" cy="-4" r="4.5" fill="#181818"/>
    <circle cx="29" cy="-5" r="1.5" fill="#807050" opacity="0.40"/>
    <!-- Dorsal fin: spiny (VENOMOUS!), yellowish -->
    <path d="M12,-16 Q6,-26 0,-28 Q-6,-26 -12,-21 Q-18,-16 -22,-12"
          fill="none" stroke="#c8a820" stroke-width="1.4"/>
    <!-- Soft dorsal continuation -->
    <path d="M-22,-12 Q-26,-16 -28,-14 Q-29,-11 -29,-8" fill="none" stroke="#c8a820" stroke-width="1.3"/>
    <!-- Anal fin (venomous spines) -->
    <path d="M-8,16 Q-14,22 -20,20 Q-26,18 -28,13" fill="none" stroke="#c8a820" stroke-width="1.2"/>
    <!-- Pectoral fin -->
    <path d="M20,8 Q30,16 34,8" fill="none" stroke="#c8a820" stroke-width="1.3" opacity="0.72"/>
    <!-- Caudal fin (forked, yellowish) -->
    <path d="M-32,0 L-45,-14" stroke="#c8a820" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-32,0 L-45, 14" stroke="#c8a820" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M-45,-14 Q-50,0 -45,14" fill="none" stroke="#c8a820" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- Fish 2 (background) -->
  <g transform="translate(120,125) rotate(-5)" opacity="0.80">
    <ellipse cx="0" cy="0" rx="24" ry="13" fill="#504030"/>
    <ellipse cx="-2" cy="-7" rx="20" ry="6" fill="#382810" opacity="0.55"/>
    <!-- Spots -->
    <circle cx="4"  cy="-3" r="1.8" fill="#d0b878" opacity="0.50"/>
    <circle cx="-5" cy="-4" r="1.7" fill="#d0b878" opacity="0.47"/>
    <circle cx="-13" cy="-2" r="1.8" fill="#d0b878" opacity="0.44"/>
    <circle cx="10" cy="2"  r="1.7" fill="#d0b878" opacity="0.45"/>
    <circle cx="-1" cy="5"  r="1.7" fill="#d0b878" opacity="0.42"/>
    <ellipse cx="21" cy="0" rx="9"  ry="11" fill="#483820"/>
    <circle cx="22" cy="-3" r="3.8" fill="#181818"/>
    <path d="M8,-13 Q3,-21 -2,-22 Q-7,-20 -11,-17 Q-15,-13 -17,-10" fill="none" stroke="#c8a820" stroke-width="1.3"/>
    <path d="M-24,0 L-34,-11" stroke="#c8a820" stroke-width="3.0" stroke-linecap="round" fill="none"/>
    <path d="M-24,0 L-34, 11" stroke="#c8a820" stroke-width="3.0" stroke-linecap="round" fill="none"/>
    <path d="M-34,-11 Q-38,0 -34,11" fill="none" stroke="#c8a820" stroke-width="1.9" stroke-linecap="round"/>
  </g>

  <!-- Fish 3 (right, near algae-covered rock) -->
  <g transform="translate(400,125) rotate(-4)" opacity="0.65">
    <ellipse cx="0" cy="0" rx="20" ry="11" fill="#504030"/>
    <!-- Spots -->
    <circle cx="3"  cy="-2" r="1.5" fill="#d0b878" opacity="0.48"/>
    <circle cx="-5" cy="-3" r="1.4" fill="#d0b878" opacity="0.44"/>
    <circle cx="-12" cy="-1" r="1.5" fill="#d0b878" opacity="0.42"/>
    <ellipse cx="17" cy="0" rx="7.5" ry="9" fill="#483820"/>
    <circle cx="18" cy="-3" r="3.2" fill="#181818"/>
    <path d="M-20,0 L-29,-10" stroke="#c8a820" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-20,0 L-29, 10" stroke="#c8a820" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Depth ruler (0–50 m) -->
  <line x1="478" y1="7" x2="478" y2="157" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="7"   x2="478" y2="7"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="10"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="57"  x2="478" y2="57"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="60"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">15</text>
  <line x1="474" y1="107" x2="478" y2="107" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="110" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">30</text>
  <line x1="474" y1="157" x2="478" y2="157" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="160" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">50</text>
  <text x="481" y="24" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">岩礁藻床區・礁石縫隙</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">0–50 m；褐色多白斑・毒棘・兔嘴（診斷）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食藻類・海草；腹鰭具毒棘；臭肚魚科</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度－西太平洋（台灣全島礁區）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
