<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea48" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1870b8"/>
      <stop offset="35%" stop-color="#0e5090"/>
      <stop offset="75%" stop-color="#062038"/>
      <stop offset="100%" stop-color="#030e1c"/>
    </linearGradient>
  </defs>

  <!-- Near-shore pelagic, 1–200 m -->
  <rect width="500" height="195" fill="url(#sea48)" rx="6"/>

  <!-- Surface shimmer -->
  <path d="M0,7 Q80,4 165,7 Q250,10 335,7 Q415,4 500,7"
        fill="none" stroke="#60c8e0" stroke-width="1.5" opacity="0.55"/>
  <path d="M0,17 Q90,13 185,17 Q280,21 370,17 Q445,13 500,17"
        fill="none" stroke="#48b0c8" stroke-width="1.0" opacity="0.40"/>

  <!-- Light shafts -->
  <line x1="160" y1="7" x2="128" y2="158" stroke="#c0e0ff" stroke-width="12" opacity="0.055"/>
  <line x1="380" y1="7" x2="352" y2="155" stroke="#c0e0ff" stroke-width="8"  opacity="0.04"/>

  <!-- Fish: 藍圓鰺 Decapterus maruadsi (Round scad / Blue mackerel scad) -->
  <!-- Carangidae: fusiform/cylindrical body; iridescent blue-green back; silver sides;
       BLACK OPERCLE SPOT (rear of gill cover — diagnostic!);
       LATERAL LINE SCUTES near tail (hard keel scales);
       ONE FINLET after 2nd dorsal AND after anal fin;
       moderately forked caudal; schooling 1–200 m -->

  <!-- Main fish (foreground) -->
  <g transform="translate(242,100) rotate(-5)" opacity="0.93">
    <!-- Body: fusiform, slightly more cylindrical than caranx -->
    <ellipse cx="0" cy="0" rx="34" ry="11" fill="#b0c4c0"/>
    <!-- Blue-green back -->
    <ellipse cx="2" cy="-6" rx="28" ry="5.5" fill="#1a4840" opacity="0.78"/>
    <!-- Silver flanks -->
    <ellipse cx="3" cy="2" rx="26" ry="6" fill="#e0ecf0" opacity="0.42"/>
    <!-- Caudal peduncle (narrow, with scutes) -->
    <ellipse cx="-29" cy="0" rx="6" ry="8" fill="#90a8a8" opacity="0.82"/>
    <!-- SCUTES on straight lateral line near tail (hard keeled scales) -->
    <path d="M-20,-3 Q-25,-4 -29,-4" fill="none" stroke="#708090" stroke-width="2.2" stroke-linecap="round" opacity="0.70"/>
    <circle cx="-22" cy="-3.5" r="1.0" fill="#708090" opacity="0.60"/>
    <circle cx="-25" cy="-3.8" r="1.0" fill="#708090" opacity="0.58"/>
    <circle cx="-28" cy="-4.0" r="1.0" fill="#708090" opacity="0.55"/>
    <!-- Head -->
    <ellipse cx="30" cy="0" rx="10" ry="11" fill="#90a8a8"/>
    <!-- BLACK OPERCLE SPOT (rear of gill cover — diagnostic!) -->
    <circle cx="20" cy="-7" r="2.5" fill="#101010" opacity="0.88"/>
    <!-- Small terminal mouth -->
    <path d="M39,-1 Q42,1 39,4" fill="none" stroke="#4a6070" stroke-width="1.0" stroke-linecap="round"/>
    <!-- Eye: moderate -->
    <circle cx="31" cy="-4" r="3.5" fill="#181818"/>
    <circle cx="32" cy="-5" r="1.2" fill="#708898" opacity="0.38"/>
    <!-- First dorsal (spiny) -->
    <path d="M18,-11 Q10,-20 3,-22 Q-3,-20 -8,-15 Q-10,-11 -11,-9"
          fill="none" stroke="#2a4848" stroke-width="1.2"/>
    <!-- Second dorsal (soft, smaller) -->
    <path d="M-11,-9 Q-16,-13 -20,-11 Q-22,-9 -23,-7" fill="none" stroke="#2a4848" stroke-width="1.1"/>
    <!-- SINGLE FINLET after 2nd dorsal (diagnostic for Decapterus) -->
    <line x1="-25" y1="-7" x2="-26" y2="-11" stroke="#2a4848" stroke-width="1.6" stroke-linecap="round"/>
    <!-- Anal fin -->
    <path d="M-11,9 Q-16,13 -20,11 Q-22,9 -23,7" fill="none" stroke="#2a4848" stroke-width="1.1"/>
    <!-- SINGLE FINLET after anal fin -->
    <line x1="-25" y1="7" x2="-26" y2="11" stroke="#2a4848" stroke-width="1.6" stroke-linecap="round"/>
    <!-- Pectoral fin (fan) -->
    <path d="M22,6 Q30,12 32,6" fill="none" stroke="#3a5858" stroke-width="1.2" opacity="0.68"/>
    <!-- Moderately forked caudal fin -->
    <path d="M-35,0 L-46,-19" stroke="#2a4848" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M-35,0 L-46, 19" stroke="#2a4848" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M-46,-19 Q-38,0 -46,19" fill="none" stroke="#2a4848" stroke-width="2.0" stroke-linecap="round"/>
  </g>

  <!-- Fish 2 (school) -->
  <g transform="translate(130,122) rotate(-4)" opacity="0.82">
    <ellipse cx="0" cy="0" rx="27" ry="9" fill="#b0c4c0"/>
    <ellipse cx="2" cy="-5" rx="22" ry="4.5" fill="#1a4840" opacity="0.75"/>
    <!-- opercle spot -->
    <circle cx="16" cy="-6" r="2.0" fill="#101010" opacity="0.82"/>
    <ellipse cx="-23" cy="0" rx="5" ry="6.5" fill="#90a8a8" opacity="0.80"/>
    <!-- Scutes -->
    <circle cx="-16" cy="-3" r="0.8" fill="#708090" opacity="0.55"/>
    <circle cx="-19" cy="-3.2" r="0.8" fill="#708090" opacity="0.52"/>
    <ellipse cx="24" cy="0" rx="8" ry="9" fill="#90a8a8"/>
    <circle cx="25" cy="-3" r="2.8" fill="#181818"/>
    <path d="M14,-9 Q7,-17 1,-18 Q-3,-17 -7,-12 Q-9,-9 -9,-7" fill="none" stroke="#2a4848" stroke-width="1.0"/>
    <!-- Finlet -->
    <line x1="-20" y1="-6" x2="-21" y2="-10" stroke="#2a4848" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-20" y1=" 6" x2="-21" y2=" 10" stroke="#2a4848" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M-28,0 L-37,-16" stroke="#2a4848" stroke-width="2.6" stroke-linecap="round" fill="none"/>
    <path d="M-28,0 L-37, 16" stroke="#2a4848" stroke-width="2.6" stroke-linecap="round" fill="none"/>
    <path d="M-37,-16 Q-31,0 -37,16" fill="none" stroke="#2a4848" stroke-width="1.7" stroke-linecap="round"/>
  </g>

  <!-- Fish 3 (school) -->
  <g transform="translate(370,112) rotate(-6)" opacity="0.74">
    <ellipse cx="0" cy="0" rx="22" ry="7.5" fill="#b0c4c0"/>
    <ellipse cx="2" cy="-4" rx="18" ry="3.8" fill="#1a4840" opacity="0.72"/>
    <circle cx="13" cy="-5" r="1.6" fill="#101010" opacity="0.80"/>
    <ellipse cx="19" cy="0" rx="6.5" ry="7.5" fill="#90a8a8"/>
    <circle cx="20" cy="-2.5" r="2.4" fill="#181818"/>
    <line x1="-16" y1="-5" x2="-17" y2="-9" stroke="#2a4848" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M-22,0 L-30,-13" stroke="#2a4848" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <path d="M-22,0 L-30, 13" stroke="#2a4848" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Fish 4 (school, deeper) -->
  <g transform="translate(290,142) rotate(-3)" opacity="0.62">
    <ellipse cx="0" cy="0" rx="18" ry="6" fill="#b0c4c0"/>
    <ellipse cx="16" cy="0" rx="5.5" ry="6" fill="#90a8a8"/>
    <circle cx="17" cy="-2" r="2.0" fill="#181818"/>
    <path d="M-18,0 L-25,-11" stroke="#2a4848" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M-18,0 L-25, 11" stroke="#2a4848" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Depth ruler (0–200 m) -->
  <line x1="478" y1="7" x2="478" y2="158" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="7"   x2="478" y2="7"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="10"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="57"  x2="478" y2="57"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="60"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">60</text>
  <line x1="474" y1="108" x2="478" y2="108" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="111" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">130</text>
  <line x1="474" y1="158" x2="478" y2="158" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="161" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">200</text>
  <text x="481" y="23" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">近岸中上層・群游</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">1–200 m；鰓蓋後黑斑＋尾部稜鱗（診斷）</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">食浮游動物；大群聚集</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">西太平洋（台灣各沿岸・重要圍網漁業資源）</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
