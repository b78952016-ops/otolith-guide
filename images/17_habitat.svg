<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sea17" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5888"/>
      <stop offset="40%" stop-color="#0e3860"/>
      <stop offset="100%" stop-color="#081828"/>
    </linearGradient>
    <linearGradient id="reef17" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#504030"/>
      <stop offset="100%" stop-color="#282010"/>
    </linearGradient>
  </defs>

  <!-- Reef + open water -->
  <rect width="500" height="195" fill="url(#sea17)" rx="6"/>

  <!-- Surface shimmer -->
  <path d="M0,7 Q80,4 165,7 Q250,10 335,7 Q415,4 500,7"
        fill="none" stroke="#4ad0f0" stroke-width="1.5" opacity="0.55"/>
  <path d="M0,17 Q90,12 185,17 Q280,22 370,17 Q440,12 500,17"
        fill="none" stroke="#38b8d8" stroke-width="1.0" opacity="0.40"/>

  <!-- Light shafts from surface -->
  <line x1="200" y1="0" x2="170" y2="140" stroke="#b8e0f8" stroke-width="8" opacity="0.04"/>
  <line x1="300" y1="0" x2="270" y2="145" stroke="#b8e0f8" stroke-width="6" opacity="0.03"/>

  <!-- Marine snow at depth -->
  <circle cx="300" cy="100" r="0.9" fill="#ffffff" opacity="0.16"/>
  <circle cx="380" cy="130" r="0.8" fill="#ffffff" opacity="0.14"/>
  <circle cx="440" cy="80"  r="1.0" fill="#ffffff" opacity="0.17"/>

  <!-- Reef wall (left side) -->
  <path d="M0,80 Q25,60 58,65 Q88,70 115,60 Q140,50 162,62 L162,195 L0,195 Z"
        fill="url(#reef17)"/>
  <path d="M30,65 Q65,55 100,60 Q130,64 155,55"
        fill="none" stroke="#706050" stroke-width="2" opacity="0.50"/>
  <line x1="65"  y1="65" x2="72"  y2="88" stroke="#201008" stroke-width="0.9" opacity="0.6"/>
  <line x1="118" y1="62" x2="125" y2="85" stroke="#201008" stroke-width="0.8" opacity="0.55"/>

  <!-- Coral on reef -->
  <g stroke="#c06020" fill="none" stroke-width="1.1" opacity="0.80">
    <line x1="80"  y1="63" x2="80"  y2="42"/>
    <line x1="80"  y1="52" x2="70"  y2="40"/>
    <line x1="80"  y1="48" x2="90"  y2="37"/>
    <circle cx="70"  cy="40" r="1.5" fill="#e08040"/>
    <circle cx="90"  cy="37" r="1.5" fill="#e08040"/>
    <circle cx="80"  cy="42" r="1.3" fill="#e08040"/>
  </g>
  <ellipse cx="40" cy="70" rx="14" ry="6" fill="#6a4820" opacity="0.70"/>

  <!-- Fish 1: 藍鰭鰺 (Bluefin trevally, Caranx melampygus) — streamlined carangid -->
  <g transform="translate(310,90) rotate(-6)" opacity="0.91">
    <!-- Body: streamlined carangid shape -->
    <ellipse cx="0" cy="0" rx="30" ry="10" fill="#3858a0"/>
    <!-- Silver-blue sides -->
    <ellipse cx="2" cy="2" rx="24" ry="6" fill="#6888c8" opacity="0.45"/>
    <!-- Bright blue back highlight -->
    <ellipse cx="0" cy="-6" rx="22" ry="4" fill="#2848a0" opacity="0.60"/>
    <!-- Scutes (lateral line keels, characteristic of Caranx) -->
    <path d="M-10,0 Q0,1 10,0" fill="none" stroke="#d0e0f0" stroke-width="0.8" opacity="0.50"/>
    <!-- First dorsal fin (short, spiny) -->
    <path d="M-2,-10 Q3,-17 8,-10" fill="none" stroke="#283888" stroke-width="1.4"/>
    <!-- Second dorsal fin -->
    <path d="M8,-10 Q16,-15 22,-10" fill="none" stroke="#283888" stroke-width="1.3"/>
    <!-- Deeply forked tail (sickle-shaped) -->
    <path d="M-30,0 L-44,-16" stroke="#283888" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M-30,0 L-44, 16" stroke="#283888" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <!-- Pectoral fin -->
    <path d="M12,7 Q20,14 26,9" fill="none" stroke="#283888" stroke-width="1.3" opacity="0.8"/>
    <!-- Anal fin -->
    <path d="M-6,10 Q2,16 10,10" fill="none" stroke="#283888" stroke-width="1.2"/>
    <!-- Eye -->
    <circle cx="26" cy="-1" r="3.5" fill="#181018"/>
    <circle cx="27" cy="-2" r="1.1" fill="#8898c8" opacity="0.5"/>
  </g>

  <!-- Fish 2: background, smaller -->
  <g transform="translate(200,122) rotate(-4)" opacity="0.78">
    <ellipse cx="0" cy="0" rx="22" ry="7.5" fill="#3858a0"/>
    <ellipse cx="1" cy="1.5" rx="18" ry="4" fill="#6888c8" opacity="0.40"/>
    <path d="M5,-7.5 Q12,-12 17,-7.5" fill="none" stroke="#283888" stroke-width="1.2"/>
    <path d="M-22,0 L-32,-12" stroke="#283888" stroke-width="2.7" stroke-linecap="round" fill="none"/>
    <path d="M-22,0 L-32, 12" stroke="#283888" stroke-width="2.7" stroke-linecap="round" fill="none"/>
    <circle cx="18" cy="-0.5" r="2.8" fill="#181018"/>
  </g>

  <!-- Depth ruler (right side) — 0-190m -->
  <line x1="478" y1="7" x2="478" y2="170" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="7"   x2="478" y2="7"   stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="10"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="50"  x2="478" y2="50"  stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="53"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">50</text>
  <line x1="474" y1="92"  x2="478" y2="92"  stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="95"  fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">100</text>
  <line x1="474" y1="134" x2="478" y2="134" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="137" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">150</text>
  <line x1="474" y1="170" x2="478" y2="170" stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="173" fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">190</text>
  <text x="481" y="24" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels -->
  <text x="12" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">近沿海礁石 ／ 礁外水域</text>
  <text x="12" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">0–190 m</text>
  <text x="12" y="55" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">獨行快泳，以各種魚類為食；體大者含雪卡毒</text>
  <text x="230" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">台灣・印度太平洋珊瑚礁海域</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
