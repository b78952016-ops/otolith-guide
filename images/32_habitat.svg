<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195">
  <defs>
    <linearGradient id="sky32" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5090a8"/>
      <stop offset="100%" stop-color="#3a7080"/>
    </linearGradient>
    <linearGradient id="water32" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a7858"/>
      <stop offset="50%" stop-color="#154838"/>
      <stop offset="100%" stop-color="#0a2018"/>
    </linearGradient>
    <linearGradient id="mud32" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#807858"/>
      <stop offset="100%" stop-color="#504830"/>
    </linearGradient>
  </defs>

  <!-- Sky/shore background -->
  <rect width="500" height="195" fill="url(#sky32)" rx="6"/>

  <!-- Coastal hills (left) -->
  <path d="M0,0 Q30,20 60,35 Q80,42 100,52 L0,52 Z" fill="#3a5828" opacity="0.70"/>
  <ellipse cx="28"  cy="20" rx="32" ry="16" fill="#2a4818" opacity="0.65"/>
  <!-- Coastal hills (right) -->
  <path d="M500,0 Q470,22 440,36 Q420,44 400,52 L500,52 Z" fill="#3a5828" opacity="0.70"/>
  <ellipse cx="472" cy="22" rx="32" ry="16" fill="#2a4818" opacity="0.65"/>

  <!-- Estuarine water body -->
  <rect x="0" y="52" width="500" height="143" fill="url(#water32)"/>

  <!-- Murky surface ripples -->
  <path d="M0,58 Q80,54 165,58 Q250,62 335,58 Q415,54 500,58"
        fill="none" stroke="#50a878" stroke-width="1.3" opacity="0.45"/>
  <path d="M0,68 Q90,63 185,68 Q280,73 375,68 Q440,63 500,68"
        fill="none" stroke="#40906a" stroke-width="1.0" opacity="0.35"/>

  <!-- Turbidity particles -->
  <circle cx="90"  cy="95"  r="0.9" fill="#80c898" opacity="0.16"/>
  <circle cx="240" cy="80"  r="0.8" fill="#80c898" opacity="0.14"/>
  <circle cx="380" cy="108" r="0.9" fill="#80c898" opacity="0.15"/>

  <!-- Muddy estuarine bottom -->
  <path d="M0,172 Q80,166 160,172 Q240,178 320,170 Q400,162 480,170 Q490,171 500,171 L500,195 L0,195 Z"
        fill="url(#mud32)"/>
  <path d="M15,178 Q65,176 115,178" fill="none" stroke="#908070" stroke-width="0.8" opacity="0.45"/>
  <path d="M165,181 Q215,179 265,181" fill="none" stroke="#908070" stroke-width="0.8" opacity="0.45"/>
  <path d="M310,178 Q360,176 410,178" fill="none" stroke="#908070" stroke-width="0.8" opacity="0.45"/>

  <!-- Fish 1: 長鰳 (Ilisha elongata) — elongated compressed silvery shad -->
  <g transform="translate(270,100) rotate(-5)" opacity="0.92">
    <!-- Body: elongated, deeply compressed -->
    <ellipse cx="0" cy="0" rx="36" ry="8" fill="#b8c8b0"/>
    <!-- Silver upper flank -->
    <ellipse cx="0" cy="-4" rx="30" ry="3.5" fill="#d0e0d0" opacity="0.55"/>
    <!-- Darker olive back -->
    <ellipse cx="0" cy="-6" rx="26" ry="2" fill="#506848" opacity="0.70"/>
    <!-- Ventral keel shadow line -->
    <path d="M-28,6 Q0,9 28,6" fill="none" stroke="#90a090" stroke-width="0.8" opacity="0.55"/>
    <!-- Dorsal fin -->
    <path d="M-5,-8 L0,-16 L8,-17 L14,-15 L16,-8" fill="none" stroke="#708068" stroke-width="1.3"/>
    <!-- Anal fin (long) -->
    <path d="M-14,8 Q0,14 14,8" fill="none" stroke="#708068" stroke-width="1.2"/>
    <!-- Pectoral fin -->
    <path d="M22,4 Q28,10 32,6" fill="none" stroke="#708068" stroke-width="1.1" opacity="0.7"/>
    <!-- Forked tail -->
    <path d="M-36,0 L-50,-14" stroke="#608058" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M-36,0 L-50, 14" stroke="#608058" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <!-- Eye (large, typical of clupeid) -->
    <circle cx="32" cy="-1" r="3.5" fill="#181818"/>
    <circle cx="33" cy="-1.5" r="1.1" fill="#a0b098" opacity="0.5"/>
  </g>

  <!-- Fish 2: upper layer (evening/night migration) -->
  <g transform="translate(140,72) rotate(-4)" opacity="0.82">
    <ellipse cx="0" cy="0" rx="28" ry="6" fill="#b8c8b0"/>
    <ellipse cx="0" cy="-3.5" rx="23" ry="2.5" fill="#d0e0d0" opacity="0.50"/>
    <path d="M-4,-6 L0,-12 L6,-13 L10,-11 L12,-6" fill="none" stroke="#708068" stroke-width="1.1"/>
    <path d="M-28,0 L-39,-11" stroke="#608058" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M-28,0 L-39, 11" stroke="#608058" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <circle cx="25" cy="-0.5" r="2.8" fill="#181818"/>
  </g>

  <!-- Fish 3: school background -->
  <g transform="translate(390,118) rotate(-6)" opacity="0.70">
    <ellipse cx="0" cy="0" rx="22" ry="5" fill="#b8c8b0"/>
    <path d="M-22,0 L-31,-9" stroke="#608058" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M-22,0 L-31, 9" stroke="#608058" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <circle cx="19" cy="0" r="2.0" fill="#181818"/>
  </g>

  <!-- Depth ruler (in water zone y=52–165) -->
  <line x1="478" y1="52" x2="478" y2="165" stroke="#3a5070" stroke-width="1"/>
  <line x1="474" y1="52"  x2="478" y2="52"  stroke="#4a6080" stroke-width="1"/>
  <text x="480" y="55"  fill="#8a9bb0" font-size="8" font-family="Microsoft JhengHei,sans-serif">0</text>
  <line x1="474" y1="108" x2="478" y2="108" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="111" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">10</text>
  <line x1="474" y1="165" x2="478" y2="165" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="480" y="168" fill="#c9a84c" font-size="8" font-family="Microsoft JhengHei,sans-serif">20</text>
  <text x="481" y="68" fill="#5a7090" font-size="7.5" font-family="sans-serif">m</text>

  <!-- Labels (shifted right to clear left hillside) -->
  <text x="110" y="18" fill="#8ab8d0" font-size="9.5" font-family="Microsoft JhengHei,sans-serif">河口及近岸中上層</text>
  <text x="110" y="32" fill="#c9a84c" font-size="8.5" font-family="Microsoft JhengHei,sans-serif">5–20 m（黃昏及夜間上浮）</text>
  <text x="110" y="45" fill="#8a9bb0" font-size="9" font-family="Microsoft JhengHei,sans-serif">群游；捕食蝦類・頭足類・小魚</text>
  <text x="250" y="188" fill="#b09040" font-size="9" font-family="Microsoft JhengHei,sans-serif" text-anchor="middle">印度—太平洋至東海・韓國</text>

  <rect width="500" height="195" fill="none" stroke="#2a4060" stroke-width="1.5" rx="6"/>
</svg>
