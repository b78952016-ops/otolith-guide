<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>魚耳石圖鑑｜蘇立蘇</title>
  <style>
    :root {
      --bg: #0d1b2a;
      --card-bg: #1b2e45;
      --accent: #c9a84c;
      --accent-dim: #9d7e38;
      --text: #e8edf2;
      --muted: #8a9bb0;
      --tag-bg: #243a52;
      --border: #2a4060;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Microsoft JhengHei', 'Noto Sans TC', 'PingFang TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(160deg, #0a1520 0%, #162438 100%);
      border-bottom: 1px solid var(--border);
      padding: 2.5rem 2rem 1.75rem;
    }

    .header-inner { max-width: 1200px; margin: 0 auto; }

    .site-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .title-icon { display: inline-block; width: 2rem; height: 2rem; }

    .site-subtitle {
      color: var(--muted);
      margin-top: 0.4rem;
      font-size: 0.95rem;
      letter-spacing: 0.03em;
    }

    .controls {
      display: flex;
      gap: 1rem;
      margin-top: 1.75rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 340px;
    }

    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 0.9rem;
    }

    .search-box {
      width: 100%;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1rem 0.6rem 2.25rem;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--muted); }

    .filter-toggle {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.4rem 0.9rem;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      white-space: nowrap;
    }
    .filter-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .filter-toggle.has-filter { color: var(--accent); border-color: var(--accent-dim); }

    .toggle-arrow {
      display: inline-block;
      transition: transform 0.22s;
      font-size: 0.7rem;
      line-height: 1;
    }
    .toggle-arrow.open { transform: rotate(180deg); }

    .filter-panel {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.28s ease, padding-top 0.28s ease, overflow 0s 0.28s;
      padding-top: 0;
    }
    .filter-panel.open {
      max-height: 200px;
      overflow-y: auto;
      padding-top: 0.75rem;
    }
    .filter-panel.open::-webkit-scrollbar { width: 6px; }
    .filter-panel.open::-webkit-scrollbar-track { background: transparent; }
    .filter-panel.open::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .filter-panel.open::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

    .filter-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .filter-btn {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.4rem 1rem;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d1b2a;
      font-weight: 700;
    }

    /* ── Stats bar ── */
    .stats-bar {
      max-width: 1200px;
      margin: 1.25rem auto 0;
      padding: 0 2rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* ── Grid ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 2rem 4rem;
    }

    .fish-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    /* ── Fish card ── */
    .fish-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }

    .fish-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.45);
      border-color: var(--accent);
    }

    .card-img-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: #111c2b;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0e1e30 0%, #19304a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .placeholder-fish { opacity: 0.18; }

    .card-body { padding: 1rem; }

    .card-primary {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .card-folk {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .card-scientific {
      font-size: 0.78rem;
      font-style: italic;
      color: var(--accent);
      margin-top: 0.15rem;
      opacity: 0.9;
    }

    .card-tags {
      margin-top: 0.7rem;
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .tag {
      border-radius: 4px;
      padding: 0.2rem 0.55rem;
      font-size: 0.75rem;
    }

    .tag-family {
      background: rgba(201,168,76,0.12);
      border: 1px solid var(--accent-dim);
      color: var(--accent);
    }

    .tag-cooking {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .card-meta {
      margin-top: 0.7rem;
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .meta-row { display: flex; align-items: center; gap: 0.35rem; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 200;
      padding: 2rem 1rem;
      overflow-y: auto;
    }

    .modal-overlay.open {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .modal-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 560px;
      width: 100%;
      overflow: hidden;
      position: relative;
      margin: auto 0;
    }

    .modal-close {
      position: absolute;
      top: 0.9rem;
      right: 0.9rem;
      background: rgba(13,27,42,0.75);
      border: 1px solid var(--border);
      color: var(--text);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .modal-close:hover { background: rgba(201,168,76,0.2); }

    .modal-img-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #111c2b;
    }

    .modal-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .modal-img-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0e1e30 0%, #19304a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-body { padding: 1.75rem; }

    /* 彈窗：名稱區（左名稱 + 右地圖） */
    .modal-name-row {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .modal-name-col { flex: 1; min-width: 0; }

    .modal-map-col { flex-shrink: 0; }

    .modal-map-wrap {
      width: 90px;
      height: 150px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      display: block;
    }

    .modal-map-wrap svg { display: block; }

    .modal-map-placeholder {
      width: 90px;
      height: 150px;
      background: rgba(18,30,45,0.5);
      border: 1px dashed var(--border);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.4;
    }

    .modal-primary {
      font-size: 1.7rem;
      font-weight: 700;
      line-height: 1.25;
      color: var(--text);
    }

    .modal-folk {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .modal-scientific {
      font-size: 0.92rem;
      font-style: italic;
      color: var(--accent);
      margin-top: 0.2rem;
    }

    /* 彈窗：inline 元資訊（日期、地點、料理） */
    .modal-meta-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 1.25rem;
      margin-top: 0.65rem;
      font-size: 0.83rem;
      color: var(--muted);
    }

    .modal-tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.65rem;
      align-items: center;
    }

    /* 習性介紹 tag 按鈕 */
    .tag-habitat {
      background: rgba(100,180,160,0.1);
      border: 1px solid rgba(100,180,160,0.4);
      color: #7ecab8;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s;
    }

    .tag-habitat:hover, .tag-habitat.active {
      background: rgba(100,180,160,0.22);
      border-color: rgba(100,180,160,0.7);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.25rem 0;
    }

    /* ── 習性介紹（可折疊） ── */
    .habitat-toggle {
      width: 100%;
      background: rgba(36,58,82,0.5);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.15s, border-color 0.15s;
      text-align: left;
    }

    .habitat-toggle:hover { border-color: var(--accent); background: rgba(36,58,82,0.8); }

    .habitat-toggle .arrow {
      font-size: 0.75rem;
      transition: transform 0.25s;
      color: var(--muted);
    }

    .habitat-toggle.open .arrow { transform: rotate(180deg); }

    .habitat-content {
      display: none;
      padding: 1rem;
      background: rgba(18,30,45,0.5);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 8px 8px;
      font-size: 0.88rem;
      line-height: 1.85;
      color: var(--text);
    }

    .habitat-content.open { display: block; }

    .habitat-refs {
      margin-top: 0.85rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }

    .habitat-refs a {
      color: var(--accent);
      text-decoration: none;
      display: block;
      margin-top: 0.3rem;
      word-break: break-all;
    }

    .habitat-refs a:hover { text-decoration: underline; }

    .more-info-btn {
      display: inline-block;
      margin-top: 0.85rem;
      padding: 0.4rem 1.1rem;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.42);
      border-radius: 20px;
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: background 0.15s, border-color 0.15s;
    }
    .more-info-btn:hover {
      background: rgba(201,168,76,0.22);
      border-color: rgba(201,168,76,0.65);
      text-decoration: none;
    }

    .habitat-tfri {
      margin-top: 1rem;
      padding: 0.7rem 0.85rem;
      background: rgba(36,58,82,0.45);
      border-left: 3px solid var(--accent-dim);
      border-radius: 0 6px 6px 0;
      font-size: 0.85rem;
      line-height: 1.8;
    }

    .habitat-tfri-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent-dim);
      letter-spacing: 0.04em;
      margin-bottom: 0.45rem;
    }

    .habitat-diagram {
      margin-top: 1.1rem;
    }

    .habitat-diagram-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
    }

    .habitat-diagram img {
      width: 100%;
      max-width: 500px;
      height: auto;
      display: block;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    /* ── 捕獲方式 ── */
    .tag-capture {
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.35);
      color: var(--accent);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s;
    }
    .tag-capture:hover, .tag-capture.active {
      background: rgba(201,168,76,0.22);
      border-color: rgba(201,168,76,0.6);
    }
    .capture-panel-inner {
      padding: 0.85rem 0.85rem 0.65rem;
      background: rgba(18,30,45,0.5);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 8px 8px;
    }
    .capture-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }
    .capture-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      min-width: 72px;
      padding: 0.6rem 0.5rem 0.4rem;
      background: rgba(36,58,82,0.55);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .capture-item svg { width: 38px; height: 38px; }
    .capture-label {
      font-size: 0.76rem;
      color: var(--text);
      text-align: center;
      white-space: nowrap;
    }

    /* ── 耳石筆記（可折疊） ── */
    .note-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .note-preview {
      line-height: 1.85;
      color: var(--text);
      font-size: 0.92rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .note-preview.expanded {
      display: block;
      overflow: visible;
    }

    .note-toggle-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 0.83rem;
      font-family: inherit;
      cursor: pointer;
      padding: 0.35rem 0 0;
      display: block;
      transition: opacity 0.15s;
    }

    .note-toggle-btn:hover { opacity: 0.75; }

    /* ── 照片區塊 ── */
    .photo-section { margin-top: 1.25rem; }

    .photo-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .photo-section img {
      width: 100%;
      border-radius: 8px;
      display: block;
      border: 1px solid var(--border);
    }

    .photo-placeholder {
      width: 100%;
      height: 100px;
      background: rgba(18,30,45,0.5);
      border: 1px dashed var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.8rem;
    }

    /* ── Modal Footer ── */
    .modal-footer {
      margin-top: 1.5rem;
      display: flex;
      justify-content: flex-end;
    }

    .fb-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      border: 1px solid var(--accent-dim);
      border-radius: 7px;
      padding: 0.5rem 1.1rem;
      transition: all 0.15s;
    }

    .fb-link:hover {
      background: var(--accent);
      color: #0d1b2a;
      font-weight: 700;
    }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
      font-size: 1rem;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 1.5rem 1rem 1.25rem; }
      main { padding: 1rem 1rem 3rem; }
      .stats-bar { padding: 0 1rem; }
      .site-title { font-size: 1.5rem; }
      .modal-overlay { padding: 0; align-items: flex-end; }
      .modal-box { border-radius: 16px 16px 0 0; }
      .modal-body { padding: 1.25rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="site-title">
      <svg class="title-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="13" cy="16" rx="10" ry="7" fill="#c9a84c" opacity="0.85"/>
        <path d="M23 16 C26 12 30 10 30 16 C30 22 26 20 23 16Z" fill="#c9a84c" opacity="0.65"/>
        <circle cx="10" cy="14" r="1.5" fill="#0d1b2a"/>
      </svg>
      魚耳石圖鑑
    </div>
    <div class="site-subtitle">吃過的每一種魚，都值得被記錄</div>
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input class="search-box" type="search" id="searchInput" placeholder="搜尋魚名、學名、科名…">
      </div>
      <button class="filter-toggle" id="filterToggle">
        <span id="filterLabel">科別</span>
        <span class="toggle-arrow" id="toggleArrow">▼</span>
      </button>
    </div>
    <div class="filter-panel" id="filterPanel">
      <div class="filter-row" id="filterRow">
        <button class="filter-btn active" data-family="all">全部</button>
      </div>
    </div>
  </div>
</header>

<div class="stats-bar">
  <span id="statsText"></span>
</div>

<main>
  <div class="fish-grid" id="fishGrid"></div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <button class="modal-close" id="modalClose" aria-label="關閉">&#10005;</button>
    <div id="modalContent"></div>
  </div>
</div>

<footer>
  魚耳石圖鑑 &copy; 蘇立蘇 &nbsp;·&nbsp; 持續收錄中
</footer>

<script>
const fishData = [
  {
    id: 1,
    commonName: "紅皮刀舅",
    chineseName: "達氏橋燧鯛",
    scientificName: "Gephyroberyx darwinii",
    family: "燧鯛科",
    date: "2024-08-19",
    location: "花愛現小酒館，宜蘭",
    cooking: "西瓜棹清蒸",
    description: "這魚的耳石真是挺大的，而且魚肉很好吃，肉質細緻帶有Q勁不鬆散，細刺很少。\n\n是宜蘭漁民當天用一支釣釣到的，據說這種魚市面上不太常見？\n\n#西瓜棹清蒸超讚",
    otolithPhoto: "images/01_otolith.jpg",

    cooking: "鹽水煮魚、生魚片",
    description: "阿美族吃魚其實很純粹，其一是清水煮湯放點鹽巴調味，魚煮熟撈起來再放採集來的海藻下去煮，或是螺貝類，層層堆疊的海洋滋味，讓湯鮮美無比，充滿海洋的能量。\n\n其二則是切成生魚片，然後沾鹽巴、辣椒、水做成的沾醬，如果附近有細葉碎米薺就會採來一起配著吃，非常簡單的吃法，卻能將生魚肉的滋味及口感提升到另一個層次，若再搭配哇沙米味道的細葉碎米薺，又可以體驗到有趣的風味變化。\n\n鹽巴、辣椒（通常是醃雞心椒）、水所做成的沾醬，是生魚肉的靈魂，其他食材也可以沾著吃，這樣的道地吃法，族語稱做te'nas，一種食物沾醬吃的行為。\n\n這次去港口找鎮妹姐，她帶我們去海邊採海藻及螺類當中餐的食材，還自己加碼去石梯漁港買了兩條魚來加菜，一條是巴鰹，另一條是扁花鰹，兩種魚的作法都是煮湯以及生魚片。\n\n巴鰹又稱三點仔，生魚肉顏色較深，口感較紮實Q彈，肉質甜味高，扁花鰹的肉則顏色相對較淡，口感較軟嫩，滋味清爽像紅甘，兩種魚的生魚片都很喜歡，而且沾了鹽巴辣椒水，超級美味。\n\n鎮妹姐還問我們，沾鹽巴辣椒水比較好吃，還是醬油哇沙比比較好吃，我們馬上異口同聲說鹽巴辣椒水！鎮妹姐還說他都吃不習慣外面的生魚片，因為我自己去買的比較新鮮。\n\n煮魚湯的話，兩種的肉質都偏硬也容易柴，魚頭肉質就還不錯，富有嚼勁且鮮甜感明顯。由於切魚頭有偏一邊，只收集到巴鰹的一側耳石，不過幸運的是有採到少見的第二對耳石，扁花鰹的耳石整個消失太難找，希望下次有機會取到。\n\n結果難得的一顆耳石，為了清卡在細縫裡面的渣渣，不小心弄斷了前端，為此還去買快乾來修復，搞了老半天才成功黏上，比起快乾，保麗龍膠還比較好用。",

    location: "基隆外海",
    cooking: "乾煎",
    description: "雖然白帶魚之前已經有紀錄過，但這次海釣來的白帶，要再特別紀錄一下這特別的事件，而且這次還找到第二對耳石。\n\n對於擅長在陸地上採集來說，釣魚這件事我就是菜鳥等級，尤其又要出海海釣，完全是人生的一項突破。\n\n想去海上釣魚的動機一方面是為了寫書去做素材採集，一方面是這麼常吃魚也愛吃魚，一直就很想跟著漁船去海上體驗一下魚怎麼來的。\n\n出國前剛好看到臺灣永續鱻魚發展協會的小白在揪海釣白帶的活動，雖然幾乎零經驗，但還是鼓起勇氣馬上跟小白報名。\n\n這活動參與的人幾乎都是老手或是釣魚愛好者，而且都是男性，只有周老闆一位女性參與，然後活動成員之間在對話的內容，就好像我進入外國人生活圈裡面，有太多專業術語和經驗完全無法進入。\n\n這件事從上船前到出海，還有停船海釣時，不斷地出現，像是各種魚的俗名、魚的習性、生活海域、海床生態、釣餌種類、釣具名稱、釣魚手法、漁況判斷⋯等，真的是另一個世界的事情，蠻有趣的。\n\n當菜鳥就是要不斷地問，還好成員們都很友善，也快速學會怎麼用釣具、怎麼釣魚、瞭解魚的生活習性、判別漁況，還有不定時會出現在海面的各種生物們。\n\n但整夜釣下來，我還是半隻魚都沒釣到，而周圍的老手們也都收穫欠佳，有釣到白帶的都被稱之為皮帶，也就是還沒長大的白帶魚。\n\n整個夜釣期間換了4個點位，因為漁況都不好，雖然船的雷達都有偵測到魚花（魚群的術語）。小白說沒有流（海流的術語），魚群沒有取食動機，因為海流會帶出許多營養鹽和浮游生物，小魚就會來，白帶才會想吃東西。\n\n到了最後一個點位，才陸續出現了一些白帶，還有透抽，途中看到兩次旗魚快速從我們前面游過，還有幾種歐都麥（台語機車的發音，意指不好吃容易臭的魚）、三點仔小朋友在海面游、透明的白帶幼魚、可能是竹莢或硬尾魚群⋯等，這快速辨識的能力大概跟我們有蟲眼能力的人一樣吧。\n\n夜釣後段真的是超想睡，凌晨4點才結束回程，為了把握這難得的機會，我就一直守著釣竿，就怕漏失掉一絲機會。在回程時，小白跑來跟我說，這次白帶的漁況真是10年來第一次這麼慘，去年已經沒那麼好了，今年沒想到會這麼慘。\n\n嗅到這次夜釣行的重要資訊，睡意馬上去除，馬上接著問，之前的漁況如何。小白說以往在這幾個點都是餌一放，白帶很快就上鉤，而且還常會發生好幾隻在同一個鉤子上，重點是每隻都有4-5指寬（相對於這次的2-3指寬真的是大很多）。\n\n接下來的資訊含金量滿多的，小白說因為今年海平均溫度升高1.8度C，許多魚群都往北移來找尋適合居住的水溫，但事宜溫度的海域，不一定有這些魚適合的食餌和居住環境，如果遲遲找不到，這些魚群可能就會消失。\n\n這升高的1.8度C對於陸域生物來說看起來好像不高，但這是平均溫，也就代表會有某些時段會溫度特別高，而且整個海水水體容易續溫，讓很多生物的生理機能異常，海流也容易停滯，這就接回前面沒有流的狀況。\n\n還有一個實際的現象就是，小白說前陣子在釣套抽時，為了讓透抽在釣起後還能保持活力，所以用桶子裝海水，讓透抽泡在海水裡，殊不知泡下去透抽就因為水溫太高熱暈過去了。\n\n除了白帶，小白因為長期關注日本漁業相關的研究和漁業相關資訊，就說日本九州宮崎現在常撈到鬼頭刀（這在以前是稀有漁獲），然後北邊的鮭魚群變少了，這都跟水溫上升，魚群北移有關。\n\n另外補充，台中外海的風機會在海底造礁，形成適合活在礁體的魚群生態，這對釣客是好事，但喜歡沙岸的白鯧族群就幾乎沒了，原本撈白鯧的漁民就變成受害者。\n\n有關小白分享日本對於漁業資源的管理和研究，還有很多可以紀錄的，之後有機會再來寫。沒想到沒釣到魚的背後，還有環境變遷的遠因（菜鳥的移花接木），釣魚也是觀察海洋環境的方法。",

    description: "最近吃魚都搞得像偵探在破案一樣，而且今天好像是農民曆寫的好日子，都不斷有幸運點出現，就簡單紀錄一下今天的有趣經驗。\n\n中午前跟太太前往台中的纖維工藝博物館，要去聽一個藺草編織工藝的台日交流講座，中午就在附近找一間咖啡簡餐店吃個飯。\n\n太太想說看Google上的菜單，發現這間餐廳有當季鮮魚選項才決定去吃。一進餐廳，老闆就介紹菜單，然後說當季鮮魚在黑板上，我就掃描一遍發現都是日常常見的魚，頓時失去興趣，就選了滷豬腳，太太則選烤肉鯽。\n\n上菜之後，我想說以前便宜到不行的肉鯽仔，現在已經可以晉升到280元一客的套餐，我就想拍個照放在未來要出的書中。\n\n其實肉鯽仔的耳石先前已經取過，但就在拍完照開始吃飯的時候，突然來個直覺說要取這隻魚的耳石看看，我也試了這隻魚肉的味道。\n\n一開始還想說這隻魚是不是鮮度不夠，雖然肉質很細，但有個特別的腥味，跟之前吃的肉魚味道不太一樣，太太也覺得這隻魚看起來不太像肉鯽仔。\n\n後來太太就留上下邊鰭以及魚頭給我吃，我一邊吃一邊覺得這肉鯽仔的味道怎麼跟以往的經驗不一樣，但也沒起太多疑心，然後也隨行地用筷子把耳石挑出，想說肉鯽仔的耳石大片好挑。\n\n結果看到耳石的形狀就覺得這不太對勁，應該不是肉鯽仔，我還找之前肉鯽仔的耳石照片比對，真的不像，然後我就用手機開始搜尋相近魚種的照片，始終未果。\n\n就在要離開餐廳前，鼓起勇氣去問老闆能不能給我拍那隻魚料理前的照片，結果老闆很大方的說好，然後就進廚房拿出來給我拍，我也順道跟老闆聊一下說這魚好像不是肉鯽仔耶。\n\n老闆就反射回應說，這不是肉鯽仔，是肉khing（台語發音），市場的魚販這樣跟我說，我不知道名字怎麼寫就寫肉鯽，而且一從市場買回來就馬上處理用鹽醃起來放冷藏了。\n\n莫非這魚的特殊腥味是他本身的風味特質？\n\n我還真的是非常意外地就收集到沒有吃過的魚耳石，而且還拍到魚料理前的照片，而這照片就在我邊聽藺草講座，我邊查魚的學名時，提供了重要的線索，因為有太多魚都長得很像。\n\n後來不斷地用手機操作魚體的Google圖像辨識和耳石鑑定，終於在一個由菲律賓假設的Fishbase網站找到這隻魚的身份，以及比對耳石是一樣的。也因此意外發現一個好用的國際性魚類資料平台，因為中研院架設的台灣的魚類資料庫，魚種照片及資料其實並不多，還有待加強。\n\n然後回來在開始整理耳石的時候，又發現第二對耳石有一顆就黏在一顆大的上面，完全也是意料之外的事，就這樣獲得完整的第一對，以及一顆第二對耳石，真是幸運。\n\n另外，聽藺草講座還意外發現其中一位講者有接觸過我舅舅的藺草工廠，以及協助當地社區的藺草編織手工藝。會後我們還聊了一下，未來或許有機會可以合作把外公時期建立起來的藺草工廠給轉型並傳承下去。\n\n真是神奇的一天。\n\n#其實這間的食物都蠻好吃的\n#肉khing",

    description: "很有化石感的耳石，第十六隻，七星鰺。\n\n雖然這魚頭看起來有種兇惡感，但魚頭肉意外地好吃，口感很像土魠魚頭，雖然油脂沒有土魠那麼豐富，風味也較清淡些，不過肉質細緻Q彈，有種不像鰺科家族的感覺。\n\n而且魚頭皮厚很Q彈，膠質豐富，也是這魚頭的特色。\n\n耳石不難挑，只是第三對要特別細找一下，畢竟魚頭大，耳石小，相對位置就比較難抓。第二對很薄，容易破，也是要特別注意的地方。\n\n還有，魚頭很硬，不太好拆，要特別注意力道和安全，不然容易受傷。\n\n為了找出這魚的真實身份，中研院魚類資料庫的耳石超不像，後來才找到一個國際魚類耳石型態分析的網站，那耳石才像這種，也才能確定是誰。\n\n如果台灣魚類耳石資料庫可以再完整且普及一點，或許就會讓更多人想吃魚頭？\n\n不然來出個平民版的耳石圖鑑好了，看誰有興趣來做這個偏門的主題\n\n#Embers雜魚學耳石策展",

    description: "這真的是我肉眼的極限了！大魔王之一：秋刀魚！\n\n好鄰居淑媛姐分享澎湖直送的新鮮秋刀魚，先前兩條用鹽麴醃完再烤，超好吃，但耳石根本無法挑。\n\n這次特別先把魚頭取下，用熱水燙熟之後放涼冰冷藏。魚身就用來做細佃煮，也非常好吃，很難得可以吃到這麼新鮮肥美的秋刀魚。\n\n等晚餐結束收拾完，我再把魚頭拿出來，開始進入專注模式。\n\n因為魚頭的頭骨很軟，需要仔細把魚頭的每個部位拆開，然後耳石又很小不顯眼，真的是需要屏氣凝神完成每個步驟。\n\n雖然之前已經挑過秋刀魚的耳石，但只挑到第一對的一塊，這次難得有很新鮮的，魚頭不會被凝血佔滿，就挑戰看能否完整挑出第一對，以及試試第二和第三對。\n\n這次第一對相對容易找到，但第二和第三實在小到炸裂，所以只能各挑到一顆，但已經是大突破了。\n\n這第二、第三對已經突破目前紀錄最小的耳石了，比頭皮屑還小",

    location: "A-teng生態飲食工作坊×飲食空間，彰化",
    cooking: "一魚多吃",
    description: "說到石斑魚，一般市面上比較常見到龍虎斑（龍膽石斑和老虎斑雜交），因為體型較小，適合整尾清蒸上桌。\n\n而要吃到一整顆完整的龍膽石斑魚頭需要靠點運氣，因為通常很大隻，也不會單賣魚頭，若有魚頭也都會剁塊料理。\n\n託志東哥的福，在今天的海鮮地圖課程就可以品嚐到整顆的龍膽石斑魚頭，還可以挑耳石。\n\n會有這個緣份說來也奇妙，當好鄰居Lisa要在彰化開海鮮地圖的課程，我就立馬報名，結果志東哥說跟我在心雕居上的內容一樣，但我還是想上，因為是志東哥開的課！\n\n然後志東哥說那不然我挑一隻我沒吃過耳石的魚給我當禮物，原本想說好啊，一隻魚很棒。\n\n殊不知志東哥跟長盈海味屋挑了一隻龍膽石斑魚，而且這隻魚也太大隻！那顆頭跟人頭差不多大！\n\n送來時是一大箱，魚肉分切成許多部位真空冷凍，還有魚骨、魚下巴等等，然後魚頭就整顆用保鮮膜纏繞後冷凍。整隻魚塞滿我冰箱一層的冷凍櫃，實在是超有份量。\n\n分切的魚肉就在海鮮地圖課程中，請文騰主廚料理給大家吃，然後我看那魚頭也太大顆兩人根本吃不完，就加碼到課程中讓大家分食。\n\n然後在志東哥分享完後，我就加碼拆解魚頭挑耳石的表演，讓大家看看魚頭有哪些構造、如何拆魚頭，以及認識龍膽石斑的耳石長什麼樣。\n\n龍膽石斑雖然很大隻，但魚肉卻很好吃，尤其魚頭肉很細緻，臉頰肉很Q彈，膠質超多。\n\n文騰主廚把魚下巴做成像唐揚雞的方式呈現，還真好吃耶，有種很嫩的雞肉感，不像吃魚。\n\n其他部位的料理也很讚，但因為吃石斑魚之前就已經吃了好幾輪志東哥表演的烏魚子秀，已被大大滿足了。\n\n龍膽石斑魚頭實在有夠硬，用手拆不開，用料理剪刀剪不開，只好從頭蓋骨中間的銜接縫隙處鑿出一個洞再撬開各個部位，才能順利拆解。\n\n在對開魚頭時，可能有強烈拉扯到，一塊第一對耳石斷成一半，就用白膠黏合起來。\n\n第三對耳石只找到一顆，另一顆不曉得噴去哪裡了。\n\n上志東哥的課真的是會很超值，內容和吃的東西都是，但要注意超時，上志東哥的課後面不要排行程\n然後那美妙的檸檬焦糖烏魚子簡直另人升天。",

    description: "這魚叫做鱷形叉尾鶴鱵，是一種在澎湖沒人要的魚，大多都是做飼料用，但不吃這魚真的很可惜。\n\n當我們今天下午在鎖港碼頭等漁船上岸，看看有什麼魚貨，現場也有很多人在等。然後因為天氣不好，漁船一上岸，只有三籃魚，一籃臭肚、一隻牛港鰺，還有一籃鶴鱵。\n\n結果其他魚都有人拿，鶴鱵都沒人要，最後有一位看起來是漁民的人要載走，我就說想要兩隻，他就說直接給我不收錢，還真意外獲得兩隻魚禮物（感謝紫微大帝的分享）。\n\n回民宿後要來料理，先把魚殺完，一隻要煮湯，一隻抹鹽乾煎，結果處理好放在檯面上時，民宿老闆回來看到說，不要吃這個魚啦，這個魚不好，魚肉很硬，刺很多，沒有人在吃啦⋯等等，但我就是沒吃過想試試，以及想挑耳石。\n\n所以我就先煮湯，水煮滾後只放鹽，嚐起來有點鹹的程度，然後把魚放進去煮到水快滾的時候就熄火，稍微泡個幾分鐘後就撈起。\n\n鹽水煮的吃起來意外的好吃，肉質像竹莢魚，或是虱目魚，但沒那麼柴，而且鮮味值很高，還會有點微酸，很像虱目魚肉的味道（麩氨酸），魚眼睛跟虱目魚眼睛味道一樣，重點是刺很少，算是很有風味層次的魚，只要新鮮就很好吃。\n\n另外一隻抹鹽乾煎，還有魚卵也是，這種做法比鹽水煮更好吃，油脂潤了魚肉，肉質更細且Q彈，而且煎起來很香，魚卵很鮮美，油脂豐厚，因為很新鮮完全無腥味。\n\n還好有真的試試看，沒有聽信在地人而放棄，因此意外發現好吃的魚，這魚被做成飼料實在太可惜了。\n\n第二三對耳石蠻小的，比較不好挑，第二對的一塊消失找不到。",

<script>
  let currentFamily = 'all';
  let currentSearch = '';

  const FISH_SVG = `<svg width="80" height="80" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="13" cy="16" rx="10" ry="7" fill="#c9a84c"/>
    <path d="M23 16 C26 12 30 10 30 16 C30 22 26 20 23 16Z" fill="#c9a84c"/>
    <circle cx="10" cy="14" r="1.5" fill="#0d1b2a"/>
  </svg>`;

  function buildFilters() {
    const families = [...new Set(fishData.map(f => f.family))].sort();
    const row = document.getElementById('filterRow');
    document.querySelector('[data-family="all"]').addEventListener('click', () => setFamily('all'));
    families.forEach(fam => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.family = fam;
      btn.textContent = fam;
      btn.addEventListener('click', () => setFamily(fam));
      row.appendChild(btn);
    });

    document.getElementById('filterToggle').addEventListener('click', () => {
      const panel = document.getElementById('filterPanel');
      const arrow = document.getElementById('toggleArrow');
      panel.classList.toggle('open');
      arrow.classList.toggle('open', panel.classList.contains('open'));
    });
  }

  function setFamily(fam) {
    currentFamily = fam;
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.family === fam);
    });
    const toggle = document.getElementById('filterToggle');
    const label = document.getElementById('filterLabel');
    if (fam === 'all') {
      toggle.classList.remove('has-filter');
      label.textContent = '科別';
    } else {
      toggle.classList.add('has-filter');
      label.textContent = `科別：${fam}`;
    }
    render();
  }

  function filteredFish() {
    const q = currentSearch.toLowerCase().trim();
    return fishData.filter(f => {
      const matchFamily = currentFamily === 'all' || f.family === currentFamily;
      const matchSearch = !q
        || (f.commonName && f.commonName.toLowerCase().includes(q))
        || (f.chineseName && f.chineseName.toLowerCase().includes(q))
        || (f.scientificName && f.scientificName.toLowerCase().includes(q))
        || (f.family && f.family.toLowerCase().includes(q));
      return matchFamily && matchSearch;
    }).sort((a, b) => b.id - a.id);
  }

  function render() {
    const grid = document.getElementById('fishGrid');
    const fish = filteredFish();
    const total = fishData.length;
    const uniqueSpecies = new Set(fishData.map(f => f.scientificName)).size;
    document.getElementById('statsText').textContent =
      `共收錄 ${uniqueSpecies} 種（${total} 筆）　目前顯示 ${fish.length} 筆`;

    if (fish.length === 0) {
      grid.innerHTML = '<div class="empty-state">找不到符合的魚種</div>';
      return;
    }

    grid.innerHTML = fish.map(f => {
      const primary = f.chineseName || f.commonName || f.scientificName || '未命名';
      const folk = (f.chineseName && f.commonName) ? `俗名：${f.commonName}` : '';
      const locShort = f.location ? (f.location.length > 16 ? f.location.slice(0,16) + '…' : f.location) : '';
      return `
        <div class="fish-card" onclick="openModal(${f.id})" role="button" tabindex="0">
          <div class="card-img-wrap">
            ${f.otolithPhoto
              ? `<img src="${f.otolithPhoto}" alt="${primary} 耳石" loading="lazy">`
              : `<div class="card-placeholder"><div class="placeholder-fish">${FISH_SVG}</div></div>`}
          </div>
          <div class="card-body">
            <div class="card-primary">${primary}</div>
            ${folk ? `<div class="card-folk">${folk}</div>` : ''}
            ${f.scientificName ? `<div class="card-scientific"><em>${f.scientificName}</em></div>` : ""}
            <div class="card-tags">
              ${f.family ? `<span class="tag tag-family">${f.family}</span>` : ""}
              ${f.cooking ? `<span class="tag tag-cooking">${f.cooking}</span>` : ''}
            </div>
            <div class="card-meta">
              ${f.date ? `<div class="meta-row"><span>${f.date}</span></div>` : ""}
              ${locShort ? `<div class="meta-row"><span>${locShort}</span></div>` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function openModal(id) {
    const f = fishData.find(x => x.id === id);
    if (!f) return;

    const primary = f.chineseName || f.commonName || f.scientificName || '未命名';
    const folk = (f.chineseName && f.commonName) ? `俗名：${f.commonName}` : '';

    const metaParts = [
      f.date && `<span>📅 ${f.date}</span>`,
      f.location && `<span>📍 ${f.location}</span>`,
      f.cooking && `<span>🍽 ${f.cooking}</span>`,
    ].filter(Boolean).join('');

    // 地圖區塊
    const mapBlock = (f.lat && f.lng)
      ? `<div class="modal-map-col">
           <div class="modal-map-wrap">${makeMap(f.lat, f.lng)}</div>
         </div>`
      : `<div class="modal-map-col">
           <div class="modal-map-placeholder">
             📍<br>尚未設定<br>地點座標
           </div>
         </div>`;

    // 學名斜體：比對「大寫字母開頭 + 1–2 個小寫單詞」的二名法或三名法格式
    const italicizeSciNames = t =>
      t.replace(/([A-Z][a-z]+(?:\s+[a-z]+){1,2})/g, '<em>$1</em>');

    // 習性介紹內容（永遠渲染，由 tag 按鈕控制顯示）
    const habitatContent = f.habitat
      ? italicizeSciNames(f.habitat).replace(/\n/g,'<br>')
      : '<span style="color:var(--muted)">尚未填入習性資料</span>';
    const habitatTFRI = f.habitatTFRI
      ? `<div class="habitat-tfri"><div class="habitat-tfri-label">📚 台灣魚類資料庫（中研院）記載</div>${italicizeSciNames(f.habitatTFRI).replace(/\n/g,'<br>')}</div>`
      : '';
    const habitatDiagram = f.habitatDiagram
      ? `<div class="habitat-diagram"><img src="${f.habitatDiagram}" alt="棲地示意圖"></div>`
      : '';
    const habitatRefs = f.habitatRefs && f.habitatRefs.length > 0
      ? `<div class="habitat-refs">參考資料：${f.habitatRefs.map(r=>`<a href="${r.url}" target="_blank" rel="noopener noreferrer">${r.label||r.url}</a>`).join('')}</div>`
      : '';
    const moreInfoBtn = f.moreInfoUrl
      ? `<a class="more-info-btn" href="${f.moreInfoUrl}" target="_blank" rel="noopener noreferrer">🔗 想了解更多</a>`
      : '';
    const captureHtml = (f.captureMethod && f.captureMethod.length > 0)
      ? f.captureMethod.map(m => `<div class="capture-item">${CAPTURE_ICONS[m] || '<span style="font-size:2rem">🎣</span>'}<div class="capture-label">${m}</div></div>`).join('')
      : '';

    const _fArr = f.fishAnnotation;
    const _fSvg = _fArr
      ? `<svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 100 100" preserveAspectRatio="none"><defs><marker id="fa${f.id}" markerWidth="4" markerHeight="3" refX="3.5" refY="1.5" orient="auto" markerUnits="userSpaceOnUse"><polygon points="0,0 4,1.5 0,3" fill="red"/></marker></defs><line x1="${_fArr[0]}" y1="${_fArr[1]}" x2="${_fArr[2]}" y2="${_fArr[3]}" stroke="white" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round"/><line x1="${_fArr[0]}" y1="${_fArr[1]}" x2="${_fArr[2]}" y2="${_fArr[3]}" stroke="red" stroke-width="1.2" stroke-linecap="round" marker-end="url(#fa${f.id})"/></svg>`
      : '';
    const fishPhotoBlock = `
      <div class="photo-section">
        <div class="photo-label">魚的照片${f.fishPhotoCredit ? `<span style="font-weight:400;font-size:0.78rem;color:var(--muted);margin-left:0.5rem;">（${f.fishPhotoCredit}）</span>` : ''}</div>
        ${f.fishPhoto
          ? (_fArr
            ? `<div style="position:relative;display:block"><img src="${f.fishPhoto}" alt="${primary}">${_fSvg}</div>`
            : `<img src="${f.fishPhoto}" alt="${primary}">`)
          : `<div class="photo-placeholder">待補</div>`}
        ${f.fishPhoto2
          ? `<img src="${f.fishPhoto2}" alt="${primary} 2" style="margin-top:6px">`
          : ''}
        ${f.fishPhoto3
          ? `<img src="${f.fishPhoto3}" alt="${primary} 3" style="margin-top:6px">`
          : ''}
      </div>`;

    const cookingPhotoBlock = `
      <div class="photo-section">
        <div class="photo-label">料理照片</div>
        ${f.cookingPhoto
          ? `<img src="${f.cookingPhoto}" alt="${primary} 料理">`
          : `<div class="photo-placeholder">待補</div>`}
        ${f.cookingPhoto2
          ? `<img src="${f.cookingPhoto2}" alt="${primary} 料理2" style="margin-top:6px">`
          : ''}
      </div>`;

    document.getElementById('modalContent').innerHTML = `
      <div class="modal-img-wrap">
        ${f.otolithPhoto
          ? `<img src="${f.otolithPhoto}" alt="${primary} 耳石">`
          : `<div class="modal-img-placeholder"><div style="opacity:0.2">${FISH_SVG.replace('width="80"','width="120"').replace('height="80"','height="120"')}</div></div>`}
      </div>
      <div class="modal-body">
        <div class="modal-name-row">
          <div class="modal-name-col">
            <div class="modal-primary">${primary}</div>
            ${folk ? `<div class="modal-folk">${folk}</div>` : ''}
            ${f.scientificName ? `<div class="modal-scientific"><em>${f.scientificName}</em></div>` : ''}
            <div class="modal-meta-inline">${metaParts}</div>
            <div class="modal-tags">
              ${f.family ? `<span class="tag tag-family">${f.family}</span>` : ''}
              <button class="tag tag-habitat" id="habitatTagBtn" onclick="toggleHabitatPanel()">&#127807; 習性介紹</button>
              ${captureHtml ? `<button class="tag tag-capture" id="captureTagBtn" onclick="toggleCapturePanel()">🎣 捕獲方式</button>` : ''}
            </div>
          </div>
          ${mapBlock}
        </div>

        ${captureHtml ? `<div id="capturePanel" style="display:none">
          <hr class="divider" style="margin-top:0">
          <div class="capture-panel-inner">
            <div class="capture-grid">${captureHtml}</div>
          </div>
        </div>` : ''}

        <div id="habitatPanel" style="display:none">
          <hr class="divider" style="margin-top:0">
          <div class="habitat-content open">
            <div>${habitatContent}</div>
            ${habitatTFRI}
            ${habitatDiagram}
            ${habitatRefs}
            ${moreInfoBtn}
          </div>
        </div>

        <hr class="divider">
        <div class="note-label">耳石筆記：</div>
        <div class="note-preview" id="notePreview">${(f.description || '').replace(/\n/g,'<br>')}</div>
        <button class="note-toggle-btn" id="noteToggleBtn" onclick="toggleNote()">繼續閱讀...</button>

        ${cookingPhotoBlock}
        ${fishPhotoBlock}
        ${(f.otherPhoto || f.otherPhoto2) ? `
        <div class="photo-section">
          ${f.otherPhoto ? `<div class="photo-label">${f.otherPhotoLabel || '其他紀錄'}</div><img src="${f.otherPhoto}" alt="${primary} 其他">` : ''}
          ${f.otherPhoto2 ? `<div class="photo-label" style="margin-top:10px">${f.otherPhoto2Label || '其他紀錄2'}</div><img src="${f.otherPhoto2}" alt="${primary} 其他2">` : ''}
        </div>` : ''}

        <div class="modal-footer">
          <a class="fb-link" href="${f.fbUrl}" target="_blank" rel="noopener noreferrer">
            查看 Facebook 原文 &#8594;
          </a>
        </div>
      </div>
    `;

    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function toggleHabitatPanel() {
    const panel = document.getElementById('habitatPanel');
    const btn = document.getElementById('habitatTagBtn');
    const isOpen = panel.style.display === 'block';
    panel.style.display = isOpen ? 'none' : 'block';
    btn.classList.toggle('active', !isOpen);
  }

  function toggleCapturePanel() {
    const panel = document.getElementById('capturePanel');
    const btn = document.getElementById('captureTagBtn');
    if (!panel) return;
    const isOpen = panel.style.display === 'block';
    panel.style.display = isOpen ? 'none' : 'block';
    btn.classList.toggle('active', !isOpen);
  }

  function toggleNote() {
    const preview = document.getElementById('notePreview');
    const btn = document.getElementById('noteToggleBtn');
    const expanded = preview.classList.toggle('expanded');
    btn.textContent = expanded ? '收起' : '繼續閱讀...';
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  document.getElementById('searchInput').addEventListener('input', function() {
    currentSearch = this.value;
    render();
  });

  buildFilters();
  render();
</script>

</body>
</html>
